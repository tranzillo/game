<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Game v2</title>
<style>
  :root {
    --bg: #1a1a1f;
    --panel: #25252d;
    --panel-2: #2f2f38;
    --border: #3a3a45;
    --text: #e8e8ee;
    --muted: #9999a8;
    --accent: #f0c040;
    --player: #4a8aef;
    --ai: #ef5a5a;
    --ok: #6fcf6f;
    --warn: #efb060;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  #header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
  #header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  #header .phase-info { color: var(--muted); }
  #header .turn-info { color: var(--accent); font-weight: 600; }

  #board { flex: 1; display: grid; grid-template-rows: auto 1fr auto; gap: 8px; padding: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }

  .summoner { display: flex; align-items: center; gap: 12px; padding: 8px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; transition: box-shadow 0.18s, border-color 0.18s; }
  .summoner.player { border-left: 4px solid var(--player); }
  .summoner.ai { border-left: 4px solid var(--ai); }
  .summoner.has-priority { box-shadow: 0 0 0 2px var(--accent); }
  .summoner .name { font-weight: 600; }
  .summoner .durability { font-size: 18px; font-weight: 700; color: var(--accent); }
  .summoner .deck-info { color: var(--muted); font-size: 12px; margin-left: auto; }
  .priority-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--accent);
    color: #1a1a1f;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: none;
  }
  .priority-badge.show { display: inline-block; }
  .incoming-dmg {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(239, 90, 90, 0.2);
    color: var(--ai);
    display: none;
  }
  .incoming-dmg.show { display: inline-block; }

  /* Locations row: one column per location, side-by-side, each its own .location card. */
  #locations-row {
    display: grid;
    grid-template-columns: repeat(var(--loc-count, 2), 1fr);
    gap: 12px;
  }

  .location {
    display: grid;
    grid-template-columns: 70px 1fr 70px;
    grid-template-rows: auto auto auto auto auto;
    /* rows: label / ai-structure / ai-side / player-side / player-structure */
    gap: 6px;
    padding: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .location-label { grid-column: 1 / 4; text-align: center; color: var(--muted); font-size: 12px; font-weight: 600; }
  .location-text { grid-column: 1 / 4; text-align: center; color: #c9b8e8; font-size: 11px; font-style: italic; padding: 2px 8px; background: rgba(120, 90, 180, 0.1); border-radius: 4px; }

  .ai-structure-row    { grid-column: 1 / 4; grid-row: 2 / 3; display: grid; grid-template-columns: 70px 1fr 70px; gap: 6px; align-items: center; }
  .player-structure-row { grid-column: 1 / 4; grid-row: 5 / 6; display: grid; grid-template-columns: 70px 1fr 70px; gap: 6px; align-items: center; }
  .structure-row-label { color: var(--muted); font-size: 10px; text-align: center; }
  .structure-slot { min-height: 60px; }

  .ai-side     { grid-column: 2 / 3; grid-row: 3 / 4; }
  .player-side { grid-column: 2 / 3; grid-row: 4 / 5; }

  .creature-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 6px;
  }

  .side-info {
    display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: center;
    padding: 4px; border-radius: 4px; background: var(--panel-2); font-size: 12px;
  }
  .stat-row { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .stat-cell { display: flex; align-items: center; justify-content: space-between; gap: 4px; padding: 2px 4px; border-radius: 3px; background: rgba(255,255,255,0.02); font-size: 11px; }
  .stat-cell-label { color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .stat-cell-value { font-weight: 700; }
  .stat-cell.stat-force .stat-cell-value { color: var(--ai); }
  .stat-cell.stat-tempo .stat-cell-value { color: var(--ok); }
  .stat-cell.stat-insight .stat-cell-value { color: #60c0e0; }
  .stat-cell.stat-ammo .stat-cell-value { color: #e0c97a; }
  .stat-pending { color: var(--muted); font-weight: 400; font-size: 10px; margin-left: 4px; }

  .ai-info     { grid-column: 1 / 2; grid-row: 3 / 4; }
  .player-info { grid-column: 1 / 2; grid-row: 4 / 5; }
  .ai-action-slot     { grid-column: 3 / 4; grid-row: 3 / 4; }
  .player-action-slot { grid-column: 3 / 4; grid-row: 4 / 5; }

  .slot {
    background: var(--panel-2);
    border: 1px dashed var(--border);
    border-radius: 4px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
    cursor: default;
    transition: border-color 0.12s, background 0.12s;
  }
  .slot.legal-target { border-color: var(--accent); background: rgba(240, 192, 64, 0.08); cursor: pointer; }
  .slot.illegal-target { opacity: 0.5; }
  .slot-label { user-select: none; }
  .slot.has-card { padding: 4px; border-style: solid; }
  .slot.has-card.pending { border-style: dashed; border-color: var(--accent); background: rgba(240, 192, 64, 0.06); }
  .slot.can-cancel { cursor: pointer; }
  .slot.can-select-move { cursor: pointer; box-shadow: inset 0 0 0 1px rgba(74, 138, 239, 0.4); }
  .slot.can-select-move:hover { border-color: var(--player); box-shadow: inset 0 0 0 2px var(--player); }
  .card.pending-card { opacity: 0.85; box-shadow: inset 0 0 0 1px rgba(240, 192, 64, 0.4); }
  .card.moved { opacity: 0.7; }
  .card.moved::after { content: "moved"; position: absolute; top: 2px; right: 2px; font-size: 9px; color: var(--muted); background: var(--panel-2); padding: 1px 3px; border-radius: 2px; }
  .card { position: relative; }
  .card.face-down { background: linear-gradient(135deg, #2a2a35 0%, #1f1f28 50%, #2a2a35 100%); border-style: dashed; }
  /* Player's own committed-but-not-yet-flipped cards: visible but distinct, so the player knows
     they haven't flipped up yet (and any flip-up triggers haven't fired). */
  .card.pre-flip { box-shadow: inset 0 0 0 2px rgba(74, 138, 239, 0.5); opacity: 0.92; }
  .card.pre-flip::before { content: "face-down"; position: absolute; bottom: 2px; right: 2px; font-size: 9px; color: var(--player); background: var(--panel-2); padding: 1px 3px; border-radius: 2px; }
  .card.face-down .card-back { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 60px; font-size: 24px; color: var(--muted); font-weight: 700; }
  @keyframes flip-in {
    0% { transform: rotateY(180deg); opacity: 0.3; }
    50% { transform: rotateY(90deg); opacity: 0; }
    100% { transform: rotateY(0); opacity: 1; }
  }
  .card.just-revealed { animation: flip-in 0.55s ease-out; }

  .structure-row { grid-column: 1 / 4; grid-row: 1 / 2; display: none; } /* not currently used; reserved */

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px;
    cursor: pointer;
    user-select: none;
    width: 110px;
    min-height: 96px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: transform 0.12s, border-color 0.12s, background 0.12s;
    font-size: 12px;
  }
  .card.in-slot { width: auto; min-height: auto; height: 100%; }
  .card.creature { border-left: 3px solid var(--player); }
  .card.creature.ai-owned { border-left: 3px solid var(--ai); }
  .card.structure { border-left: 3px solid var(--ok); }
  .card.action { border-left: 3px solid var(--warn); }
  .card.selected { outline: 2px solid var(--accent); transform: translateY(-2px); }
  .card.unplayable { opacity: 0.45; cursor: not-allowed; }
  .card .name { font-weight: 600; line-height: 1.1; }
  .card .meta { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .card .badge { font-size: 10px; padding: 1px 5px; background: var(--panel-2); border-radius: 3px; color: var(--muted); }
  .card .badge.cost { background: rgba(240, 192, 64, 0.18); color: var(--accent); }
  .card .badge.force { background: rgba(239, 90, 90, 0.18); color: var(--ai); }
  .card .badge.tempo { background: rgba(111, 207, 111, 0.18); color: var(--ok); }
  .card .badge.insight { background: rgba(96, 192, 224, 0.18); color: #60c0e0; }
  .card .badge.durability { background: rgba(74, 138, 239, 0.18); color: var(--player); }
  .card .badge.sleep { background: rgba(160, 120, 220, 0.22); color: #c8b0ee; }
  .card .badge.groggy { background: rgba(220, 160, 100, 0.20); color: #e6c79c; }
  .card .badge.equipment-tag { background: rgba(200, 170, 90, 0.18); color: #e0c97a; }
  .card .equipment-row { display: flex; flex-wrap: wrap; gap: 3px; align-items: center; margin-top: 3px; font-size: 10px; }
  .card .equipment-label { color: var(--muted); font-size: 10px; margin-right: 2px; }
  .card .requires-row { display: flex; flex-wrap: wrap; gap: 3px; align-items: center; margin-top: 2px; font-size: 10px; }
  .card .requires-label { color: var(--muted); font-size: 10px; margin-right: 2px; }
  .card .stats-row { display: flex; flex-wrap: wrap; gap: 3px; align-items: center; margin-top: auto; padding-top: 4px; }
  .card .marks-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px; font-size: 10px; }
  .card .badge.mark { font-weight: bold; }
  .card .badge.mark-reroute { background: rgba(111, 207, 111, 0.28); color: var(--ok); }
  .card .badge.mark-convert { background: rgba(255, 255, 255, 0.18); color: #f0f0f0; }
  .card .badge.mark-damage { background: rgba(239, 90, 90, 0.28); color: var(--ai); }
  .card .text { color: var(--muted); font-size: 10px; line-height: 1.25; }
  .card .preview { font-size: 10px; line-height: 1.25; margin-top: 2px; padding: 2px 4px; border-radius: 3px; background: rgba(239, 90, 90, 0.12); color: var(--ai); }
  .card .preview.muted { background: rgba(255, 255, 255, 0.04); color: var(--muted); }
  .card .preview.die { background: rgba(239, 90, 90, 0.25); color: #ff8080; font-weight: 600; }

  .structure-zone, .action-zone {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }

  /* Hand */
  #hand-area { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
  #hand-area .hand-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  #hand { display: flex; gap: 8px; flex-wrap: wrap; min-height: 100px; }

  #ai-hand-info { padding: 6px 12px; color: var(--muted); font-size: 12px; text-align: right; }
  #initiative-tracker {
    display: flex; flex-direction: row; gap: 4px; align-items: center;
    padding: 6px 12px; min-height: 44px;
    background: var(--panel-2); border-bottom: 1px solid var(--border);
    overflow-x: auto; white-space: nowrap;
  }
  #initiative-tracker:empty::before {
    content: ""; color: var(--muted); font-size: 11px;
  }
  .init-label { color: var(--muted); font-size: 10px; letter-spacing: 0.5px; margin-right: 8px; flex-shrink: 0; }
  .init-item {
    display: inline-flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 3px 6px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--panel); min-width: 56px; flex-shrink: 0;
    font-size: 10px; line-height: 1.15;
  }
  .init-item.player { border-left: 3px solid var(--player); }
  .init-item.ai { border-left: 3px solid var(--ai); }
  .init-item.resolved { opacity: 0.4; }
  .init-item .name { font-weight: 600; color: var(--text); }
  .init-item .meta { color: var(--muted); font-size: 9px; }
  .init-item.face-down .name { color: var(--muted); font-style: italic; }

  /* Controls */
  #controls { display: flex; justify-content: center; gap: 12px; padding: 8px; }
  button {
    background: var(--accent);
    color: #1a1a1f;
    border: none;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
  }
  button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }

  #log {
    max-width: 1100px;
    margin: 0 auto 12px;
    width: calc(100% - 24px);
    max-height: 200px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--muted);
  }
  #log .entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: pre-wrap; }
  #log .entry:last-child { border-bottom: none; }
  #log .entry.combat { color: var(--ai); }
  #log .entry.combat-header { color: var(--accent); font-weight: 600; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 4px; }
  #log .entry.combat-detail { color: var(--text); padding-left: 8px; }
  #log .entry.draw { color: var(--player); }
  #log .entry.phase { color: var(--accent); font-weight: 600; }
  #log .entry.cleanup { color: var(--muted); }
  #log .entry.win { color: var(--ok); font-weight: 700; }
  #log .entry.lose { color: var(--ai); font-weight: 700; }

  #game-over {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); z-index: 10;
  }
  #game-over.show { display: flex; }
  #game-over .panel { background: var(--panel); padding: 24px 32px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
  #game-over h2 { margin-top: 0; }
  #game-over button { margin-top: 12px; }

  .stat-pill { display: inline-block; padding: 1px 6px; border-radius: 3px; background: rgba(239, 90, 90, 0.18); color: var(--ai); font-size: 11px; margin-right: 4px; }

  /* ---------- v3 overworld view ---------- */
  #overworld {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    padding: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .overworld-svg { width: 100%; max-width: 800px; height: auto; }
  .ow-edge { stroke: var(--border); stroke-width: 2; }
  .ow-node { stroke: var(--border); stroke-width: 2; fill: var(--panel-2); transition: fill 0.12s, stroke 0.12s; }
  .ow-node-start    { fill: #444; }
  .ow-node-hostile  { fill: rgba(239, 90, 90, 0.3); stroke: var(--ai); }
  .ow-node-neutral  { fill: rgba(96, 192, 224, 0.25); stroke: #60c0e0; }
  .ow-node-boss     { fill: rgba(240, 192, 64, 0.25); stroke: var(--accent); stroke-width: 3; }
  .ow-node-status-completed { opacity: 0.4; }
  .ow-node-pawn  { stroke: var(--player); stroke-width: 4; }
  .ow-node-legal { filter: drop-shadow(0 0 6px var(--accent)); }
  .ow-node-legal:hover { fill: rgba(240, 192, 64, 0.35); }
  .ow-node-label { font-size: 22px; font-weight: 700; fill: var(--text); pointer-events: none; user-select: none; }
  .ow-node-name  { font-size: 11px; fill: var(--muted); pointer-events: none; user-select: none; }
  .ow-node-group { cursor: default; }
  .overworld-help {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 13px; color: var(--text); text-align: center;
  }
  .overworld-help .muted { color: var(--muted); font-size: 11px; }
  .start-menu { display: flex; flex-direction: column; gap: 16px; align-items: center; padding: 20px; }
  .start-menu h2 { margin: 0; font-size: 22px; color: var(--text); }
  .start-menu-row { display: flex; gap: 16px; }
  .start-menu-card {
    background: var(--panel); border: 2px solid var(--border); border-radius: 6px;
    padding: 18px 24px; cursor: pointer; min-width: 200px;
    display: flex; flex-direction: column; gap: 6px;
    transition: transform 0.12s, background 0.12s;
  }
  .start-menu-card:hover { transform: translateY(-2px); background: var(--panel-2); }
  .start-menu-label { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
  .start-menu-tag { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div id="header">
  <h1>Game v2 — multi-location prototype</h1>
  <div>
    <span class="phase-info" id="phase-info">Phase: -</span>
    &nbsp;|&nbsp;
    <span class="turn-info" id="turn-info">Turn 1</span>
  </div>
</div>

<div id="ai-hand-info"></div>

<div id="initiative-tracker"></div>

<div id="board">
  <div class="summoner ai" id="ai-summoner">
    <span class="name">AI</span>
    <span class="durability" id="ai-durability">20</span>
    <span class="incoming-dmg" id="ai-incoming"></span>
    <span class="priority-badge" id="ai-priority-badge"></span>
    <span class="deck-info" id="ai-deck-info"></span>
  </div>

  <!-- Locations row: render() fills this container with one .location column per LOCATION_COUNT. -->
  <div id="locations-row"></div>

  <div class="summoner player" id="player-summoner">
    <span class="name">Player</span>
    <span class="durability" id="player-durability">20</span>
    <span class="incoming-dmg" id="player-incoming"></span>
    <span class="priority-badge" id="player-priority-badge"></span>
    <span class="deck-info" id="player-deck-info"></span>
  </div>
</div>

<div id="hand-area">
  <div class="hand-label">Your hand (click a card, then click a legal target slot to play)</div>
  <div id="hand"></div>
</div>

<div id="controls">
  <button id="btn-advance">End Main Phase</button>
  <button id="btn-leave-encounter" class="secondary" title="Leave the neutral encounter and return to the overworld.">Leave Encounter</button>
  <button id="btn-export" class="secondary" title="Click: copy state to clipboard. Shift-click: download as a .txt file.">Export State</button>
  <button id="btn-restart" class="secondary">Restart Run</button>
</div>

<div id="log"></div>

<div id="game-over">
  <div class="panel">
    <h2 id="game-over-title">Game Over</h2>
    <p id="game-over-text"></p>
    <button id="btn-go-restart">Play again</button>
  </div>
</div>

<script>
"use strict";

// ---------- Card definitions ----------
// Each definition is a template; instances are created with createCard().
// `aiHints` is per-card metadata used by the AI scoring function (DECISIONS.md, AI architecture).
// CARD_DEFS uses flat shorthand keys per color: r1 through r12 for Red, with no
// starter/reward distinction in the keys — that distinction is just *which slice of the pool
// goes in the player's starting deck*. Other cards live at encounter locations until acquired.
// Multi-color cards use both letters (e.g., rb1 for Red/Blue). Display names on each def are
// for UI only and will change as the design firms; engine references stay stable as keys.
//
// Effect-handler tags (the strings in `effect` / `onFlipUp`) are *behavior tags*, not card-identity
// tags. Multiple cards can use the same effect tag if they share behavior; renaming a card key
// doesn't affect them.
const CARD_DEFS = {
  // r1 — Free 1F/2D goblin. Flip-up: if alone on your side here, +1 Force.
  r1: {
    name: "Goblin Brawler",
    type: "creature",
    tribe: "goblin",
    cost: 0,
    force: 1,
    tempo: 0,
    durability: 2,
    onFlipUp: "loneChampionBrawler",
    text: "On flip-up: if this is the only creature on your side here, gain +1 Force.",
    aiHints: { preferFront: true }
  },
  // r2 — Free equipment. Grants cleave.
  r2: {
    name: "Crude Axe",
    type: "equipment",
    cost: 0,
    costStat: "force",
    force: 0,
    tempo: 0,
    durability: null,
    grantsAttackPatterns: [{ type: "cleave" }],
    text: "Equip. The wielder's attacks gain cleave.",
    aiHints: {}
  },
  // r3 — ≥1F ramp creature. 2F/3D. Flip-up: +1 Force this turn.
  r3: {
    name: "Orc Bruiser",
    type: "creature",
    cost: 1,
    costStat: "force",
    force: 2,
    tempo: 0,
    durability: 3,
    onFlipUp: "bruiserChargeBuff",
    text: "On flip-up: this gains +1 Force this turn.",
    aiHints: { preferFront: true }
  },
  // r4 — Recruit conversion verb. Action. Force-superiority swap on resolve.
  r4: {
    name: "Recruit",
    type: "action",
    cost: 0,
    costStat: "force",
    force: 0,
    tempo: 0,
    durability: null,
    effect: "recruitConversion",
    text: "If you have more Force here, a creature in front on the other side moves to the front on your side.",
    aiHints: {}
  },
  // r5 — ≥1F payoff creature. 1F/4D, +2F while alone on your side here.
  r5: {
    name: "Ogre Pit-Fighter",
    type: "creature",
    tribe: "ogre",
    cost: 1,
    costStat: "force",
    force: 1,
    tempo: 0,
    durability: 4,
    pitFighterWhileAlone: true,
    text: "+2 Force here while no other creature on your side is here.",
    aiHints: { preferFront: true }

// ---------- Quest definitions ----------
// Quest is a persistent-action archetype. The card defines a `questKey` pointing here, and the
// engine handles the completion-watch and reward-resolve via this registry. A quest can also be
// created as a token (no card def needed) — see createQuestToken below.
//
// Each quest def declares:
//   - name, text: display
//   - checkCompletion(quest, side, loc, event): returns true to complete on this trigger
//   - reward(quest, side, loc): fires when complete; the quest then exits the slot
//   - events: list of trigger kinds the quest listens for (e.g., ["flipUp"])
const QUEST_DEFS = {
  // Bad Intel — Pathfinder's deathwish token. Watches for any card flipping up at this location;
  // marks that card for reroute (Green's conversion). One-shot: completes on first flip-up.
  badIntel: {
    name: "Bad Intel",
    text: "When a card flips up here, mark it for reroute. (Token — exiles on completion.)",
    events: ["flipUp"],
    checkCompletion: function(quest, side, loc, event) {
      return event.kind === "flipUp" && event.loc === loc;
    },
    reward: function(quest, side, loc, event) {
      applyMark(event.card, "reroute", side);
    }
  }
};

// Create a quest token. defKey is optional — token quests don't need a CARD_DEFS entry. The
// returned card has type="action", subtype="quest", isToken=true, questKey set.
function createQuestToken(questKey, owner) {
  const qd = QUEST_DEFS[questKey];
  if (!qd) return null;
  const card = {
    instId: nextInstId(),
    defKey: `quest_${questKey}`,
    owner,
    name: qd.name,
    type: "action",
    cost: 0,
    costStat: "force",
    force: 0,
    tempo: 0,
    insight: 0,
    durabilityMax: null,
    durability: null,
    effect: null,
    onFlipUp: null,
    deathwish: null,
    subtype: "quest",
    questKey,
    inert: false,
    pitFighterWhileAlone: false,
    provocationChallenger: false,
    enraged: false,
    tribe: null,
    attackPatterns: [],
    grantsAttackPatterns: null,
    grantsStats: null,
    equipment: [],
    sleepCounter: 0,
    wokeInPhase: null,
    flippedThisTurn: false,
    marks: [],
    text: qd.text,
    aiHints: {},
    revealed: false,
    isToken: true
  };
  return card;
}

// Check all active quests in play; if any completes on the given event, resolve its reward and
// exit it from the slot. Called from event-firing sites (flip-up, etc.).
function checkQuestsForEvent(event) {
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(sideName, loc);
      const q = lc.action;
      if (!q || q.subtype !== "quest" || q.revealed === false) continue;
      const qd = QUEST_DEFS[q.questKey];
      if (!qd || !qd.events.includes(event.kind)) continue;
      if (!qd.checkCompletion(q, sideName, loc, event)) continue;
      // Quest completes — fire reward, then exit slot (tokens exile, non-tokens discard).
      logEntry(`  ${q.name} (${sideName} @${LOC_NAMES[loc]}) — Quest complete.`, "combat-detail");
      qd.reward(q, sideName, loc, event);
      lc.action = null;
      sendToPile(q, sideName, "discard");  // tokens auto-route to exile via sendToPile
    }
  }
}

// 13-card v1 deck — mixed Force/Tempo/Insight to exercise the cost system and Tempo-ordered combat.
// ---------- Multi-location config ----------
// v3: each encounter is a SINGLE LOCATION (the destination node). Multi-location-per-encounter
// returns in a slice prototype increment that mixes peace and war locations. LOCATION_COUNT is
// a runtime variable: set per-encounter from the node's `locations` array. Default 1 for nodes
// authored as single-location; 2 for the slice's multi-location encounters.
let LOCATION_COUNT = 1;
let LOC_NAMES = ["Encounter"]; // overwritten per-encounter when an encounter is loaded
let LOC_TEXT_KEYS = [null]; // per-location key into LOCATION_TEXTS; null = no text at this location

// Location-text registry. Each entry is a node's printed rules effect for one mode (peace/war).
// In the slice, peace/war is hard-coded per-node — locations don't flip dynamically. Each location
// text declares which engine hooks it cares about; the engine consults the per-location text at
// the relevant moments. Null/missing fields are skipped.
//
// Hooks:
//   suppressActionFlipUp: bool — actions in slots at this location don't flip up at end of phase
//   onUpkeepStart/End, onDrawStart/End, onMainStart/End, onCombatStart/End, onCleanupStart/End(loc)
//     — phase-boundary hooks fired by firePhaseHook.
//   onEquipmentLeavesPlay(loc, equipment, hostSide) — fires when equipment leaves play here.
//     Returns truthy if the hook handled the equipment's destination (skip default junkyard push).
//   desc: string — display text for the UI
const LOCATION_TEXTS = {
  // Champion's Rest (Red, tall-rewarding peace location).
  // Actions don't flip up by default. If at end of cleanup only ONE creature is at this location,
  // all actions here flip up and resolve. Player engineers "exactly one creature here" to extract
  // a permanent buff via a one-shot exiling action.
  locP1: {
    label: "Champion's Rest",
    desc: "Actions here don't flip up. At end of cleanup, if only one creature is here, flip up all actions.",
    suppressActionFlipUp: true,
    onCleanupEnd: function (loc) {
      let creatureCount = 0;
      for (const sideName of ["player", "ai"]) {
        const lc = L(sideName, loc);
        for (const pos of ["fl","fr","bl","br"]) {
          if (lc.creatures[pos]) creatureCount++;
        }
      }
      if (creatureCount !== 1) return;
      // Exactly one creature here. Force-flip all actions in slots here on either side.
      logEntry(`Champion's Rest: only one creature here — flipping all actions.`, "phase");
      const flipped = [];
      for (const sideName of ["player", "ai"]) {
        const lc = L(sideName, loc);
        if (lc.action && lc.action.revealed === false) {
          lc.action.revealed = true;
          flipped.push({ side: sideName, action: lc.action });
        }
      }
      // Resolve flipped actions in the order they appear (sides interleaved, no Tempo here — the
      // location's force-flip is a single-shot; slice keeps it simple).
      for (const f of flipped) {
        // Use the standard action resolver. It will handle the action's effect text.
        if (state.sides[f.side].locations[loc].action === f.action) {
          resolveAction(f.side, loc);
        }
      }
    }
  },
  // Goblin Armaments (Red, tribal-training-grounds peace location).
  // When equipment leaves play here, attach it to a goblin here. Per Pillar 10, the goblin is
  // picked at random from legal candidates: any goblin on either side at this location that
  // isn't already at the equipment cap. Equipment cycles between dying goblins until no legal
  // host remains. Equipment cap (1 per host) bounds the cycling and creates slot-pressure.
  locP2: {
    label: "Goblin Armaments (peace)",
    desc: "When equipment leaves play here, attach it to a goblin here.",
    onEquipmentLeavesPlay: function (loc, equipment, hostSide) {
      // Find legal host candidates: any goblin on either side at this location with an empty
      // equipment slot (cap = 1 per host).
      const candidates = [];
      for (const side of ["player", "ai"]) {
        const lc = L(side, loc);
        for (const pos of ["fl","fr","bl","br"]) {
          const c = lc.creatures[pos];
          if (!c) continue;
          if (c.revealed === false) continue;  // face-down cards are not legal targets
          if (c.tribe !== "goblin") continue;
          if (c.equipment && c.equipment.length >= EQUIPMENT_CAP_PER_HOST) continue;  // equipment cap
          candidates.push({ side, pos, c });
        }
      }
      if (candidates.length === 0) {
        // No legal goblin host. Equipment falls through to the default (host-side junkyard).
        return false;
      }
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      const reason = candidates.length === 1 ? "[only legal goblin]" : `[random pick from ${candidates.length} goblins]`;
      attachEquipmentToHost(equipment, pick.c, pick.side);
      logEntry(`  Goblin Armaments: ${equipment.name} cycles to ${pick.c.name} (${pick.side} ${pick.pos}). ${reason}`, "combat-detail");
      return true;  // handled — skip the default junkyard push
    }
  },
  // Ogre Hideaway (Red, peace). Recruit-bait location: when an ogre flips up here, it goes to sleep
  // for 2 turns. Sleeping = 0 effective Force, no combat, no movement. Player can recruit easily
  // (no Force-superiority hurdle) or poke the ogre awake and trade combat.
  locP3: {
    label: "Ogre Hideaway",
    desc: "When an ogre flips up here, it sleeps for 2.",
    onFlipUp: function (loc, side, card) {
      if (card.tribe !== "ogre") return;
      if (card.sleepCounter > 0) return;  // already asleep — don't refresh
      card.sleepCounter = 2;
      logEntry(`  Ogre Hideaway: ${card.name} (${side} ${LOC_NAMES[loc]}) falls asleep (Sleep 2).`, "combat-detail");
    }
  }
};

// ---------- Slice prototype overworld config ----------
// Bipartite chain: each "stage" is a pair of parallel nodes the player engages with as a
// 2-location encounter. After clearing the pair, the player picks one to move to. From there,
// the next pair is the encounter's two locations.
//

// Stage 2: B1, B2  — mixed (one peace, one hostile)
// Stage 3: C1, C2  — both hostile (final encounter)
//
// Edges connect every Stage-N node to every Stage-(N+1) node (full bipartite per stage),
// guaranteeing a 2-location encounter at each step.
//
// Each node has *one* location's worth of contents — `contents` (and optional `locationTextKey`).
// Multi-location encounters come from adjacency in the graph, not from arrays inside a node.
const WORLD_DEFS = {
  nodes: [
    { id: "start", x: 1, y: 2, biome: "Crossroads",  kind: "start",

      locationTextKey: "locP3",
      contents: { neutralPlacements: [
        { defKey: "r9", slot: { kind: "creature", pos: "fl" } }

    },
    { id: "A2", x: 2, y: 3, biome: "Mountain", kind: "neutral",
      label: "Champion's Rest",
      locationTextKey: "locP1",
      contents: { neutralPlacements: [
        { defKey: "r3", slot: { kind: "creature", pos: "fl" } },
        { defKey: "r13", slot: { kind: "action" } }

    },

    // Stage 2 — mixed. B1 peace (Goblin Armaments), B2 hostile (Skirmish Line).
    { id: "B1", x: 3, y: 1, biome: "Mountain", kind: "neutral",
      label: "Goblin Armaments",
      locationTextKey: "locP2",
      contents: { neutralPlacements: [
        { defKey: "r1", slot: { kind: "creature", pos: "fl" }, equipWith: ["r2"] },
        { defKey: "r1", slot: { kind: "creature", pos: "fr" }, equipWith: ["r11"] },
        { defKey: "r1", slot: { kind: "creature", pos: "bl" } },
        { defKey: "r1", slot: { kind: "creature", pos: "br" } }
      ]}
    },
    { id: "B2", x: 3, y: 3, biome: "Mountain", kind: "hostile",
      label: "Skirmish Line",
      contents: { aiPlacements: [
        { defKey: "r1", slot: { kind: "creature", pos: "fl" } },
        { defKey: "r7", slot: { kind: "creature", pos: "fr" } },
        { defKey: "r6", slot: { kind: "creature", pos: "bl" } }
      ]}
    },

    // Stage 3 — both hostile. C1 Forward Line, C2 Rear Camp.
    { id: "C1", x: 4, y: 1, biome: "Mountain", kind: "hostile",
      label: "Forward Line",
      contents: { aiPlacements: [
        { defKey: "r8", slot: { kind: "creature", pos: "fl" }, equipWith: ["r2"] },

      ]}
    },
    { id: "C2", x: 4, y: 3, biome: "Mountain", kind: "hostile",
      label: "Rear Camp",
      contents: { aiPlacements: [
        { defKey: "r9", slot: { kind: "creature", pos: "fl" } },
        { defKey: "r1", slot: { kind: "creature", pos: "br" } }
      ]}
    }
  ],
  edges: [
    // start → Stage 1
    ["start", "A1"], ["start", "A2"],
    // Stage 1 → Stage 2 (full bipartite)
    ["A1", "B1"], ["A1", "B2"],
    ["A2", "B1"], ["A2", "B2"],
    // Stage 2 → Stage 3 (full bipartite)
    ["B1", "C1"], ["B1", "C2"],
    ["B2", "C1"], ["B2", "C2"]
  ],
  startNode: "start",
  bossNode: null   // slice has no boss — final encounter is the Stage 3 pair

// Per-color starter decks. Player picks one in the start menu; the AI uses the same list as
// the chosen color (custom AI decks land later).
const DECKS = {
  red: ["r1", "r2", "r3", "r4", "r5", "r6", "r10", "r12", "r14"],
  green: ["g1", "g2", "g3", "g4", "g5", "g6", "g7", "g8"]
};

function buildStartingDeck() {
  const key = state.deckKey || "red";
  return DECKS[key] ? [...DECKS[key]] : [...DECKS.red];
}

// ---------- State ----------
function createCard(defKey, owner) {
  const def = CARD_DEFS[defKey];
  return {
    instId: nextInstId(),
    defKey,
    owner,
    name: def.name,
    type: def.type,
    cost: def.cost,
    costStat: def.costStat || "force", // legacy: single-stat cost (kept for display compatibility)
    // Unified cost shape: `{ force: 2, tempo: 1 }` etc. Built from def.costs (new shape) OR from
    // def.cost + def.costStat (legacy single-stat). Empty object = no cost.
    costs: def.costs ? { ...def.costs } : (def.cost > 0 ? { [def.costStat || "force"]: def.cost } : {}),
    force: def.force || 0,
    tempo: def.tempo || 0,
    insight: def.insight || 0,
    durabilityMax: def.durability,
    durability: def.durability, // current durability for creatures
    effect: def.effect,
    onFlipUp: def.onFlipUp,    // optional flip-up trigger effect key (see fireFlipUpTrigger)
    deathwish: def.deathwish || null, // Deathwish keyword: effect key fired when this leaves play.
    subtype: def.subtype || null, // For actions: "quest" marks persistent-action archetype.
    questKey: def.questKey || null, // For quests: identifies which quest definition is in play.
    ranged: def.ranged || false, // Ranged keyword: attacks from any row, consumes ammo per shot.
                                 // Ranged creatures cannot melee — they only fire (ammo-gated).
    ammoCost: def.ammoCost || 0, // For ranged creatures: ammo consumed per attack (printed as "Ammo N").
    forageCasts: 0, // Per-instance Forage cast counter (escalating cost). Resets at encounter end.
    inert: def.inert || false, // Inert keyword: cannot gain Force/Tempo/Insight/Resolve
    pitFighterWhileAlone: def.pitFighterWhileAlone || false, // Pit-Fighter's while-alone flag
    provocationChallenger: def.provocationChallenger || false, // Challenger's while-vs-opposing flag
    enraged: def.enraged || false, // Enraged keyword: +1 Force this turn per damage instance taken
    tribe: def.tribe || null,  // creature tribe (e.g., "goblin") — used by tribal-as-resource effects
    attackPatterns: def.attackPatterns ? [...def.attackPatterns] : [], // copied — equipment may mutate
    grantsAttackPatterns: def.grantsAttackPatterns || null, // equipment: patterns granted to host
    grantsStats: def.grantsStats || null, // equipment: stats granted to host (read by effectiveStat)
    equipment: [], // for creatures/structures: array of equipment attached to this host
    sleepCounter: 0,    // Sleeping keyword: turns remaining asleep. 0 = awake.
    wokeInPhase: null,  // phase name where damage woke this sleeper. Gates awake-actions (attack,
                        // move) while state.phase === wokeInPhase. Self-clears via the phase compare.
    flippedThisTurn: false, // true the turn a creature flips up; blocks movement that turn.
    meleeAttackersThisTurn: [], // instIds of creatures that dealt melee damage to this this turn.
                                // Read by Explosive Trap's deathwish. Reset at upkeep start.
    lastPos: null,      // last known position in a slot; recorded by fireLeavePlayTriggers so
                        // position-dependent leave-play effects (e.g., trap adjacency) work.
    marks: [],          // Marks system: per-instance permanent state. Each mark = { kind, side }.
                        // Persists through pile cycling and across encounters. Same-kind double
                        // mark = exile (handled in applyMark). Visible in all zones.
    text: def.text,
    aiHints: def.aiHints || {},
    revealed: true
  };
}

let _instCounter = 0;
function nextInstId() { return ++_instCounter; }

// Build a fresh per-location slot bundle. Each location holds its own creatures/structure/action,
// plus pending versions during a commit window, plus a per-location movement-tracker.
function freshLocation() {
  return {
    creatures: { fl: null, fr: null, bl: null, br: null },
    structure: null,
    action: null,
    pending: {
      creatures: { fl: null, fr: null, bl: null, br: null },
      structure: null,
      action: null,
      // Equipment played from hand: keyed by host position (fl/fr/bl/br). Each entry is an array
      // of pending equipment cards for that host. Resolves on end-of-phase flip; fizzles to your-side
      // junkyard if the host is gone by then.
      equipment: { fl: [], fr: [], bl: [], br: [] }
    },
    movedThisTurn: new Set(),
    // Ammo stockpile for this side at this location. Resets to 0 per encounter ("the wilderness
    // is fresh" — per CARD_DESIGN.md). Forage adds; ranged creatures consume on attack.
    ammo: 0
  };
}

function freshSide(deckKeys, owner) {
  const locations = [];
  for (let i = 0; i < LOCATION_COUNT; i++) locations.push(freshLocation());
  return {
    durability: 20,
    deck: shuffle(deckKeys.map(k => createCard(k, owner))),
    hand: [],          // hand is global to the side
    discard: [],       // discard is global to the side
    graveyard: [],     // graveyard is global to the side
    junkyard: [],      // junkyard zone — structures and equipment that have left play
    exile: [],         // exile zone — torn-up cards (permanent stat-buff actions, etc.); cannot be recovered
    locations          // per-location committed/pending state lives here
  };
}

// Convenience accessor: side.locations[loc].
function L(sideName, loc) { return state.sides[sideName].locations[loc]; }

// ---------- v3 run / overworld state ----------
// state.runDeck is the persistent player deck across encounters. It's a list of "deck entries":
// { defKey, mods: { force?: +N, ... } } so neutral encounters can permanently modify cards
// (Forge: +1 Force) or remove them (Siren: removed from this list entirely).
// A fresh card instance is created from each entry at encounter start.
function buildRunDeck() {
  return buildStartingDeck().map(defKey => ({ defKey, mods: {} }));
}

// Apply per-instance mods baked into the deck entry to a card object.
function applyRunMods(card, mods) {
  if (!mods) return card;
  if (mods.force) {
    card.force = (card.force || 0) + mods.force;
  }
  if (mods.tempo) {
    card.tempo = (card.tempo || 0) + mods.tempo;
  }
  if (mods.insight) {
    card.insight = (card.insight || 0) + mods.insight;
  }
  if (mods.durability && card.durability != null) {
    card.durability += mods.durability;
    card.durabilityMax = (card.durabilityMax || 0) + mods.durability;
  }
  // Marks persist across encounters via the run-deck entry. Each entry can carry an array of
  // { kind, side } marks that re-apply to the new instance when it enters a new encounter.
  if (mods.marks && mods.marks.length > 0) {
    card.marks = mods.marks.map(m => ({ kind: m.kind, side: m.side }));
  }
  return card;
}

function freshState() {
  return {
    // Run-scoped (persists across encounters):
    deckKey: null,                // chosen starter ("red" | "green"); null until picked at menu
    runDeck: [],                  // populated when deck is chosen
    runDurability: 20,            // player Durability persists across encounters
    world: makeFreshWorld(),     // overworld nodes/edges/pawn
    view: "menu",                 // "menu" | "overworld" | "encounter"
    runOver: null,                // null | "playerWin" | "playerLose"
    // Encounter-scoped (rebuilt at each encounter-load; null when on the overworld):
    turn: 1,
    phase: "setup",
    activeSide: "player",
    firstSide: "player",
    sides: null,                  // { player, ai } — built per encounter
    currentNodeId: null,          // destination node id (where pawn moves after clearing)
    encounterNodeIds: null,       // all node ids in the active encounter (locations)
    encounterDestId: null,        // node id the player chose to walk to after clearing
    encounterKind: null,          // "hostile" | "neutral" | "boss"
    encounterEndPending: null,    // null | "playerCleared" | "playerLeft" | "bossKilled" — set mid-turn, resolved at end of cleanup
    selectedCardId: null,
    selectedCommittedId: null,
    gameOver: null,               // encounter-scoped result before run-scoped runOver is updated
    log: []
  };
}

// Called from the start menu when the player picks a deck. Builds the runDeck and transitions
// to the overworld view.
function chooseDeckAndStartRun(deckKey) {
  state.deckKey = deckKey;
  state.runDeck = buildRunDeck();
  state.view = "overworld";
  render();
}

// Build a fresh world from WORLD_DEFS. Node status tracks per-node progress.
function makeFreshWorld() {
  return {
    nodes: WORLD_DEFS.nodes.map(n => ({ ...n, status: n.kind === "start" ? "completed" : "unvisited" })),
    edges: WORLD_DEFS.edges.map(e => [...e]),
    pawnAt: WORLD_DEFS.startNode,
    startNode: WORLD_DEFS.startNode,
    bossNode: WORLD_DEFS.bossNode
  };
}

// Find a node by id.
function getNode(nodeId) {
  return state.world.nodes.find(n => n.id === nodeId);
}

// Returns ids of nodes adjacent to the pawn that are legal targets to move to.
// Adjacent node ids of the pawn's current position.
function adjacentToPawn() {
  const pawn = state.world.pawnAt;
  const adj = [];
  for (const [a, b] of state.world.edges) {
    if (a === pawn) adj.push(b);
    else if (b === pawn) adj.push(a);
  }
  return adj;
}

// Adjacent node ids that are still unvisited — these are the locations a pawn-node click pulls
// into the encounter.
function unvisitedAdjacentsOfPawn() {
  return adjacentToPawn().filter(id => {
    const n = getNode(id);
    return n && n.status === "unvisited";
  });
}

// Returns the set of node ids that are *clickable* in the current overworld state.
// Two cases:
//   (A) The pawn's own node is clickable IFF there's at least one unvisited adjacent — clicking
//       it triggers an encounter that pulls in all those unvisited adjacents.
//   (B) Adjacent nodes are clickable IFF they are completed (cleared) — clicking walks the pawn
//       to that node, no encounter. Unvisited adjacents are not directly clickable; they get
//       engaged via the pawn-node click.
function legalMovesFromPawn() {
  const legal = [];
  const pawn = state.world.pawnAt;
  if (unvisitedAdjacentsOfPawn().length > 0) legal.push(pawn);
  for (const id of adjacentToPawn()) {
    const n = getNode(id);
    if (n && n.status === "completed") legal.push(id);
  }
  return legal;
}

// Build a fresh player side from the persistent run deck.
function freshPlayerSide() {
  const cards = state.runDeck.map(entry => {
    const c = createCard(entry.defKey, "player");
    applyRunMods(c, entry.mods);
    // Track which run-deck entry this instance came from so we can mutate the deck on Forge etc.
    c.runDeckEntry = entry;
    return c;
  });
  const locations = [];
  for (let i = 0; i < LOCATION_COUNT; i++) locations.push(freshLocation());
  return {
    durability: state.runDurability,  // carried over from previous encounters
    deck: shuffle(cards),
    hand: [],
    discard: [],
    graveyard: [],
    junkyard: [],      // junkyard zone — structures and equipment that have left play
    exile: [],
    locations
  };
}

// Build a fresh AI side. AI deck is the same starting deck for v3 (designer-tuned per-node decks
// arrive in v4+). Cards in the AI's slots are pre-placed from the node's contents and don't draw
// from this deck — but the deck still exists for reinforcements during the encounter.
function freshAiSide() {
  const cards = buildStartingDeck().map(k => createCard(k, "ai"));
  const locations = [];
  for (let i = 0; i < LOCATION_COUNT; i++) locations.push(freshLocation());
  return {
    durability: 20,                   // boss only — for non-boss encounters this isn't used
    deck: shuffle(cards),
    hand: [],
    discard: [],
    graveyard: [],
    junkyard: [],
    exile: [],
    locations
  };
}

// Load an encounter triggered by the player attempting to advance from their current pawn node.
// Per the unified-encounter framework: an encounter pulls in *all unvisited nodes adjacent to
// the pawn* as the encounter's locations. Each adjacent node contributes one location's worth of
// contents. After clearing, all those nodes become visited; the player picks one to walk to.
//
// `clickedNodeId` is the adjacent the player clicked (used as the destination after clearing).
function loadEncounterFromPawn(clickedNodeId) {
  const pawnNodeId = state.world.pawnAt;
  // Gather unvisited adjacents of the current pawn node (the encounter's locations).
  const encounterNodeIds = [];
  for (const [a, b] of state.world.edges) {
    let other = null;
    if (a === pawnNodeId) other = b;
    else if (b === pawnNodeId) other = a;
    if (!other) continue;
    const n = getNode(other);
    if (n && n.status === "unvisited" && !encounterNodeIds.includes(other)) {
      encounterNodeIds.push(other);
    }
  }
  if (encounterNodeIds.length === 0) {
    // No unvisited adjacents — just walk to the clicked node, no encounter.
    state.world.pawnAt = clickedNodeId;
    state.view = "overworld";
    render();
    return;
  }
  // Ensure the clicked node is included (it should be, since the player clicked an adjacent).
  if (!encounterNodeIds.includes(clickedNodeId)) {
    encounterNodeIds.unshift(clickedNodeId);
  }

  // Build per-location bookkeeping arrays from the pulled-in nodes.
  LOCATION_COUNT = encounterNodeIds.length;
  LOC_NAMES = encounterNodeIds.map(id => getNode(id).label);
  LOC_TEXT_KEYS = encounterNodeIds.map(id => getNode(id).locationTextKey || null);

  // Determine the encounter's overall kind. If any pulled-in node is hostile, encounter is hostile;
  // else if any is boss, boss; else neutral. (The slice has no boss; this is just future-proofing.)
  let encounterKind = "neutral";
  if (encounterNodeIds.some(id => getNode(id).kind === "boss")) encounterKind = "boss";
  else if (encounterNodeIds.some(id => getNode(id).kind === "hostile")) encounterKind = "hostile";

  state.sides = { player: freshPlayerSide(), ai: freshAiSide() };
  state.encounterNodeIds = encounterNodeIds;     // tracks which nodes are this encounter's locations
  state.encounterDestId = clickedNodeId;          // where the pawn moves after clearing
  state.currentNodeId = clickedNodeId;            // for legacy code paths that read this
  state.encounterKind = encounterKind;
  state.turn = 1;
  state.phase = "setup";
  state.firstSide = "player";
  state.gameOver = null;
  state.encounterEndPending = null;
  state.selectedCardId = null;
  state.selectedCommittedId = null;
  state.log = [];

  // Place each node's contents into the AI side's slot grid at that node's location index.
  for (let loc = 0; loc < encounterNodeIds.length; loc++) {
    const node = getNode(encounterNodeIds[loc]);
    const contents = node.contents;
    if (!contents) continue;
    if (contents.aiPlacements) {
      for (const placement of contents.aiPlacements) {
        const card = createCard(placement.defKey, "ai");
        card.revealed = false;
        placeIntoLocSlot(L("ai", loc), placement.slot, card);
        // Pre-attach equipment if specified. `equipWith` is an array of equipment defKeys to
        // attach to this card on encounter-load. Equipment cards are owned by "ai" (same side
        // as the host) and apply their attack-pattern grants immediately.
        if (placement.equipWith && placement.slot.kind === "creature") {
          for (const eqKey of placement.equipWith) {
            const eq = createCard(eqKey, "ai");
            eq.revealed = false;
            attachEquipmentToHost(eq, card, "ai");
          }
        }
      }
    }
    // Multi-card neutral placements: same shape as aiPlacements but cards are owned by "neutral".
    // Used for biome-native neutral encounter content (Champion's Rest creature + action, etc.).
    if (contents.neutralPlacements) {
      for (const placement of contents.neutralPlacements) {
        const card = createCard(placement.defKey, "neutral");
        card.revealed = false;
        placeIntoLocSlot(L("ai", loc), placement.slot, card);
        // Pre-attach equipment to neutral creatures too (e.g., Goblin Armaments' goblin-with-sword).
        if (placement.equipWith && placement.slot.kind === "creature") {
          for (const eqKey of placement.equipWith) {
            const eq = createCard(eqKey, "neutral");
            eq.revealed = false;
            attachEquipmentToHost(eq, card, "ai");  // hostSide is "ai" because neutrals occupy the AI side spatially
          }
        }
      }
    }
    // Legacy single-key path (Forge, Siren). Default slot inferred from card type.
    if (contents.neutralKey) {
      const neutralCard = createCard(contents.neutralKey, "neutral");
      neutralCard.revealed = false;
      const slot = neutralCard.type === "creature"
        ? { kind: "creature", pos: "fl" }
        : { kind: "structure" };
      placeIntoLocSlot(L("ai", loc), slot, neutralCard);
    }
  }

  state.view = "encounter";
  const labelsList = LOC_NAMES.join(" + ");
  logEntry(`— Encounter: ${labelsList} (${encounterKind}) —`, "phase");
  startNewTurn();
}

// Legacy: kept as an alias in case anything calls loadEncounterFromNode directly. Treats nodeId
// as both pawn-anchor *and* destination — simulates the old "encounter at this single node" flow.
function loadEncounterFromNode(nodeId) {
  // Set pawn temporarily so adjacency pulls from here.
  state.world.pawnAt = nodeId;
  loadEncounterFromPawn(nodeId);
}

// Helper: place a card directly into a location's committed slot (bypasses the play queue).
// Used during encounter-load to set up pre-placed AI / neutral cards.
function placeIntoLocSlot(lc, slot, card) {
  if (slot.kind === "creature") {
    lc.creatures[slot.pos] = card;
  } else if (slot.kind === "structure") {
    lc.structure = card;
  } else if (slot.kind === "action") {
    lc.action = card;
  }
}

// Click handler for overworld nodes. Two cases:
//  - Click the pawn's own node (with unvisited adjacents present) → trigger encounter pulling in
//    all unvisited adjacents as the encounter's locations.
//  - Click a cleared adjacent → walk pawn there (no encounter).
function moveTo(nodeId) {
  const target = getNode(nodeId);
  if (!target) return;
  if (!legalMovesFromPawn().includes(nodeId)) return;

  // Click on the pawn node: trigger encounter.
  if (nodeId === state.world.pawnAt) {
    // The encounter pulls in all unvisited adjacents. The "destination" (which adjacent the pawn
    // walks to after clearing) is undefined here — the player chooses post-encounter by clicking
    // a cleared adjacent. For now we set destId to the first unvisited adjacent as a placeholder;
    // it's overwritten by the post-encounter walk-click flow.
    const unvisited = unvisitedAdjacentsOfPawn();
    if (unvisited.length === 0) return;
    loadEncounterFromPawn(unvisited[0]);  // any adjacent works as the temporary dest anchor
    return;
  }

  // Click on a cleared adjacent: walk the pawn there, no encounter.
  state.world.pawnAt = nodeId;
  render();
}

// End the current encounter and return to the overworld. Marks all encounter nodes completed.
// Pawn stays at the original starting node — the player walks to a cleared adjacent post-encounter
// by clicking on the overworld map.
function endEncounter(result) {
  // result: "playerCleared" | "playerLeft" | "playerLost" | "bossKilled"
  const encounterNodeIds = state.encounterNodeIds || [];

  // Persist player Durability into run state.
  state.runDurability = state.sides.player.durability;

  // Acquisition: any card flagged `acquired` (taken via Recruit, Goblin Armaments rewire, etc.)
  // joins the run-deck for future encounters. Scan all zones — the card might be in slots, in
  // the player's graveyard, discard, hand, or junkyard. Equipment is scanned both attached to
  // player creatures and in the junkyard (where it goes when its host died).
  if (result !== "playerLost" && state.sides && state.sides.player) {
    const p = state.sides.player;
    const acquired = [];
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L("player", loc);
      for (const pos of ["fl","fr","bl","br"]) {
        const c = lc.creatures[pos];
        if (!c) continue;
        if (c.acquired) acquired.push(c);
        if (c.equipment) {
          for (const eq of c.equipment) {
            if (eq.acquired) acquired.push(eq);
          }
        }
      }
    }
    for (const c of [...p.hand, ...p.discard, ...p.graveyard, ...p.junkyard]) {
      if (c.acquired) acquired.push(c);
    }
    for (const c of acquired) {
      const mods = {};
      if (c.marks && c.marks.length > 0) {
        mods.marks = c.marks.map(m => ({ kind: m.kind, side: m.side }));
      }
      state.runDeck.push({ defKey: c.defKey, mods });
      logEntry(`Acquired: ${c.name} joins your deck.`, "win");
    }
  }

  const cleanup = () => {
    state.view = "overworld";
    state.sides = null;
    state.currentNodeId = null;
    state.encounterKind = null;
    state.encounterNodeIds = null;
    state.encounterDestId = null;
    state.encounterEndPending = null;
    state.gameOver = null;
  };

  if (result === "playerLost") {
    state.runOver = "playerLose";
    cleanup();
    render();
    return;
  }
  // Mark every node in the encounter as completed. (Includes "bossKilled" — slice has no boss
  // so it's just here for future-proofing.)
  for (const id of encounterNodeIds) {
    const n = getNode(id);
    if (n) n.status = "completed";
  }
  if (result === "bossKilled") {
    state.runOver = "playerWin";
  }
  cleanup();
  render();
}

// Check whether the current encounter has ended naturally and call endEncounter accordingly.
// For v3:
//   - Boss encounter: ends when boss-side has no creatures or structures left, OR when player Durability=0.
//     (No retreat condition — boss never retreats; you must clear the board.)
//   - Hostile encounter: ends when AI side has no creatures or structures (effectively "AI cleared").
//   - Neutral encounter: ends when the neutral card has consumed itself OR when the player presses
//     the leave-encounter button (handled separately in UI).
// Mid-turn check: if the encounter's win condition is met, mark it as pending end. The actual
// endEncounter call is deferred to the very end of cleanup so all phases of the current turn
// finish first (combat damage, location-text triggers like Champion's Rest, etc.). Player-lost
// is the one exception — if the player's summoner falls, the encounter ends immediately.
function checkEncounterEnd() {
  if (!state.sides) return;
  if (state.sides.player.durability <= 0) {
    logEntry(`Your summoner falls. Run lost.`, "lose");
    endEncounter("playerLost");
    return;
  }
  if (state.encounterEndPending) return;  // already flagged
  // Count non-player presence at all locations.
  let aiCreatures = 0, neutralCards = 0, hasStructure = false;
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L("ai", loc);
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.creatures[pos];
      if (!c) continue;
      if (c.owner === "neutral") neutralCards++;
      else aiCreatures++;
    }
    if (lc.structure) {
      if (lc.structure.owner === "neutral") neutralCards++;
      else hasStructure = true;
    }
  }
  if (state.encounterKind === "boss") {
    if (aiCreatures === 0 && !hasStructure) {
      logEntry(`The boss is defeated. (Encounter ends at end of turn.)`, "win");
      state.encounterEndPending = "bossKilled";
    }
    return;
  }
  if (state.encounterKind === "hostile") {
    if (aiCreatures === 0 && !hasStructure) {
      logEntry(`Hostile presence cleared. (Encounter ends at end of turn.)`, "win");
      state.encounterEndPending = "playerCleared";
    }
    return;
  }
  if (state.encounterKind === "neutral") {
    if (neutralCards === 0 && aiCreatures === 0 && !hasStructure) {
      logEntry(`Locations cleared. (Encounter ends at end of turn.)`, "phase");
      state.encounterEndPending = "playerLeft";
    }
    return;
  }
}

let state = freshState();

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- Logging ----------
function logEntry(msg, kind = "") {
  state.log.push({ msg, kind });
  if (state.log.length > 200) state.log.shift();
}

// ---------- Stat totals ----------
// ---------- Stat totals (per location) ----------

// Committed-only stat total at a location. Pending plays do NOT count.
// This is what cost requirements check against — costs are paid by the *target location's*
// committed presence only.
// Compute the effective value of a stat on a card, given the card's location context.
// Returns base + scoped buffs (from grantUntilEndOfTurn — already applied to card[stat]) +
// conditional buffs (Pit-Fighter alone, Provocation Challenger) + equipment grants.
// Inert filters: cards with `inert: true` cannot gain Force/Tempo/Insight/Resolve.
//
// The base `card[stat]` already reflects:
//   - Printed stat
//   - Permanent run-deck mods (applyRunMods at card creation)
//   - End-of-turn buffs (grantUntilEndOfTurn mutates this directly; reverted at cleanup)
//
// What this function adds on top:
//   - Conditional while-X buffs computed from current board state
//   - Stats granted by equipment attached to this card
function effectiveStat(card, side, loc, stat) {
  if (!card) return 0;
  // Sleeping zeroes Force: no combat presence, no stat-line contribution. Other stats still count
  // (Tempo, Insight, etc. — the design only nails down Force-zero for sleepers explicitly).
  if (card.sleepCounter > 0 && stat === "force") return 0;
  const base = card[stat] || 0;
  let bonus = 0;

  // Conditional buffs — only apply to creatures in play, with a known location.
  if (card.type === "creature" && side != null && loc != null) {
    const lc = L(side, loc);
    if (lc && lc.creatures) {
      // Pit-Fighter "+2 Force while no other creature on your side here" (R5).
      if (card.pitFighterWhileAlone && stat === "force") {
        let others = 0;
        for (const p of ["fl","fr","bl","br"]) {
          const c = lc.creatures[p];
          if (c && c !== card) others++;
        }
        if (others === 0) bonus += 2;
      }
      // Pit-Goblin Challenger Provocation: self gains +1 Force per opposing creature here (RR3).
      if (card.provocationChallenger && stat === "force") {
        const opLoc = L(other(side), loc);
        if (opLoc && opLoc.creatures) {
          for (const p of ["fl","fr","bl","br"]) {
            if (opLoc.creatures[p]) bonus += 1;
          }
        }
      }
    }
  }

  // Provocation reverse-buff: every creature on the other side from a Challenger gets +1 Force
  // per Challenger that's at the same location on the opposing side. Computed from this card's
  // perspective: scan the *other* side at this location for live Challengers.
  if (card.type === "creature" && side != null && loc != null && stat === "force") {
    const opLoc = L(other(side), loc);
    if (opLoc && opLoc.creatures) {
      for (const p of ["fl","fr","bl","br"]) {
        const c = opLoc.creatures[p];
        if (c && c.provocationChallenger) bonus += 1;
      }
    }
  }

  // Equipment grants. Each attached equipment may grant stats to its host.
  if (card.equipment && card.equipment.length > 0) {
    for (const eq of card.equipment) {
      if (eq.grantsStats && eq.grantsStats[stat]) bonus += eq.grantsStats[stat];
    }
  }

  // Inert: cannot gain Force/Tempo/Insight/Resolve from any source. Bonus is filtered out.
  if (card.inert && ["force","tempo","insight","resolve"].includes(stat)) {
    return base;  // base already excludes scoped buffs that grantUntilEndOfTurn already filtered
  }

  return base + bonus;
}

// Sum of a stat across the location, on a side. For Force, only front-row creatures count
// (per design: Force at a location = front-row Force). For other stats, all creatures + structure.
function committedStatTotal(side, loc, stat) {
  const lc = L(side, loc);
  let t = 0;
  // Per the unified face-down rule: a face-down card has no stat presence.
  if (stat === "force") {
    // Front-row creatures only contribute Force at the location.
    for (const pos of ["fl", "fr"]) {
      const c = lc.creatures[pos];
      if (c && c.revealed !== false) t += effectiveStat(c, side, loc, stat);
    }
  } else {
    for (const pos of ["fl", "fr", "bl", "br"]) {
      const c = lc.creatures[pos];
      if (c && c.revealed !== false) t += effectiveStat(c, side, loc, stat);
    }
  }
  if (lc.structure && lc.structure.revealed !== false) t += lc.structure[stat] || 0;
  return t;
}

// Visible stat total at a location: committed + pending. Used for display only.
function visibleStatTotal(side, loc, stat) {
  const lc = L(side, loc);
  let t = committedStatTotal(side, loc, stat);
  // Pending plays — same front-row-only filter for Force.
  if (stat === "force") {
    for (const pos of ["fl", "fr"]) {
      if (lc.pending.creatures[pos]) t += lc.pending.creatures[pos][stat] || 0;
    }
  } else {
    for (const pos of ["fl", "fr", "bl", "br"]) {
      if (lc.pending.creatures[pos]) t += lc.pending.creatures[pos][stat] || 0;
    }
  }
  if (lc.pending.structure) t += lc.pending.structure[stat] || 0;
  return t;
}

// Sum a stat across all locations on a side (for global-economy effects later, e.g., Insight→draw).
// Not used by per-location cost checks — those use committedStatTotal(side, loc, stat).
function globalStatTotal(side, stat) {
  let t = 0;
  for (let loc = 0; loc < LOCATION_COUNT; loc++) t += committedStatTotal(side, loc, stat);
  return t;
}

// ---------- Card play legality ----------
function canPay(side, loc, card) {
  // Cost is checked against committed presence at the *target location only*. Per design:
  // "every card has a stat-presence cost requirement at its location."
  // Compound costs: every stat in card.costs must be met by committed presence at the location.
  const costs = effectiveCosts(card);
  for (const stat of Object.keys(costs)) {
    if (committedStatTotal(side, loc, stat) < costs[stat]) return false;
  }
  return true;
}

// Compute the effective cost of a card at this moment. Most cards just return `card.costs`.
// Forage's escalating-per-instance cost: each cast bumps the per-card counter, so the next play
// of that same instance pays `base + forageCasts` Tempo. Counter resets at encounter end.
function effectiveCosts(card) {
  const base = card.costs ? { ...card.costs } : {};
  if (card.effect === "forageAddAmmo" && card.forageCasts > 0) {
    base.tempo = (base.tempo || 0) + card.forageCasts;
  }
  return base;
}

// True if the side has any location where this card could legally land (cost + open slot).
// Used by hand-card "playable?" highlighting.
function cardHasAnyLegalPlay(side, card) {
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    if (!canPay(side, loc, card)) continue;
    if (legalTargetsForCard(side, loc, card).length > 0) return true;
  }
  return false;
}

// A slot is occupied if either committed or pending has something there.
function slotOccupied(side, loc, kind, pos) {
  const lc = L(side, loc);
  if (kind === "creature") return !!(lc.creatures[pos] || lc.pending.creatures[pos]);
  if (kind === "structure") return !!(lc.structure || lc.pending.structure);
  if (kind === "action") return !!(lc.action || lc.pending.action);
  return false;
}

// Legal placement targets for a card at a specific location.
// (Cost is NOT checked here — caller does that, since cost depends on target location.)
function legalTargetsForCard(side, loc, card) {
  const targets = [];
  if (card.type === "creature") {
    for (const pos of ["fl", "fr", "bl", "br"]) {
      if (slotOccupied(side, loc, "creature", pos)) continue;
      targets.push({ loc, kind: "creature", pos });
    }
  } else if (card.type === "structure") {
    if (!slotOccupied(side, loc, "structure")) targets.push({ loc, kind: "structure" });
  } else if (card.type === "action") {
    if (!slotOccupied(side, loc, "action")) targets.push({ loc, kind: "action" });
  } else if (card.type === "equipment") {
    // Equipment legal where a face-up committed creature is present on this side at loc, and the
    // host is below the equipment cap.
    const lc = L(side, loc);
    for (const pos of ["fl", "fr", "bl", "br"]) {
      const c = lc.creatures[pos];
      if (!c || c.revealed === false) continue;
      if ((c.equipment || []).length >= EQUIPMENT_CAP_PER_HOST) continue;
      targets.push({ loc, kind: "equipment", pos });
    }
  }
  return targets;
}

// Place a card from hand into a side's pending slots at a specific location.
function placeCard(side, card, target) {
  const s = state.sides[side];
  const idx = s.hand.findIndex(c => c.instId === card.instId);
  if (idx === -1) return false;
  s.hand.splice(idx, 1);
  const lc = L(side, target.loc);
  if (card.type === "creature") {
    lc.pending.creatures[target.pos] = card;
  } else if (card.type === "structure") {
    lc.pending.structure = card;
  } else if (card.type === "action") {
    lc.pending.action = card;
  } else if (card.type === "equipment") {
    // Equipment is played into a creature's slot. Host is the creature (committed or pending) at
    // that position; equipment attaches to it on end-of-phase flip. Stored face-down in pending.
    if (!lc.pending.equipment[target.pos]) lc.pending.equipment[target.pos] = [];
    lc.pending.equipment[target.pos].push(card);
  }
  return true;
}

// Reverse a pending placement at a specific location: return the pending card to the side's hand.
function cancelPendingPlacement(side, loc, kind, pos) {
  const lc = L(side, loc);
  let card = null;
  if (kind === "creature") {
    card = lc.pending.creatures[pos];
    lc.pending.creatures[pos] = null;
  } else if (kind === "structure") {
    card = lc.pending.structure;
    lc.pending.structure = null;
  } else if (kind === "action") {
    card = lc.pending.action;
    lc.pending.action = null;
  } else if (kind === "equipment") {
    // Pop the most-recently-added pending equipment at this position (LIFO undo).
    const arr = lc.pending.equipment[pos];
    if (arr && arr.length > 0) card = arr.pop();
  }
  if (card) state.sides[side].hand.push(card);
  return card;
}

// At end of main phase, commit all pending placements into the committed slots, at every location.
// AI commits go down face-down (revealed=false); player's own cards remain visible to the player.
// The reveal phase (next step) flips AI cards to face-up.
// At end of main, both sides commit pending → committed slots. Per the unified face-down rule,
// ALL just-committed cards are face-down (revealed=false) until end of phase, regardless of side.
// They then flip up via endOfPhaseRevealAndResolve in Tempo order.
//
// The fog-of-war asymmetry (the player can see their own committed cards, but AI's are hidden) is
// a UI/render concern, not a game-state concern: the player's face-down cards are rendered face-up
// to the owner (see makeCardEl), but their underlying `revealed` state is `false` until they flip.
// This is what makes player flip-up triggers fire — they go through the same end-of-phase queue
// as AI commits.
function commitPendingPlays() {
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(sideName, loc);
      for (const pos of ["fl", "fr", "bl", "br"]) {
        if (lc.pending.creatures[pos]) {
          const card = lc.pending.creatures[pos];
          card.revealed = false;
          lc.creatures[pos] = card;
          lc.pending.creatures[pos] = null;
          if (sideName === "player") {
            logEntry(`You commit ${card.name} to ${LOC_NAMES[loc]} ${pos} (face-down).`);
          } else {
            logEntry(`AI commits a card to ${LOC_NAMES[loc]} ${pos} (face-down).`);
          }
        }
      }
      if (lc.pending.structure) {
        const card = lc.pending.structure;
        card.revealed = false;
        lc.structure = card;
        lc.pending.structure = null;
        if (sideName === "player") logEntry(`You commit ${card.name} (structure, face-down) at ${LOC_NAMES[loc]}.`);
        else logEntry(`AI commits a structure at ${LOC_NAMES[loc]} (face-down).`);
      }
      if (lc.pending.action) {
        const card = lc.pending.action;
        card.revealed = false;
        lc.action = card;
        lc.pending.action = null;
        if (sideName === "player") logEntry(`You commit ${card.name} (action, face-down) at ${LOC_NAMES[loc]}.`);
        else logEntry(`AI commits an action at ${LOC_NAMES[loc]} (face-down).`);
      }
      // Equipment pending stays in pending.equipment[pos] (no committed slot). Mark face-down for
      // the unified flip rule; attach happens in endOfPhaseRevealAndResolve.
      for (const pos of ["fl","fr","bl","br"]) {
        const arr = lc.pending.equipment[pos];
        if (!arr || arr.length === 0) continue;
        for (const eq of arr) {
          eq.revealed = false;
          if (sideName === "player") logEntry(`You commit ${eq.name} (equipment, face-down) to ${LOC_NAMES[loc]} ${pos}.`);
          else logEntry(`AI commits an equipment at ${LOC_NAMES[loc]} ${pos} (face-down).`);
        }
      }
    }
  }
}

// Flip every face-down committed card to face-up at every location.
function revealAllFaceDown() {
  let revealedAny = false;
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(sideName, loc);
      for (const pos of ["fl", "fr", "bl", "br"]) {
        const c = lc.creatures[pos];
        if (c && !c.revealed) {
          c.revealed = true; revealedAny = true;
          if (sideName === "ai") logEntry(`Revealed: ${c.name} at ${LOC_NAMES[loc]} ${pos}.`);
        }
      }
      if (lc.structure && !lc.structure.revealed) {
        lc.structure.revealed = true; revealedAny = true;
        if (sideName === "ai") logEntry(`Revealed: ${lc.structure.name} (AI structure at ${LOC_NAMES[loc]}).`);
      }
      if (lc.action && !lc.action.revealed) {
        lc.action.revealed = true; revealedAny = true;
        if (sideName === "ai") logEntry(`Revealed: ${lc.action.name} (AI action at ${LOC_NAMES[loc]}).`);
      }
    }
  }
  return revealedAny;
}

// Move a committed creature within a single location's slot grid.
// v2 holds cross-location movement for v3+ — movement is always within the same location.
// One move per creature per turn. Allowed in any direction (front<->back same column, left<->right same row).
function moveCommittedCreature(side, loc, fromPos, toPos) {
  const lc = L(side, loc);
  const creature = lc.creatures[fromPos];
  if (!creature) return false;
  // Face-down: can't move (inert per unified rule).
  if (creature.revealed === false) return false;
  // Inert: cannot use the normal once-per-turn move. Effects (push, swap, etc.) can still move
  // an Inert creature; the player's default move action cannot.
  if (creature.inert) return false;
  // Sleeping: same rule as Inert for normal movement. Effects can still relocate a sleeper.
  if (creature.sleepCounter > 0) return false;
  // Groggy: just woke this phase. Can't take awake actions (move, attack) until the next phase.
  if (creature.wokeInPhase === state.phase) return false;
  // A creature that flipped up this turn can't move this turn.
  if (creature.flippedThisTurn) return false;
  if (lc.movedThisTurn.has(creature.instId)) return false;
  if (slotOccupied(side, loc, "creature", toPos)) return false;
  if (!isAdjacent(fromPos, toPos)) return false;

  lc.creatures[fromPos] = null;
  lc.creatures[toPos] = creature;
  lc.movedThisTurn.add(creature.instId);
  logEntry(`${side === "player" ? "You" : "AI"} moves ${creature.name} ${fromPos} → ${toPos} at ${LOC_NAMES[loc]}.`);
  return true;
}

function isAdjacent(a, b) {
  const adj = {
    fl: ["fr", "bl"],
    fr: ["fl", "br"],
    bl: ["fl", "br"],
    br: ["fr", "bl"]
  };
  return adj[a] && adj[a].includes(b);
}

// Which card types can be committed into a slot during the current phase?
// Permanents (creatures, structures) only commit during main. Actions can be committed during
// any phase that is a commit window — in v1 that's main and combat-reveal.
function isCommitWindowFor(cardType) {
  // Creatures and structures only commit during main. Actions and equipment commit in any
  // player-interactive phase (upkeep, draw, main, combat-reveal, cleanup).
  const interactivePhases = ["upkeep", "draw", "main", "combat-reveal", "cleanup"];
  if (cardType === "creature" || cardType === "structure") {
    return state.phase === "main";
  }
  if (cardType === "action" || cardType === "equipment") {
    return interactivePhases.includes(state.phase);
  }
  return false;
}

// ---------- Combat preview ----------
// Returns:
//   attackers:   instId -> { targetLabel, damage, killsTarget }
//   willDie:     Set of instIds that die in simulated combat
//   summonerHits: { player, ai }
//
// Combat is per-location: creatures at location L attack creatures at the same location L.
// Cross-location attacks don't exist in v2. Per-location, we use the same Tempo hierarchy as v1.
function computeCombatPreview() {
  // Per-location snapshot of the side's creatures + the side's action at that location.
  function snapshotLoc(side, loc) {
    const lc = L(side, loc);
    const cs = {};
    for (const pos of ["fl", "fr", "bl", "br"]) {
      const c = lc.creatures[pos] || lc.pending.creatures[pos] || null;
      cs[pos] = c ? { instId: c.instId, name: c.name, force: c.force || 0, tempo: c.tempo || 0, durability: c.durability, revealed: c.revealed, sleepCounter: c.sleepCounter || 0, wokeInPhase: c.wokeInPhase || null, ranged: !!c.ranged, ammoCost: c.ammoCost || 0 } : null;
    }
    const action = lc.action || lc.pending.action || null;
    return {
      creatures: cs,
      action: action ? { instId: action.instId, name: action.name, tempo: action.tempo || 0, effect: action.effect, revealed: action.revealed } : null,
      ammo: lc.ammo || 0
    };
  }
  // Build per-location snapshots for both sides; summoner durabilities are global per side.
  const sim = { player: { durability: state.sides.player.durability, locs: [] },
                 ai:     { durability: state.sides.ai.durability,     locs: [] } };
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    sim.player.locs.push(snapshotLoc("player", loc));
    sim.ai.locs.push(snapshotLoc("ai", loc));
  }

  // Per-location side-priority based on local Tempo (within a single location).
  function simLocalTempo(side, loc) {
    const cs = sim[side].locs[loc].creatures;
    let t = 0;
    for (const pos of ["fl", "fr", "bl", "br"]) {
      if (cs[pos]) t += cs[pos].tempo || 0;
    }
    return t;
  }
  function sidePriorityRankAt(side, loc) {
    const a = simLocalTempo("player", loc), b = simLocalTempo("ai", loc);
    if (a > b) return side === "player" ? 0 : 1;
    if (b > a) return side === "ai" ? 0 : 1;
    return side === state.firstSide ? 0 : 1;
  }

  // Simulate queued actions per location before creature combat. Each location's actions resolve
  // independently in its own Tempo order. Counterspell hits actions at the same location only
  // (default scope is "here").
  // Tracks summoner hits from spell fall-through during preview, fed into summonerHits below.
  const spellFallThrough = { player: 0, ai: 0 };

  // Helper: simulate a damage instance with fall-through. Mirrors dealDamageAtLoc in real resolve.
  // Face-down cards are inert per the unified rule and not legal damage targets.
  //
  // PILLAR 10 / preview-honesty rule: if there are multiple legal random targets, we DO NOT pick
  // one — we leave the sim board untouched. This prevents the preview from leaking the random
  // pick by consequence (e.g., "combat preview shows my Recruit swinging through to summoner →
  // therefore the Spark must have killed the Mage"). The player sees combat as it would play out
  // *if the spell didn't fire*; they know the spell will fire but not which target it picks.
  //
  // Deterministic cases (0 targets → fall-through to summoner; 1 target → known pick) DO apply,
  // because the outcome is knowable without random information.
  function simDamageAtLoc(sourceSide, lx, dmg) {
    const enemySide = other(sourceSide);
    const enemyLoc = sim[enemySide].locs[lx];
    const targets = ["fl", "fr", "bl", "br"]
      .map(pos => ({ pos, c: enemyLoc.creatures[pos] }))
      .filter(x => x.c && x.c.revealed !== false);
    if (targets.length === 0) {
      // Deterministic fall-through to summoner.
      spellFallThrough[enemySide] += dmg;
      return;
    }
    if (targets.length === 1) {
      // Deterministic single-target pick.
      const pick = targets[0];
      pick.c.durability -= dmg;
      if (pick.c.durability <= 0) enemyLoc.creatures[pick.pos] = null;
      return;
    }
    // Multiple legal random targets: don't apply the damage. Combat preview reflects pre-spell
    // board state so the random pick remains hidden until reveal.
  }

  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const actionCandidates = [];
    for (const sideName of ["player", "ai"]) {
      if (sim[sideName].locs[loc].action) actionCandidates.push({ side: sideName, action: sim[sideName].locs[loc].action });
    }
    actionCandidates.sort((a, b) => {
      if (a.action.tempo !== b.action.tempo) return b.action.tempo - a.action.tempo;
      return a.side === state.firstSide ? -1 : 1;
    });
    for (const ac of actionCandidates) {
      if (sim[ac.side].locs[loc].action !== ac.action) continue;
      if (ac.action.effect === "counterspell") {
        const opp = sim[other(ac.side)].locs[loc];
        if (opp.action) opp.action = null;
      } else if (ac.action.effect === "deal2") {
        simDamageAtLoc(ac.side, loc, 2);
      } else if (ac.action.effect === "deal1all") {
        // Scope-extended damage: 1 per location, with fall-through per empty location.
        for (let l2 = 0; l2 < LOCATION_COUNT; l2++) {
          simDamageAtLoc(ac.side, l2, 1);
        }
      }
      sim[ac.side].locs[loc].action = null;
    }
  }
