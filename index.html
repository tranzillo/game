    logEntry(`  ${actionName} (${sourceSide}${actionLocLabel}) → ${enemySide} summoner for ${dmg}. (${enemySide} Durability: ${state.sides[enemySide].durability}) [fall-through]`, "combat-detail");
    return;
  }
  const pick = targets[Math.floor(Math.random() * targets.length)];
  pick.c.durability -= dmg;
  const pickReason = targets.length === 1 ? "[only legal target]" : `[random pick from ${targets.length}]`;
  logEntry(`  ${actionName} (${sourceSide}${actionLocLabel}) → ${pick.c.name} (${enemySide} ${LOC_NAMES[loc]} ${pick.pos}) for ${dmg}. ${pickReason}`, "combat-detail");
  if (pick.c.durability <= 0) {
    logEntry(`    ${pick.c.name} is destroyed.`, "combat-detail");
    // Tokens don't go to graveyard — they have no representation in any zone outside the battlefield.
    if (!pick.c.isToken) state.sides[enemySide].graveyard.push(pick.c);
    enemyLoc.creatures[pick.pos] = null;
  }
}

function resolveAction(side, loc) {
  const lc = L(side, loc);
  const s = state.sides[side];
  if (!lc.action) return;
  const action = lc.action;
  let exitZone = "discard";

  if (action.effect === "deal2") {
    // Deal 2 damage to a random enemy creature *here* (or fall through to summoner).
    dealDamageAtLoc(side, loc, 2, action.name, ` @${LOC_NAMES[loc]}`);
  } else if (action.effect === "counterspell") {
    // Counterspell: clear the opposing action at *this* location (default scope "here").
    const oppLoc = L(other(side), loc);
    if (oppLoc.action) {
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) counters ${oppLoc.action.name} (${other(side)}) — to graveyard.`, "combat-detail");
      state.sides[other(side)].graveyard.push(oppLoc.action);
      oppLoc.action = null;
    } else {
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) finds no opposing action here — fizzles, exits to graveyard.`, "combat-detail");
    }
    exitZone = "graveyard";
  } else if (action.effect === "deal1all") {
    // SCOPE EXAMPLE: deal 1 damage to a random enemy creature at EACH location.
    // Per the universal fall-through rule, an empty location → 1 damage to the opposing summoner
    // (one fall-through instance per empty location). A scope-effect on an empty board hits the
    // summoner once *per empty location*.
    for (let l2 = 0; l2 < LOCATION_COUNT; l2++) {
      dealDamageAtLoc(side, l2, 1, action.name, ``);
    }
  }
  s[exitZone].push(action);
  lc.action = null;
}

// Resolve all queued actions across all locations in Tempo order. Higher Tempo resolves first;
// ties broken by side priority. Each (side, loc) action is its own candidate.
function resolveAllActions() {
  const candidates = [];
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const action = L(sideName, loc).action;
      if (action) candidates.push({ side: sideName, loc, action, tempo: action.tempo || 0 });
    }
  }
  if (candidates.length === 0) return;
  candidates.sort((a, b) => {
    if (a.tempo !== b.tempo) return b.tempo - a.tempo;
    // Side-priority tiebreak — globally, by state.firstSide. (Per-location tiebreak via local
    // Tempo totals would be more correct but adds complexity for little gain at v2 scale.)
    if (a.side === state.firstSide && b.side !== state.firstSide) return -1;
    if (b.side === state.firstSide && a.side !== state.firstSide) return 1;
    // Same side, same Tempo — left-to-right by location.
    return a.loc - b.loc;
  });
  logEntry(`Actions resolve:`, "combat-header");
  for (const cand of candidates) {
    if (state.gameOver) return;
    // Re-check that the action is still in the slot — Counterspell at this location may have removed it.
    if (L(cand.side, cand.loc).action !== cand.action) {
      logEntry(`  ${cand.action.name} (${cand.side} @${LOC_NAMES[cand.loc]}) was countered before resolving.`, "combat-detail");
      continue;
    }
    resolveAction(cand.side, cand.loc);
  }
}

// Unified end-of-phase reveal-and-resolve. Per the design's Tempo-ordered reveal rule, face-down
// cards flip up in Tempo order — and crucially, a higher-Tempo action that flips up resolves
// BEFORE lower-Tempo cards have flipped up. This means a Spark (Tempo 1) flipping up first sees a
// still-face-down Mage (Tempo 0) at the same location and cannot target it (face-down = inert).
//
// Each event is sorted by Tempo desc, then side priority, then location/position. Events are:
//   - "flip" — a face-down creature/structure becomes face-up (no other effect in v3)
//   - "action" — an action resolves (flipping it up if face-down, then executing its effect)
function endOfPhaseRevealAndResolve() {
  const events = [];
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(sideName, loc);
      // Face-down creatures: flip events.
      for (const pos of ["fl","fr","bl","br"]) {
        const c = lc.creatures[pos];
        if (c && c.revealed === false) {
          events.push({ kind: "flip", side: sideName, loc, where: "creature", pos, card: c, tempo: c.tempo || 0 });
        }
      }
      // Face-down structures: flip events.
      if (lc.structure && lc.structure.revealed === false) {
        events.push({ kind: "flip", side: sideName, loc, where: "structure", card: lc.structure, tempo: lc.structure.tempo || 0 });
      }
      // Actions in slots: action-resolve events (they flip up as part of resolving).
      if (lc.action) {
        events.push({ kind: "action", side: sideName, loc, card: lc.action, tempo: lc.action.tempo || 0 });
      }
    }
  }
  if (events.length === 0) return;

  // Sort by Tempo desc, then side priority on Tempo ties, then location, then position-in-grid.
  const POS_RANK = { fl: 0, fr: 1, bl: 2, br: 3, structure: 4, action: 5 };
  events.sort((a, b) => {
    if (a.tempo !== b.tempo) return b.tempo - a.tempo;
    if (a.side !== b.side) {
      if (a.side === state.firstSide) return -1;
      return 1;
    }
    if (a.loc !== b.loc) return a.loc - b.loc;
    const ar = POS_RANK[a.pos || a.where] ?? 99;
    const br = POS_RANK[b.pos || b.where] ?? 99;
    return ar - br;
  });

  logEntry(`Reveal & resolve queue (priority: ${state.firstSide}, sorted Tempo desc → priority → location → position):`, "combat-header");
  for (const ev of events) {
    const where = ev.where === "creature" ? ev.pos : ev.where;
    logEntry(`  · ${ev.side}/${LOC_NAMES[ev.loc]}/${where} — ${ev.card.name} (T${ev.tempo}) [${ev.kind}]`, "combat-detail");
  }
  for (const ev of events) {
    if (state.gameOver) return;
    if (ev.kind === "flip") {
      // Re-check the slot — earlier action at this Tempo may have destroyed it.
      const lc = L(ev.side, ev.loc);
      const stillThere = ev.where === "creature" ? lc.creatures[ev.pos] === ev.card : lc.structure === ev.card;
      if (!stillThere) {
        logEntry(`  → ${ev.card.name} (${ev.side} ${LOC_NAMES[ev.loc]} ${ev.pos || ev.where}) skipped: removed before flipping.`, "combat-detail");
        continue;
      }
      ev.card.revealed = true;
      if (ev.side === "ai") {
        const where = ev.where === "creature" ? `${LOC_NAMES[ev.loc]} ${ev.pos}` : `${LOC_NAMES[ev.loc]} (structure)`;
        logEntry(`  → Revealed: ${ev.card.name} at ${where}.`, "combat-detail");
      } else {
        const where = ev.where === "creature" ? `${LOC_NAMES[ev.loc]} ${ev.pos}` : `${LOC_NAMES[ev.loc]} (structure)`;
        logEntry(`  → Your ${ev.card.name} flips up at ${where}.`, "combat-detail");
      }
      // Fire the card's flip-up trigger if it has one. Triggers fire AFTER the card is face-up
      // (so the card itself is on the board for any "this gains X" effects).
      fireFlipUpTrigger(ev.side, ev.loc, ev.card);
    } else if (ev.kind === "action") {
      // Action might have been countered / removed already.
      const lc = L(ev.side, ev.loc);
      if (lc.action !== ev.card) {
        logEntry(`  → ${ev.card.name} (${ev.side} @${LOC_NAMES[ev.loc]}) was countered before resolving.`, "combat-detail");
        continue;
      }
      // Reveal it (if not already), then resolve.
      if (ev.card.revealed === false) {
        ev.card.revealed = true;
        if (ev.side === "ai") logEntry(`  → Revealed: ${ev.card.name} (AI action at ${LOC_NAMES[ev.loc]}).`, "combat-detail");
      }
      resolveAction(ev.side, ev.loc);
    }
  }
}

function other(side) { return side === "player" ? "ai" : "player"; }

function resolveAttack(side, loc, pos, attacker) {
  if (pos !== "fl" && pos !== "fr") return;

  const enemyLoc = L(other(side), loc);
  const enemyFront = pos;
  const enemyBack = pos === "fl" ? "bl" : "br";

  let target = enemyLoc.creatures[enemyFront];
  let targetPos = enemyFront;
  if (!target) {
    target = enemyLoc.creatures[enemyBack];
    targetPos = enemyBack;
  }

  const dmg = attacker.force;
  if (target) {
    target.durability -= dmg;
    logEntry(`    ${attacker.name} (${pos}) → ${target.name} (${other(side)} ${targetPos}) for ${dmg}.`, "combat-detail");
    if (target.durability <= 0) {
      logEntry(`      ${target.name} is destroyed.`, "combat-detail");
      // Tokens vanish (no graveyard entry); regular creatures go to graveyard.
      if (!target.isToken) state.sides[other(side)].graveyard.push(target);
      enemyLoc.creatures[targetPos] = null;
    }
  } else {
    state.sides[other(side)].durability -= dmg;
    logEntry(`    ${attacker.name} (${pos}) → ${other(side)} summoner for ${dmg}. (${other(side)} Durability: ${state.sides[other(side)].durability})`, "combat-detail");
  }
}

function runCleanup() {
  state.phase = "cleanup";
  logEntry(`— Cleanup —`, "phase");
  for (const sideName of ["player", "ai"]) {
    const s = state.sides[sideName];
    if (s.hand.length > 0) {
      logEntry(`${sideName === "player" ? "You" : "AI"} discards hand (${s.hand.length} card${s.hand.length === 1 ? "" : "s"}).`, "cleanup");
      s.discard.push(...s.hand);
      s.hand = [];
    }
  }
  // Revert "until end of turn" buffs (Herald-style flip-up grants and similar).
  revertEndOfTurnBuffs();
  // v3: neutral effects that fire at end of cleanup (e.g., Siren consumption).
  resolveNeutralCleanup();
  // After cleanup effects fire, check whether the encounter has ended (e.g., siren consumed itself
  // and was the only thing left).
  checkGameOver();
  // End-of-turn AI retreat evaluation: if the AI managed no living presence this turn (and didn't
  // bring any in via main-phase reinforcement), the faction withdraws.
  if (state.view === "encounter" && checkAiRetreat()) return;
  // Flip priority for next turn (alternation tiebreak).
  const oldPriority = state.firstSide;
  state.firstSide = other(state.firstSide);
  logEntry(`Priority flips: ${oldPriority} → ${state.firstSide} (alternation tiebreak).`, "cleanup");
  state.turn += 1;
}

// Fire neutral cards' end-of-cleanup effects across all locations.
function resolveNeutralCleanup() {
  if (!state.sides) return;
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L("ai", loc);
    // Iterate over a snapshot of slots so card removals during the loop don't break iteration.
    const candidates = [];
    if (lc.structure && lc.structure.owner === "neutral") candidates.push({ card: lc.structure, where: "structure" });
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.creatures[pos];
      if (c && c.owner === "neutral") candidates.push({ card: c, where: "creature", pos });
    }
    for (const cand of candidates) {
      if (!cand.card.revealed) continue;
      if (cand.card.effect === "siren") {
        // Find a non-neutral creature here at random — pool is BOTH player and AI creatures.
        // Per design, "another non-neutral creature here" excludes neutrals (so the siren never
        // accidentally consumes a sister-siren).
        const pool = [];
        for (const ownerSide of ["player", "ai"]) {
          for (const pos of ["fl","fr","bl","br"]) {
            const c = L(ownerSide, loc).creatures[pos];
            if (c && c.owner !== "neutral") pool.push({ side: ownerSide, pos, card: c });
          }
        }
        if (pool.length === 0) {
          logEntry(`  ${cand.card.name} (@${LOC_NAMES[loc]}) finds no creature to take — it lingers.`, "combat-detail");
          continue;
        }
        const pick = pool[Math.floor(Math.random() * pool.length)];
        // Remove the picked creature: from the slot, and if it's a player creature, from the run deck too.
        L(pick.side, loc).creatures[pick.pos] = null;
        if (pick.card.owner === "player" && pick.card.runDeckEntry) {
          const idx = state.runDeck.indexOf(pick.card.runDeckEntry);
          if (idx !== -1) state.runDeck.splice(idx, 1);
          logEntry(`  ${cand.card.name} (@${LOC_NAMES[loc]}) takes ${pick.card.name} (yours) — removed from your deck for the rest of the run.`, "win");
        } else {
          logEntry(`  ${cand.card.name} (@${LOC_NAMES[loc]}) takes ${pick.card.name} (${pick.side}) — removed from this encounter.`, "combat-detail");
        }
        // Siren removes itself too.
        if (cand.where === "creature") L("ai", loc).creatures[cand.pos] = null;
        else L("ai", loc).structure = null;
        logEntry(`    ${cand.card.name} sings itself out of existence.`, "combat-detail");
      }
    }
  }
}

// v3 game-over check: handles per-event win/loss conditions (player death, boss death). Does NOT
// check AI retreat — that's an end-of-turn evaluation, fired from runCleanup. This way mid-turn
// creature deaths don't end the encounter prematurely (the AI might still reinforce next turn,
// but we can't know that until cleanup).
function checkGameOver() {
  if (!state.sides) return;
  const p = state.sides.player.durability;
  if (p <= 0) {
    state.gameOver = "playerLost";
    logEntry(`Your summoner falls.`, "lose");
    checkEncounterEnd();
    return;
  }
  if (state.encounterKind === "boss") {
    const a = state.sides.ai.durability;
    if (a <= 0) {
      state.gameOver = "bossKilled";
      logEntry(`The boss summoner falls!`, "win");
      checkEncounterEnd();
      return;
    }
  }
  // Catchall: check broader encounter-end conditions (e.g., neutral-only encounter is empty).
  checkEncounterEnd();
}

// ---------- Turn flow ----------
function startNewTurn() {
  if (state.gameOver) return;
  if (state.view !== "encounter" || !state.sides) return;
  runUpkeepStart();
  if (state.gameOver || state.view !== "encounter") { render(); return; }
  // Render the upkeep beat with face-down cards still face-down. Then flip them up at end of
  // upkeep per the unified rule, then continue to draw and main.
  render();
  setTimeout(() => {
    if (state.view !== "encounter" || !state.sides) return;
    runUpkeepEnd();
    if (state.gameOver || state.view !== "encounter") { render(); return; }
    runDraw();
    if (state.view !== "encounter") { render(); return; }
    runMain();
    render();
  }, 700);
}

// Phase 1 of player advancement: end main, AI places, both sides commit (AI face-down),
// reveal AI cards, resolve any actions committed in main (in Tempo order), then enter combat-reveal.
function endMainPhase() {
  if (state.phase !== "main") return;
  if (state.gameOver || state.view !== "encounter") return;
  // Clear any pending UI selections.
  state.selectedCardId = null;
  state.selectedCommittedId = null;
  // AI places into pending (cost-checks against committed only; can't see player's pending).
  aiPlaceMain();
  // Both sides commit. AI cards are face-down at this point.
  commitPendingPlays();
  // Enter the reveal phase. AI cards visible as backs, then flip to face-up after a beat.
  state.phase = "reveal";
  logEntry(`— Reveal —`, "phase");
  render();
  setTimeout(() => {
    if (state.gameOver || state.view !== "encounter") return;
    // Tempo-ordered interleaved reveal-and-resolve: each card's flip-up happens at its Tempo step,
    // and actions resolve at their Tempo step (using the board state visible at that moment —
    // lower-Tempo cards are still face-down and not legal targets).
    endOfPhaseRevealAndResolve();
    if (state.gameOver || state.view !== "encounter") {
      render();
      showGameOver();
      return;
    }
    state.phase = "combat-reveal";
    logEntry(`Combat previews shown. Commit anytime actions, then resolve.`, "phase");
    render();
  }, 700);
}

// Phase 2 of player advancement: commit any combat-reveal-phase actions, resolve them,
// then run creature combat, then cleanup, then next turn auto-rolls.
function resolveCombatPhase() {
  if (state.phase !== "combat-reveal") return;
  if (state.gameOver || state.view !== "encounter") return;
  // If the player committed an action during combat-reveal, it lives in pending. Commit it now.
  commitPendingPlays();
  // Actions committed during combat-reveal resolve now via the unified Tempo-ordered reveal-and-
  // resolve. Any face-down combat-reveal commits flip up here in Tempo order, with actions
  // resolving at their Tempo step.
  endOfPhaseRevealAndResolve();
  if (state.gameOver || state.view !== "encounter") {
    render();
    showGameOver();
    return;
  }
  state.phase = "combat-resolve";
  render();
  setTimeout(() => {
    if (state.view !== "encounter") return;
    runCombat();
    if (state.gameOver || state.view !== "encounter") {
      render();
      showGameOver();
      return;
    }
    runCleanup();
    if (state.gameOver || state.view !== "encounter") {
      render();
      showGameOver();
      return;
    }
    render();
    setTimeout(() => {
      if (state.view !== "encounter") return;
      startNewTurn();
    }, 800);
  }, 400);
}

// Single advance handler — picks the right action based on current phase.
function advancePhase() {
  if (state.gameOver) return;
  if (state.phase === "main") return endMainPhase();
  if (state.phase === "combat-reveal") return resolveCombatPhase();
}

// ---------- UI: rendering ----------
const $ = (id) => document.getElementById(id);

// Most recent combat preview, computed at start of each render during main phase.
let _combatPreview = null;

function render() {
  // v3: branch by view mode. Overworld vs encounter are visually distinct.
  if (state.runOver) {
    showGameOver();
  }
  if (state.view === "overworld") {
    renderOverworld();
    return;
  }
  // Encounter view (the existing v2 render path).
  renderEncounter();
}

// Render the overworld view: map of nodes + edges, pawn marker, legal-move highlights.
function renderOverworld() {
  // Hide encounter-only widgets (durability, stat rows, hand, etc.) by clearing their containers.
  $("locations-row").innerHTML = "";
  $("hand").innerHTML = "";
  $("ai-hand-info").textContent = "";
  $("phase-info").textContent = "Overworld";
  $("turn-info").textContent = `Run Durability: ${state.runDurability}`;
  // Hide summoner widgets (player Durability shown via run Durability above instead).
  $("player-summoner").style.display = "none";
  $("ai-summoner").style.display = "none";

  // Build the overworld panel.
  const overworldEl = $("overworld") || createOverworldHost();
  overworldEl.innerHTML = "";
  overworldEl.appendChild(buildOverworldSvg());
  overworldEl.appendChild(buildOverworldHelp());

  renderLog();
  renderControls();
}

// Render the encounter view (existing v2 layout). Called when state.view === "encounter".
function renderEncounter() {
  // Show summoner widgets again.
  $("player-summoner").style.display = "";
  $("ai-summoner").style.display = "";
  // Hide overworld panel.
  const overworldEl = $("overworld");
  if (overworldEl) overworldEl.innerHTML = "";

  // Combat preview is only meaningful during combat-reveal, after both sides have committed.
  _combatPreview = (state.phase === "combat-reveal") ? computeCombatPreview() : null;

  // Summoner durability and deck info (global per side).
  $("player-durability").textContent = state.sides.player.durability;
  $("ai-durability").textContent = state.encounterKind === "boss" ? state.sides.ai.durability : "—";
  $("player-deck-info").textContent = `deck ${state.sides.player.deck.length} · discard ${state.sides.player.discard.length} · grave ${state.sides.player.graveyard.length}`;
  $("ai-deck-info").textContent = `deck ${state.sides.ai.deck.length} · discard ${state.sides.ai.discard.length} · grave ${state.sides.ai.graveyard.length}`;
  $("ai-hand-info").textContent = `AI hand: ${state.sides.ai.hand.length} card${state.sides.ai.hand.length === 1 ? "" : "s"}`;

  const node = getNode(state.currentNodeId);
  $("phase-info").textContent = `${node ? node.label + " · " : ""}Phase: ${state.phase}`;
  $("turn-info").textContent = `Turn ${state.turn}`;

  // Priority highlight + incoming-damage indicator on each summoner.
  for (const sideName of ["player", "ai"]) {
    const summonerEl = $(sideName + "-summoner");
    const badge = $(sideName + "-priority-badge");
    if (state.firstSide === sideName) {
      summonerEl.classList.add("has-priority");
      badge.textContent = "First";
      badge.classList.add("show");
    } else {
      summonerEl.classList.remove("has-priority");
      badge.classList.remove("show");
    }
    const incoming = $(sideName + "-incoming");
    const dmg = _combatPreview ? _combatPreview.summonerHits[sideName] : 0;
    if (dmg > 0) {
      incoming.textContent = `−${dmg} incoming`;
      incoming.classList.add("show");
    } else {
      incoming.classList.remove("show");
    }
  }

  // Build the locations row from scratch each render — simpler than diffing for v2 scale.
  const locsRow = $("locations-row");
  locsRow.innerHTML = "";
  locsRow.style.setProperty("--loc-count", LOCATION_COUNT);
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    locsRow.appendChild(buildLocationColumn(loc));
  }

  renderHand();
  renderLog();
  renderControls();
}

// Lazy-init the overworld DOM host (placed inside #board, above #locations-row).
function createOverworldHost() {
  const board = $("board");
  const locsRow = $("locations-row");
  const el = document.createElement("div");
  el.id = "overworld";
  board.insertBefore(el, locsRow);
  return el;
}

// Build the overworld map as inline SVG: nodes as circles with labels, edges as lines, pawn marker.
function buildOverworldSvg() {
  const W = 800, H = 360;
  const PAD = 60;
  const nodes = state.world.nodes;
  // Compute pixel positions from node x/y grid coords. Map x:[0..5], y:[0..4] to canvas.
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  function px(n) {
    const t = (n.x - xMin) / Math.max(1, xMax - xMin);
    return PAD + t * (W - 2 * PAD);
  }
  function py(n) {
    const t = (n.y - yMin) / Math.max(1, yMax - yMin);
    return PAD + t * (H - 2 * PAD);
  }
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("class", "overworld-svg");

  // Edges first (under nodes).
  for (const [a, b] of state.world.edges) {
    const na = getNode(a), nb = getNode(b);
    const ln = document.createElementNS(ns, "line");
    ln.setAttribute("x1", px(na));
    ln.setAttribute("y1", py(na));
    ln.setAttribute("x2", px(nb));
    ln.setAttribute("y2", py(nb));
    ln.setAttribute("class", "ow-edge");
    svg.appendChild(ln);
  }

  const legalSet = new Set(legalMovesFromPawn());
  for (const n of nodes) {
    const cx = px(n), cy = py(n);
    const g = document.createElementNS(ns, "g");
    g.setAttribute("class", "ow-node-group");

    const c = document.createElementNS(ns, "circle");
    c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", 28);
    let cls = "ow-node ow-node-" + n.kind + " ow-node-status-" + n.status;
    if (legalSet.has(n.id)) cls += " ow-node-legal";
    if (state.world.pawnAt === n.id) cls += " ow-node-pawn";
    c.setAttribute("class", cls);
    g.appendChild(c);

    // Label
    const t = document.createElementNS(ns, "text");
    t.setAttribute("x", cx); t.setAttribute("y", cy + 4);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("class", "ow-node-label");
    t.textContent = (n.kind === "boss" ? "★" : n.kind === "neutral" ? "?" : n.kind === "hostile" ? "⚔" : "•");
    g.appendChild(t);

    // Label below
    const tl = document.createElementNS(ns, "text");
    tl.setAttribute("x", cx); tl.setAttribute("y", cy + 50);
    tl.setAttribute("text-anchor", "middle");
    tl.setAttribute("class", "ow-node-name");
    tl.textContent = n.label;
    g.appendChild(tl);

    if (legalSet.has(n.id) && !state.runOver) {
      g.style.cursor = "pointer";
      g.addEventListener("click", () => moveTo(n.id));
    }

    svg.appendChild(g);
  }

  return svg;
}

function buildOverworldHelp() {
  const help = document.createElement("div");
  help.className = "overworld-help";
  const node = getNode(state.world.pawnAt);
  help.innerHTML = `
    <div><strong>Overworld.</strong> Click any highlighted node adjacent to your pawn to advance.</div>
    <div>You're at: <strong>${node ? node.label : "?"}</strong></div>
    <div>Run Durability: <strong>${state.runDurability}</strong> &nbsp;·&nbsp; Run deck: <strong>${state.runDeck.length}</strong> cards</div>
    <div class="muted">⚔ hostile · ? neutral encounter · ★ boss · • empty/start</div>
  `;
  return help;
}

// Build a single .location column for index `loc`. Internal layout: header label, AI structure
// row, AI side (stat-row + creature grid + action slot), player side (mirror), player structure.
function buildLocationColumn(loc) {
  const col = document.createElement("div");
  col.className = "location";
  col.dataset.loc = String(loc);

  // Location label (flavor name only — no location text in v2).
  const label = document.createElement("div");
  label.className = "location-label";
  label.textContent = LOC_NAMES[loc] || `Location ${loc + 1}`;
  col.appendChild(label);

  // AI structure row (above the AI side).
  const aiStructRow = document.createElement("div");
  aiStructRow.className = "ai-structure-row";
  const aiStructLabel = document.createElement("div");
  aiStructLabel.className = "structure-row-label";
  aiStructLabel.textContent = "AI structure";
  aiStructRow.appendChild(aiStructLabel);
  aiStructRow.appendChild(buildSimpleSlot("ai", loc, "structure"));
  aiStructRow.appendChild(document.createElement("div")); // spacer right column
  col.appendChild(aiStructRow);

  // AI info (stat row).
  const aiInfo = document.createElement("div");
  aiInfo.className = "side-info ai-info";
  aiInfo.appendChild(buildStatRow("ai", loc));
  col.appendChild(aiInfo);

  // AI side (creature grid 2x2, back row first so front row is closer to centerline).
  const aiSide = document.createElement("div");
  aiSide.className = "ai-side";
  aiSide.appendChild(buildCreatureGrid("ai", loc));
  col.appendChild(aiSide);

  // AI action slot.
  const aiAction = buildSimpleSlot("ai", loc, "action");
  aiAction.classList.add("ai-action-slot");
  col.appendChild(aiAction);

  // Player info (stat row).
  const playerInfo = document.createElement("div");
  playerInfo.className = "side-info player-info";
  playerInfo.appendChild(buildStatRow("player", loc));
  col.appendChild(playerInfo);

  // Player side (creature grid).
  const playerSide = document.createElement("div");
  playerSide.className = "player-side";
  playerSide.appendChild(buildCreatureGrid("player", loc));
  col.appendChild(playerSide);

  // Player action slot.
  const playerAction = buildSimpleSlot("player", loc, "action");
  playerAction.classList.add("player-action-slot");
  col.appendChild(playerAction);

  // Player structure row (below the player side).
  const playerStructRow = document.createElement("div");
  playerStructRow.className = "player-structure-row";
  const playerStructLabel = document.createElement("div");
  playerStructLabel.className = "structure-row-label";
  playerStructLabel.textContent = "Your structure";
  playerStructRow.appendChild(playerStructLabel);
  playerStructRow.appendChild(buildSimpleSlot("player", loc, "structure"));
  playerStructRow.appendChild(document.createElement("div"));
  col.appendChild(playerStructRow);

  return col;
}

function buildStatRow(side, loc) {
  const row = document.createElement("div");
  row.className = "stat-row";
  for (const stat of ["force", "tempo", "insight"]) {
    const cmt = committedStatTotal(side, loc, stat);
    const vis = visibleStatTotal(side, loc, stat);
    const cell = document.createElement("div");
    cell.className = "stat-cell stat-" + stat;
    cell.innerHTML = `<div class="stat-cell-label">${stat.charAt(0).toUpperCase() + stat.slice(1)}</div><div class="stat-cell-value">${cmt}${vis > cmt ? `<span class="stat-pending">+${vis - cmt}</span>` : ""}</div>`;
    row.appendChild(cell);
  }
  return row;
}

function buildCreatureGrid(side, loc) {
  const grid = document.createElement("div");
  grid.className = "creature-grid";
  // Player: front-row at top (closer to centerline). AI: back row first so front row is at bottom.
  const order = side === "player" ? ["fl", "fr", "bl", "br"] : ["bl", "br", "fl", "fr"];
  const lc = L(side, loc);

  for (const pos of order) {
    const committedCard = lc.creatures[pos];
    const pendingCard = lc.pending.creatures[pos];
    const cell = document.createElement("div");
    cell.className = "slot";
    cell.dataset.side = side;
    cell.dataset.loc = String(loc);
    cell.dataset.pos = pos;
    cell.dataset.kind = "creature";

    if (committedCard) {
      cell.classList.add("has-card");
      const cardEl = makeCardEl(committedCard, true);
      if (side === "player" && state.selectedCommittedId === committedCard.instId) {
        cardEl.classList.add("selected");
      }
      if (lc.movedThisTurn.has(committedCard.instId)) cardEl.classList.add("moved");
      cell.appendChild(cardEl);
    } else if (pendingCard) {
      cell.classList.add("has-card", "pending");
      const cardEl = makeCardEl(pendingCard, true);
      cardEl.classList.add("pending-card");
      cell.appendChild(cardEl);
    } else {
      const lbl = document.createElement("span");
      lbl.className = "slot-label";
      lbl.textContent = pos;
      cell.appendChild(lbl);
    }

    if (side === "player") {
      const inMain = state.phase === "main";
      const inCombatReveal = state.phase === "combat-reveal";
      const movementAllowed = inMain || inCombatReveal;

      // Hand-card placement (creatures only commit during main).
      if (inMain) {
        const sel = state.selectedCardId ? findHandCard(state.selectedCardId) : null;
        if (sel && sel.type === "creature" && !slotOccupied("player", loc, "creature", pos) && canPay("player", loc, sel)) {
          cell.classList.add("legal-target");
          cell.addEventListener("click", () => placeSelectedAt({ loc, kind: "creature", pos }));
        }
        // Pending creature cancel.
        if (pendingCard && !sel && !state.selectedCommittedId) {
          cell.classList.add("can-cancel");
          cell.addEventListener("click", () => {
            cancelPendingPlacement("player", loc, "creature", pos);
            render();
          });
        }
      }

      // Committed-creature selection for movement (within this location only — v2 scope).
      if (movementAllowed && committedCard && !state.selectedCardId) {
        if (state.selectedCommittedId === committedCard.instId) {
          cell.addEventListener("click", () => {
            state.selectedCommittedId = null;
            render();
          });
        } else if (!lc.movedThisTurn.has(committedCard.instId)) {
          cell.classList.add("can-select-move");
          cell.addEventListener("click", () => {
            state.selectedCommittedId = committedCard.instId;
            state.selectedCardId = null;
            render();
          });
        }
      }

      // Movement target: empty adjacent slot at the same location as the selected creature.
      if (movementAllowed && state.selectedCommittedId && !committedCard && !pendingCard) {
        const found = findCommittedCreatureAndLoc("player", state.selectedCommittedId);
        if (found && found.loc === loc) { // same-location moves only in v2
          if (isAdjacent(found.pos, pos)) {
            cell.classList.add("legal-target");
            cell.addEventListener("click", () => {
              moveCommittedCreature("player", loc, found.pos, pos);
              state.selectedCommittedId = null;
              render();
            });
          }
        }
      }
    }
    grid.appendChild(cell);
  }
  return grid;
}

// Locate a committed creature anywhere on a side. Returns { loc, pos, creature } or null.
function findCommittedCreatureAndLoc(side, instId) {
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L(side, loc);
    for (const pos of ["fl", "fr", "bl", "br"]) {
      const c = lc.creatures[pos];
      if (c && c.instId === instId) return { loc, pos, creature: c };
    }
  }
  return null;
}

// Build a structure or action slot at a location. Returns the slot element.
function buildSimpleSlot(side, loc, kind) {
  const slot = document.createElement("div");
  slot.className = "slot";
  if (kind === "structure") slot.classList.add("structure-slot");
  slot.dataset.side = side;
  slot.dataset.loc = String(loc);
  slot.dataset.kind = kind;

  const lc = L(side, loc);
  const committed = lc[kind];
  const pending = lc.pending[kind];

  if (committed) {
    slot.classList.add("has-card");
    slot.appendChild(makeCardEl(committed, true));
  } else if (pending) {
    slot.classList.add("has-card", "pending");
    const el = makeCardEl(pending, true);
    el.classList.add("pending-card");
    slot.appendChild(el);
    if (side === "player" && isCommitWindowFor(kind) && !state.selectedCardId && !state.selectedCommittedId) {
      slot.classList.add("can-cancel");
      slot.addEventListener("click", () => {
        cancelPendingPlacement("player", loc, kind);
        render();
      });
    }
  } else {
    const lbl = document.createElement("span");
    lbl.className = "slot-label";
    lbl.textContent = kind;
    slot.appendChild(lbl);

    // Legal target if the selected hand card matches type, can pay at this location, and we're in
    // a commit window for that type.
    if (side === "player" && isCommitWindowFor(kind)) {
      const sel = state.selectedCardId ? findHandCard(state.selectedCardId) : null;
      if (sel && sel.type === kind && canPay("player", loc, sel)) {
        slot.classList.add("legal-target");
        slot.addEventListener("click", () => placeSelectedAt({ loc, kind }));
      }
    }
  }
  return slot;
}

function makeCardEl(card, inSlot = false) {
  const el = document.createElement("div");
  el.className = `card ${card.type}`;
  if (card.owner === "ai") el.classList.add("ai-owned");
  if (inSlot) el.classList.add("in-slot");
  if (state.selectedCardId === card.instId) el.classList.add("selected");

  // Face-down rendering: show card back instead of identity for OPPOSING cards (AI). The player's
  // own face-down cards still display face-up to the owner — fog-of-war hides AI plays from the
  // player's view, not the player's own plays from themselves. (The underlying game state is the
  // same — `revealed: false` — until the unified end-of-phase flip-up rule fires; this is just the
  // owner-side render exception.)
  if (card.revealed === false && card.owner !== "player") {
    el.classList.add("face-down");
    const back = document.createElement("div");
    back.className = "card-back";
    back.textContent = "?";
    el.appendChild(back);
    return el;
  }
  // Player's own face-down cards: render normally but with a subtle "pending reveal" outline so
  // the player knows the card hasn't flipped up yet (and any flip-up triggers haven't fired).
  if (card.revealed === false && card.owner === "player") {
    el.classList.add("pre-flip");
  }

  const nameEl = document.createElement("div");
  nameEl.className = "name";
  nameEl.textContent = card.name;
  el.appendChild(nameEl);

  const meta = document.createElement("div");
  meta.className = "meta";
  if (card.cost > 0) {
    const b = document.createElement("span");
    b.className = "badge cost";
    b.textContent = `≥${card.cost} ${(card.costStat || "force").toUpperCase()}`;
    meta.appendChild(b);
  }
  if (card.force > 0) {
    const b = document.createElement("span");
    b.className = "badge force";
    b.textContent = `Force ${card.force}`;
    meta.appendChild(b);
  }
  if (card.tempo > 0) {
    const b = document.createElement("span");
    b.className = "badge tempo";
    b.textContent = `Tempo ${card.tempo}`;
    meta.appendChild(b);
  }
  if (card.insight > 0) {
    const b = document.createElement("span");
    b.className = "badge insight";
    b.textContent = `Insight ${card.insight}`;
    meta.appendChild(b);
  }
  if (card.durabilityMax != null) {
    const b = document.createElement("span");
    b.className = "badge durability";
    b.textContent = `Durability ${card.durability}/${card.durabilityMax}`;
    meta.appendChild(b);
  }
  el.appendChild(meta);

  if (card.text) {
    const t = document.createElement("div");
    t.className = "text";
    t.textContent = card.text;
    el.appendChild(t);
  }

  // Combat preview lines (creatures in slots, during main phase).
  if (inSlot && card.type === "creature" && _combatPreview) {
    const atk = _combatPreview.attackers[card.instId];
    if (atk) {
      const previewEl = document.createElement("div");
      previewEl.className = "preview";
      let label = `→ ${atk.targetLabel} for ${atk.damage}`;
      if (atk.killsTarget) label += " (kills)";
      previewEl.textContent = label;
      el.appendChild(previewEl);
    } else if (card.owner === "player") {
      // Player-owned creature with no attacker entry — explain why.
      const why = (card.force <= 0) ? "no Force — won't attack" : "back row — won't attack";
      const previewEl = document.createElement("div");
      previewEl.className = "preview muted";
      previewEl.textContent = why;
      el.appendChild(previewEl);
    }
    if (_combatPreview.willDie.has(card.instId)) {
      const dieEl = document.createElement("div");
      dieEl.className = "preview die";
      dieEl.textContent = "will die in combat";
      el.appendChild(dieEl);
    }
  }

  return el;
}

function renderHand() {
  const hand = $("hand");
  hand.innerHTML = "";
  const inAnyCommitWindow = state.phase === "main" || state.phase === "combat-reveal";
  for (const card of state.sides.player.hand) {
    const el = makeCardEl(card, false);
    const cardWindow = isCommitWindowFor(card.type);
    const playable = cardWindow && cardHasAnyLegalPlay("player", card);
    if (inAnyCommitWindow && !playable) el.classList.add("unplayable");
    el.addEventListener("click", () => {
      if (!inAnyCommitWindow) return;
      if (!cardWindow) {
        flashLog(`${card.name}: not playable in this phase.`);
        return;
      }
      if (!playable) {
        // Provide a useful message: do we have *any* location with the cost paid?
        const statName = (card.costStat || "force");
        const statLabel = statName.charAt(0).toUpperCase() + statName.slice(1);
        const haveByLoc = [];
        let canPayAnywhere = false;
        for (let loc = 0; loc < LOCATION_COUNT; loc++) {
          const have = committedStatTotal("player", loc, statName);
          haveByLoc.push(`${LOC_NAMES[loc]}: ${have}`);
          if (have >= (card.cost || 0)) canPayAnywhere = true;
        }
        if (!canPayAnywhere) {
          flashLog(`${card.name}: need ≥${card.cost} ${statLabel} at the target location. Committed — ${haveByLoc.join(" · ")}.`);
        } else {
          flashLog(`${card.name}: no legal target slot at any location where the cost is paid.`);
        }
        return;
      }
      state.selectedCardId = (state.selectedCardId === card.instId) ? null : card.instId;
      state.selectedCommittedId = null;
      render();
    });
    hand.appendChild(el);
  }
}

function renderLog() {
  const log = $("log");
  log.innerHTML = "";
  for (const e of state.log.slice(-80)) {
    const div = document.createElement("div");
    div.className = "entry " + (e.kind || "");
    div.textContent = e.msg;
    log.appendChild(div);
  }
  log.scrollTop = log.scrollHeight;
}

function renderControls() {
  const btn = $("btn-advance");
  const leaveBtn = $("btn-leave-encounter");
  // Overworld view: hide both phase buttons.
  if (state.view === "overworld") {
    btn.style.display = "none";
    if (leaveBtn) leaveBtn.style.display = "none";
    return;
  }
  // Encounter view.
  btn.style.display = "";
  if (leaveBtn) {
    // Show leave button only for neutral encounters where engaging is optional.
    leaveBtn.style.display = state.encounterKind === "neutral" ? "" : "none";
    leaveBtn.disabled = !!state.gameOver;
  }
  if (state.gameOver) {
    btn.disabled = true;
    btn.textContent = "Game Over";
    return;
  }
  switch (state.phase) {
    case "main":
      btn.disabled = false;
      btn.textContent = "End Main Phase";
      break;
    case "combat-reveal":
      btn.disabled = false;
      btn.textContent = "Resolve Combat";
      break;
    case "reveal":
    case "combat-resolve":
    case "cleanup":
    case "upkeep":
    case "draw":
      btn.disabled = true;
      btn.textContent = "…";
      break;
    default:
      btn.disabled = true;
      btn.textContent = "—";
  }
}

function findHandCard(instId) {
  return state.sides.player.hand.find(c => c.instId === instId) || null;
}

function placeSelectedAt(target) {
  const card = findHandCard(state.selectedCardId);
  if (!card) return;
  if (!canPay("player", target.loc, card)) return;
  placeCard("player", card, target);
  state.selectedCardId = null;
  render();
}

function flashLog(msg) {
  logEntry(msg, "cleanup");
  renderLog();
}

// ---------- Game over ----------
function showGameOver() {
  // v3: distinguish run-end (won/lost the whole run) from encounter-end (returns to overworld).
  // Encounter-end uses endEncounter() which doesn't show this modal — only the run-over shows it.
  if (state.runOver === "playerWin") {
    $("game-over-title").textContent = "You win the run";
  } else if (state.runOver === "playerLose") {
    $("game-over-title").textContent = "You fell";
  } else {
    return; // not a run-over event
  }
  $("game-over-text").textContent = `Run ended at ${getNode(state.world.pawnAt)?.label || "?"}. Run Durability: ${state.runDurability}.`;
  $("game-over").classList.add("show");
}

function hideGameOver() {
  $("game-over").classList.remove("show");
}

// ---------- Init / wiring ----------
function start() {
  state = freshState();
  hideGameOver();
  logEntry(`v3 prototype — overworld map, hand-authored encounters, neutral puzzles. Move the pawn to begin.`);
  render();
}

// ---------- Export ----------
function buildExport() {
  const ts = new Date().toISOString();
  const lines = [];
  lines.push(`=== Game v2 export (${ts}) ===`);
  lines.push(`Turn ${state.turn} · Phase: ${state.phase} · Priority: ${state.firstSide}`);
  // AI Durability is meaningful only at the boss encounter (boss is a summoner). At non-boss
  // hostile encounters there's no AI summoner — show — instead of a misleading number.
  const aiDurabilityDisplay = state.encounterKind === "boss" ? state.sides.ai.durability : "—";
  lines.push(`Player Durability: ${state.sides.player.durability} · AI Durability: ${aiDurabilityDisplay}`);
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    lines.push(`@ ${LOC_NAMES[loc]} — Player Force/Tempo/Insight (committed): ${committedStatTotal("player",loc,"force")}/${committedStatTotal("player",loc,"tempo")}/${committedStatTotal("player",loc,"insight")}`);
    lines.push(`@ ${LOC_NAMES[loc]} — AI     Force/Tempo/Insight (committed): ${committedStatTotal("ai",loc,"force")}/${committedStatTotal("ai",loc,"tempo")}/${committedStatTotal("ai",loc,"insight")}`);
  }
  lines.push(``);

  // Compact human-readable per-location, per-side board.
  function describeSide(name) {
    const s = state.sides[name];
    const out = [];
    out.push(`  ${name.toUpperCase()}:`);
    out.push(`    Hand (${s.hand.length}): ${s.hand.map(c => c.name).join(", ") || "—"}`);
    out.push(`    Deck ${s.deck.length} · Discard ${s.discard.length} · Graveyard ${s.graveyard.length}`);
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(name, loc);
      out.push(`    @ ${LOC_NAMES[loc]}:`);
      const cs = ["fl","fr","bl","br"].map(p => {
        const c = lc.creatures[p];
        const pc = lc.pending.creatures[p];
        if (c) return `${p}=${c.name}[F${c.force || 0}/T${c.tempo || 0}/I${c.insight || 0}/D${c.durability}/${c.durabilityMax}${c.revealed === false ? " face-down" : ""}]`;
        if (pc) return `${p}=(pending)${pc.name}`;
        return `${p}=—`;
      });
      out.push(`      Creatures: ${cs.join("  ")}`);
      out.push(`      Structure: ${lc.structure ? lc.structure.name : (lc.pending.structure ? "(pending)"+lc.pending.structure.name : "—")}`);
      out.push(`      Action:    ${lc.action ? lc.action.name : (lc.pending.action ? "(pending)"+lc.pending.action.name : "—")}`);
    }
    return out.join("\n");
  }
  lines.push(describeSide("player"));
  lines.push(describeSide("ai"));
  lines.push(``);

  // Full log.
  lines.push(`=== Log ===`);
  for (const e of state.log) {
    lines.push(`[${e.kind || "info"}] ${e.msg}`);
  }
  lines.push(``);

  // JSON snapshot for full reconstruction. Strip cyclic / Set fields.
  function serializableLocation(lc) {
    return {
      creatures: Object.fromEntries(["fl","fr","bl","br"].map(p => [p, lc.creatures[p] ? serializableCard(lc.creatures[p]) : null])),
      structure: lc.structure ? serializableCard(lc.structure) : null,
      action: lc.action ? serializableCard(lc.action) : null,
      pending: {
        creatures: Object.fromEntries(["fl","fr","bl","br"].map(p => [p, lc.pending.creatures[p] ? serializableCard(lc.pending.creatures[p]) : null])),
        structure: lc.pending.structure ? serializableCard(lc.pending.structure) : null,
        action: lc.pending.action ? serializableCard(lc.pending.action) : null
      },
      movedThisTurn: Array.from(lc.movedThisTurn || [])
    };
  }
  function serializableSide(s) {
    return {
      durability: s.durability,
      deck: s.deck.map(serializableCard),
      hand: s.hand.map(serializableCard),
      discard: s.discard.map(serializableCard),
      graveyard: s.graveyard.map(serializableCard),
      locations: s.locations.map(serializableLocation)
    };
  }
  function serializableCard(c) {
    return {
      instId: c.instId, defKey: c.defKey, name: c.name, type: c.type,
      cost: c.cost, costStat: c.costStat, force: c.force, tempo: c.tempo, insight: c.insight,
      durability: c.durability, durabilityMax: c.durabilityMax, effect: c.effect, revealed: c.revealed
    };
  }
  const snapshot = {
    turn: state.turn,
    phase: state.phase,
    firstSide: state.firstSide,
    gameOver: state.gameOver,
    locationNames: LOC_NAMES,
    sides: {
      player: serializableSide(state.sides.player),
      ai: serializableSide(state.sides.ai)
    }
  };
  lines.push(`=== JSON snapshot ===`);
  lines.push(JSON.stringify(snapshot, null, 2));
  return lines.join("\n");
}

function exportToClipboard() {
  const text = buildExport();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => flashLog("Game state copied to clipboard."),
      () => fallbackExport(text)
    );
  } else {
    fallbackExport(text);
  }
}

function fallbackExport(text) {
  // Older browsers without clipboard API: drop into a textarea and let user copy.
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.top = "10px";
  ta.style.left = "10px";
  ta.style.width = "80vw";
  ta.style.height = "60vh";
  ta.style.zIndex = "1000";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  flashLog("Clipboard not available — manually copy the text shown, then click anywhere to dismiss.");
  const dismiss = () => { ta.remove(); document.removeEventListener("click", dismiss, true); };
  setTimeout(() => document.addEventListener("click", dismiss, true), 100);
}

function exportToFile() {
  const text = buildExport();
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const stamp = new Date().toISOString().replace(/[:.]/g, "-");
  a.download = `game-export-turn${state.turn}-${stamp}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  flashLog("Game state downloaded.");
}

document.addEventListener("DOMContentLoaded", () => {
  $("btn-advance").addEventListener("click", advancePhase);
  $("btn-restart").addEventListener("click", start);
  $("btn-go-restart").addEventListener("click", start);
  $("btn-leave-encounter").addEventListener("click", () => {
    if (state.view !== "encounter") return;
    if (state.encounterKind !== "neutral") return;
    logEntry(`You leave the encounter without claiming the reward.`, "phase");
    endEncounter("playerLeft");
  });
  $("btn-export").addEventListener("click", (e) => {
    if (e.shiftKey) exportToFile();
    else exportToClipboard();
  });
  start();
});
</script>
