  const POS_RANK = { fl: 0, fr: 1, bl: 2, br: 3 };
  const attackers = {};
  const willDie = new Set();
  const summonerHits = { player: spellFallThrough.player, ai: spellFallThrough.ai };

  // Per-location creature combat. Each location resolves in its own Tempo order; locations are
  // simulated left-to-right but their orderings are independent.
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const candidates = [];
    for (const sideName of ["player", "ai"]) {
      for (const pos of ["fl", "fr", "bl", "br"]) {
        const c = sim[sideName].locs[loc].creatures[pos];
        if (!c) continue;
        if (c.revealed === false) continue;  // face-down cards don't attack (unified rule)
        const isBack = pos === "bl" || pos === "br";
        if (isBack && !c.ranged) continue;
        if (c.sleepCounter > 0) continue;
        if (c.wokeInPhase === state.phase) continue;
        if (c.force <= 0) continue;
        if (c.ranged && (sim[sideName].locs[loc].ammo || 0) < (c.ammoCost || 1)) continue;
        candidates.push({
          side: sideName, loc, pos, creature: c,
          sortKey: [-(c.tempo || 0), sidePriorityRankAt(sideName, loc), POS_RANK[pos]]
        });
      }
    }
    candidates.sort((a, b) => {
      for (let i = 0; i < a.sortKey.length; i++) {
        if (a.sortKey[i] !== b.sortKey[i]) return a.sortKey[i] - b.sortKey[i];
      }
      return 0;
    });

    for (const cand of candidates) {
      const live = sim[cand.side].locs[loc].creatures[cand.pos];
      if (!live || live.instId !== cand.creature.instId) continue;
      // Ranged ammo simulation: must still have ammo at swing time; consume it.
      if (live.ranged) {
        const cost = live.ammoCost || 1;
        const myLoc = sim[cand.side].locs[loc];
        if ((myLoc.ammo || 0) < cost) continue;
        myLoc.ammo -= cost;
      }
      const enemyLoc = sim[other(cand.side)].locs[loc];
      const column = (cand.pos === "fl" || cand.pos === "bl") ? "fl" : "fr";
      const frontPos = column;
      const backPos = column === "fl" ? "bl" : "br";
      let target = enemyLoc.creatures[frontPos];
      let targetPos = frontPos;
      if (!target) {
        target = enemyLoc.creatures[backPos];
        targetPos = backPos;
      }
      const dmg = live.force;
      if (target) {
        target.durability -= dmg;
        const killed = target.durability <= 0;
        attackers[live.instId] = {
          targetLabel: `${target.name} (${other(cand.side)} ${LOC_NAMES[loc]} ${targetPos})`,
          damage: dmg,
          killsTarget: killed
        };
        if (killed) {
          willDie.add(target.instId);
          enemyLoc.creatures[targetPos] = null;
        }
      } else {
        sim[other(cand.side)].durability -= dmg;
        summonerHits[other(cand.side)] += dmg;
        attackers[live.instId] = {
          targetLabel: `${other(cand.side) === "player" ? "your" : "AI"} summoner`,
          damage: dmg,
          killsTarget: false,
          hitsSummoner: true
        };
      }
    }
  }

  return { attackers, willDie, summonerHits };
}

// ---------- Phases ----------
// Upkeep is split into "start of upkeep" (per-turn resets and start-of-upkeep neutral effects like
// Forge) and "end of upkeep" (flip-up at end of phase, encounter-end check). startNewTurn inserts
// a render+delay between them so the player sees the upkeep beat with face-down cards before the
// flip-up at end of phase.
// Generic phase-hook dispatcher. Fires registered handlers at a named phase boundary across all
// locations and card-level triggers. Hook names: "onUpkeepStart", "onUpkeepEnd", "onDrawStart",
// "onDrawEnd", "onMainStart", "onMainEnd", "onCombatStart", "onCombatEnd", "onCleanupStart",
// "onCleanupEnd". Location-text handlers are looked up via LOC_TEXT_KEYS + LOCATION_TEXTS.
//
// Handler signature: `function(loc) { ... }`. Receives the location index where the text is active.
// Cards with phase triggers (future) will register similarly per (card, side, loc).
function firePhaseHook(hookName) {
  if (!state.sides) return;
  // Location-text handlers.
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const key = LOC_TEXT_KEYS[loc];
    if (!key) continue;
    const text = LOCATION_TEXTS[key];
    if (text && typeof text[hookName] === "function") {
      text[hookName](loc);
      if (state.gameOver) return;
    }
  }
}

function runUpkeepStart() {
  state.phase = "upkeep";
  logEntry(`— Upkeep, turn ${state.turn} —`, "phase");
  // Reset per-turn move trackers — committed creatures may move once per main this turn at each location.
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      L(sideName, loc).movedThisTurn = new Set();
      // Reset per-turn melee-attacker trackers on all creatures here (used by Explosive Trap).
      const lc = L(sideName, loc);
      for (const pos of ["fl","fr","bl","br"]) {
        const c = lc.creatures[pos];
        if (c) c.meleeAttackersThisTurn = [];
      }
    }
  }
  tickSleepCounters();
  firePhaseHook("onUpkeepStart");
  // Start-of-upkeep neutral effects (e.g., Forge stat-bump).
  resolveNeutralUpkeep();
  checkGameOver();
}

// Tick each sleeping creature's counter down by one at start of upkeep. Counter reaches 0 → awake.
function tickSleepCounters() {
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(sideName, loc);
      for (const pos of ["fl","fr","bl","br"]) {
        const c = lc.creatures[pos];
        if (!c || c.sleepCounter <= 0) continue;
        c.sleepCounter -= 1;
        if (c.sleepCounter === 0) {
          logEntry(`  ${c.name} (${sideName} ${LOC_NAMES[loc]} ${pos}) wakes up.`, "phase");
        }
      }
    }
  }
}

// End-of-upkeep work: face-down cards flip up here, per the unified flip-up rule (any face-down
// card flips up at end of current phase). On turn 1 this is the encounter-arrival reveal moment.
// Uses the same Tempo-ordered reveal-and-resolve as end-of-main.
function runUpkeepEnd() {
  firePhaseHook("onUpkeepEnd");
  endOfPhaseRevealAndResolve();
  checkGameOver();
}

// Fire neutral cards' upkeep effects across all locations.
function resolveNeutralUpkeep() {
  if (!state.sides) return;
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L("ai", loc);
    // Forge can be the structure; can also imagine future neutrals occupying creature slots.
    const candidates = [];
    if (lc.structure && lc.structure.owner === "neutral") candidates.push({ card: lc.structure, where: "structure" });
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.creatures[pos];
      if (c && c.owner === "neutral") candidates.push({ card: c, where: "creature", pos });
    }
    for (const cand of candidates) {
      if (!cand.card.revealed) continue;       // face-down neutrals are inert (not yet revealed)
      if (cand.card.effect === "forge") {
        // Find the highest-Force friendly (player) creature here.
        const friendlies = ["fl","fr","bl","br"]
          .map(p => L("player", loc).creatures[p])
          .filter(c => c);
        if (friendlies.length === 0) continue;     // no friendly creature — nothing to bump
        let best = friendlies[0];
        for (const c of friendlies) if ((c.force || 0) > (best.force || 0)) best = c;
        // Bump the run-deck entry's mods so the buff persists across encounters.
        if (best.runDeckEntry) {
          best.runDeckEntry.mods.force = (best.runDeckEntry.mods.force || 0) + 1;
        }
        // Also bump the in-play instance so the rest of this encounter sees it.
        best.force = (best.force || 0) + 1;
        logEntry(`  ${cand.card.name} (@${LOC_NAMES[loc]}) → ${best.name} gains +1 Force permanently.`, "win");
        cand.card.durability -= 1;
        if (cand.card.durability <= 0) {
          logEntry(`    ${cand.card.name} is destroyed.`, "combat-detail");
          if (cand.where === "structure") lc.structure = null;
          else lc.creatures[cand.pos] = null;
        }
      }
    }
  }
}

function runDraw() {
  state.phase = "draw";
  logEntry(`— Draw —`, "phase");
  firePhaseHook("onDrawStart");
  for (const sideName of ["player", "ai"]) {
    const s = state.sides[sideName];
    const target = 5;
    while (s.hand.length < target) {
      if (s.deck.length === 0) {
        if (s.discard.length === 0) break; // truly out
        s.deck = shuffle(s.discard);
        s.discard = [];
        logEntry(`${sideName === "player" ? "Your" : "AI"} discard pile reshuffled into deck.`, "draw");
      }
      const card = s.deck.shift();
      s.hand.push(card);
    }
  }
  logEntry(`Drew up to hand size 5.`, "draw");
  firePhaseHook("onDrawEnd");
}

function runMain() {
  state.phase = "main";
  logEntry(`— Main phase: play cards, then end. —`, "phase");
  firePhaseHook("onMainStart");
  // Player plays via UI; AI plays after player ends main
}

// Returns true if the AI has non-neutral presence (creature or structure) at any location in the
// current encounter. Used to gate AI placement: per the unified-encounter framework, the AI may
// only commit cards into a neutral location during an encounter if it has presence at *some other*
// location in the same encounter (the in-encounter "AI contesting" rule mirroring overworld
// adjacency). For v3's single-location encounters: a pure neutral encounter has no AI presence at
// all, so the AI cannot place. A hostile or boss encounter has AI presence by definition.
function aiHasPresenceInEncounter() {
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L("ai", loc);
    if (lc.structure && lc.structure.owner === "ai") return true;
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.creatures[pos];
      if (c && c.owner === "ai") return true;
    }
    // Pending plays count too — if the AI committed something earlier this turn, it's "present".
    if (lc.pending.structure && lc.pending.structure.owner === "ai") return true;
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.pending.creatures[pos];
      if (c && c.owner === "ai") return true;
    }
  }
  return false;
}

// AI placement using scored heuristics. Per DECISIONS.md (AI architecture): per-card hints + a
// small global scoring function picks the highest-scoring (card, location, target) tuple and commits it.
// Cost checks use COMMITTED state at the *target location* only.
//
// Per the unified-encounter framework: the AI cannot place at a neutral encounter where it has no
// other-location presence. v3 has single-location encounters, so this collapses to "AI does not
// place if it has no presence at the encounter at all" — i.e., pure neutral encounters get no AI plays.
function aiPlaceMain() {
  if (!aiHasPresenceInEncounter()) return;
  let safety = 80;
  while (safety-- > 0) {
    const best = aiPickBestPlay();
    if (!best) break;
    placeCard("ai", best.card, best.target);
  }
}

// AI retreat: end-of-turn evaluation. Fires at end of cleanup if the AI has no living presence
// AND failed to bring in reinforcements this turn. "Living presence" means *creatures* —
// structures are infrastructure, not forces. A faction with only buildings left, that also
// couldn't field anything new this turn, has effectively been beaten; the encounter ends.
//
// "No reinforcements this turn" is captured implicitly by checking at end-of-cleanup: by then,
// the AI's main-phase placement opportunity is over, combat has resolved, and pending is empty.
// If there are zero AI creatures committed at this moment, the AI had its full turn and managed
// no living presence on the board. That's retreat.
//
// Retreat is a HOSTILE-encounter-only mechanic. It does not apply to:
//   - Boss encounters (boss is a summoner with Durability; win via Durability=0, not retreat).
//   - Neutral encounters (the AI was never present; there's nothing to retreat from. Neutral
//     encounters end via player engagement consuming the neutral cards, or via the player
//     pressing the Leave Encounter button).
function checkAiRetreat() {
  if (!state.sides) return false;
  if (state.encounterKind !== "hostile") return false;
  // Any AI creature anywhere (committed or pending) cancels retreat. Pending will be empty when
  // called at end-of-cleanup, but the check is here for safety in case of mid-turn invocation.
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L("ai", loc);
    for (const pos of ["fl","fr","bl","br"]) {
      if (lc.creatures[pos] && lc.creatures[pos].owner === "ai") return false;
      if (lc.pending.creatures[pos] && lc.pending.creatures[pos].owner === "ai") return false;
    }
  }
  // No AI creatures present and no reinforcements pending. Retreat fires. Vanish any AI structures
  // (the faction withdrew with them).
  let vanished = 0;
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L("ai", loc);
    if (lc.structure && lc.structure.owner === "ai") {
      lc.structure = null;
      vanished++;
    }
  }
  logEntry(`The AI faction withdraws from ${LOC_NAMES.join(", ")}. ${vanished > 0 ? `(${vanished} structure${vanished === 1 ? "" : "s"} vanish with them.)` : ""}`, "win");
  state.encounterEndPending = "playerCleared";
  return true;
}

// Returns the highest-scoring legal (card, location, target) tuple, or null.
function aiPickBestPlay() {
  const ai = state.sides.ai;
  let best = null;
  for (const card of ai.hand) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      if (!canPay("ai", loc, card)) continue;
      const targets = legalTargetsForCard("ai", loc, card);
      if (targets.length === 0) continue;
      for (const target of targets) {
        const score = aiScorePlay(card, loc, target);
        if (score === null) continue;
        if (!best || score > best.score) best = { card, target, score };
      }
    }
  }
  return best;
}

// Score a (card, loc, target) play for the AI. Higher = better. Returns null to disqualify.
function aiScorePlay(card, loc, target) {
  const hints = card.aiHints || {};
  let score = 0;
  // Cost-magnitude weight (favor expensive plays). Sum across all cost stats for compound costs.
  const costs = card.costs || {};
  let costMag = 0;
  for (const s of Object.keys(costs)) costMag += costs[s];
  score += costMag * 2;
  if (card.type === "creature") return scoreCreaturePlay(card, loc, target, hints, score);
  if (card.type === "structure") return scoreStructurePlay(card, loc, target, hints, score);
  if (card.type === "action") return scoreActionPlay(card, loc, target, hints, score);
  return score;
}

function scoreCreaturePlay(card, loc, target, hints, baseScore) {
  let score = baseScore;
  const pos = target.pos;
  const isFront = (pos === "fl" || pos === "fr");
  const isBack = !isFront;
  const sameColumnFront = pos === "bl" ? "fl" : (pos === "br" ? "fr" : pos);
  const aiLoc = L("ai", loc);
  const playerLoc = L("player", loc);

  if (hints.preferFront && isFront) score += 5;
  if (hints.preferFront && isBack) score -= 2;
  if (hints.preferBack && isBack) score += 5;
  if (hints.preferBack && isFront) score -= 4;

  if (hints.requireBlocker && isBack) {
    const frontCard = aiLoc.creatures[sameColumnFront] || aiLoc.pending.creatures[sameColumnFront];
    if (frontCard) score += 6; else score -= 4;
  }
  if (hints.requireBlocker && isFront) score -= 6;

  if (hints.preferUncontestedColumn && isFront) {
    const enemyFront = playerLoc.creatures[pos];
    if (enemyFront) score -= 4; else score += 3;
  }

  if (hints.preferLowHpFront && isFront) {
    const enemyFront = playerLoc.creatures[pos];
    if (enemyFront && (enemyFront.durability || 0) <= (card.force || 0)) score += 4;
  }

  // Slight preference: locations where the enemy is *more* committed get higher creature priority
  // (push back at threats), and uncontested locations get slightly lower (no need to spend stats there).
  let enemyPresenceHere = 0;
  for (const p of ["fl","fr","bl","br"]) if (playerLoc.creatures[p]) enemyPresenceHere++;
  score += enemyPresenceHere * 0.6;

  if (pos === "fl" || pos === "bl") score += 0.5;
  return score;
}

function scoreStructurePlay(card, loc, target, hints, baseScore) {
  // Structures are always reasonable to play. Slight preference to spread structures across locations
  // — having a structure already at this location is worth less than putting one where there isn't one.
  let score = baseScore + 3;
  if (L("ai", loc).structure || L("ai", loc).pending.structure) score -= 2;
  return score;
}

function scoreActionPlay(card, loc, target, hints, baseScore) {
  let score = baseScore;
  const playerLoc = L("player", loc);

  // Damage spell with "here" scope (Spark). Per the universal damage fall-through rule, this is
  // ALWAYS a legal play — empty location → hits opposing summoner. Score reflects whether a creature
  // target is more or less attractive than summoner-pressure.
  if (hints.damagePreferTarget) {
    const enemiesHere = ["fl","fr","bl","br"].map(p => playerLoc.creatures[p]).filter(c => c);
    if (enemiesHere.length > 0) {
      score += 4; // creature target present — damage lands on a creature
      // Killable creature is best — clean removal.
      const wouldKill = enemiesHere.some(c => (c.durability || 0) <= 2);
      if (wouldKill) score += 3;
    } else {
      // No creature here — damage falls through to opposing summoner. Worth doing if the AI is
      // ahead on summoner pressure or just chipping the player down.
      score += 3; // slightly less attractive than killing a creature, but still real value
    }
  }

  if (hints.requiresOpposingAction) {
    // Counterspell is "here" — counters opposing actions at *this* location only. AI peeks at the
    // player's pending action at this location (transparent cheat per DECISIONS.md).
    const playerHasActionHere = !!(playerLoc.action || playerLoc.pending.action);
    if (!playerHasActionHere) return null;
    score += 8;
  }

  // Damage spell with scope = "at each of your locations" (Heralding Spark). Per fall-through, this
  // ALWAYS lands SOMETHING — creatures get hit, empty locations leak damage to the summoner.
  // Maximum value when most locations have targets *and* the empty ones can pressure the summoner.
  if (hints.damageAllLocations) {
    let creatureLocs = 0, emptyLocs = 0, killableHere = false;
    for (let l2 = 0; l2 < LOCATION_COUNT; l2++) {
      const enemyLoc = L("player", l2);
      const enemies = ["fl","fr","bl","br"].map(p => enemyLoc.creatures[p]).filter(c => c);
      if (enemies.length > 0) {
        creatureLocs++;
        if (enemies.some(c => (c.durability || 0) <= 1)) killableHere = true;
      } else {
        emptyLocs++;
      }
    }
    // Per-creature-loc bonus (chip damage), per-empty-loc bonus (summoner damage), kill bonus.
    score += creatureLocs * 2 + emptyLocs * 1.5;
    if (killableHere) score += 2;
    // Always playable — never returns null.
  }

  return score;
}

function runCombat() {
  state.phase = "combat";
  logEntry(`— Combat —`, "phase");
  logEntry(`Priority: ${state.firstSide === "player" ? "you" : "AI"} have priority on Tempo ties.`, "phase");
  firePhaseHook("onCombatStart");

  if (state.gameOver) return;

  // Per-location combat: each location resolves its own combat sequence. We process locations
  // left-to-right, but each location uses its own Tempo ordering.
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    if (state.gameOver) return;
    const orderedAttackers = computeCombatOrder(loc);
    if (orderedAttackers.length === 0) continue;
    logEntry(`At ${LOC_NAMES[loc]}:`, "combat-header");
    let currentSideHeaderLogged = null;
    for (const { side, pos, creature } of orderedAttackers) {
      if (state.gameOver) return;
      if (currentSideHeaderLogged !== side) {
        logEntry(`  ${side === "player" ? "Your" : "AI"} attacks:`, "combat-header");
        currentSideHeaderLogged = side;
      }
      const liveAttacker = L(side, loc).creatures[pos];
      if (!liveAttacker || liveAttacker.instId !== creature.instId) {
        logEntry(`    ${creature.name} (${pos}): killed before its swing — does not attack.`, "combat-detail");
        continue;
      }
      if (liveAttacker.sleepCounter > 0) {
        logEntry(`    ${liveAttacker.name} (${pos}): asleep — does not attack.`, "combat-detail");
        continue;
      }
      if (liveAttacker.wokeInPhase === state.phase) {
        logEntry(`    ${liveAttacker.name} (${pos}): just woke up this phase — does not attack.`, "combat-detail");
        continue;
      }
      if ((liveAttacker.force || 0) <= 0) {
        logEntry(`    ${liveAttacker.name} (${pos}): no Force — does not attack.`, "combat-detail");
        continue;
      }
      // Ranged: consume ammo from this side's stockpile here. If insufficient at swing-time
      // (could happen if multiple ranged on same side drain it), the shot fizzles.
      if (liveAttacker.ranged) {
        const cost = liveAttacker.ammoCost || 1;
        const lc2 = L(side, loc);
        if ((lc2.ammo || 0) < cost) {
          logEntry(`    ${liveAttacker.name} (${pos}): out of ammo — can't fire.`, "combat-detail");
          continue;
        }
        lc2.ammo -= cost;
        logEntry(`    ${liveAttacker.name} (${pos}): spends ${cost} ammo (${side} ${LOC_NAMES[loc]} stockpile now ${lc2.ammo}).`, "combat-detail");
      }
      resolveAttack(side, loc, pos, liveAttacker);
      _initResolved.add(`attack-${liveAttacker.instId}`);
    }
  }
  firePhaseHook("onCombatEnd");
  checkGameOver();
}

// Compute combat order at a single location. Per-location Tempo hierarchy:
//   1. Tempo descending
//   2. Side priority (higher local Tempo total at THIS location wins; ties go to state.firstSide)
//   3. Position rank (front-row left, then front-row right; back-row ranged after)
// Ranged creatures attack from any row, melee creatures attack from the front row only.
function computeCombatOrder(loc) {
  const POS_RANK = { fl: 0, fr: 1, bl: 2, br: 3 };

  const localTempoTotal = {
    player: committedStatTotal("player", loc, "tempo"),
    ai: committedStatTotal("ai", loc, "tempo")
  };
  function sidePriorityRank(side) {
    if (localTempoTotal.player > localTempoTotal.ai) return side === "player" ? 0 : 1;
    if (localTempoTotal.ai > localTempoTotal.player) return side === "ai" ? 0 : 1;
    return side === state.firstSide ? 0 : 1;
  }

  const candidates = [];
  for (const sideName of ["player", "ai"]) {
    for (const pos of ["fl", "fr", "bl", "br"]) {
      const c = L(sideName, loc).creatures[pos];
      if (!c) continue;
      // Melee: front row only. Ranged: any row but needs ammo to fire.
      const isBack = pos === "bl" || pos === "br";
      if (isBack && !c.ranged) continue;
      if (c.sleepCounter > 0) continue;
      if (c.wokeInPhase === state.phase) continue;
      if ((c.force || 0) <= 0) continue;
      // Ranged creatures need ammo to attack (any row — they only fire, never melee).
      if (c.ranged) {
        const cost = c.ammoCost || 1;
        if ((L(sideName, loc).ammo || 0) < cost) continue;
      }
      candidates.push({
        side: sideName, loc, pos, creature: c,
        sortKey: [-(c.tempo || 0), sidePriorityRank(sideName), POS_RANK[pos]]
      });
    }
  }
  candidates.sort((a, b) => {
    for (let i = 0; i < a.sortKey.length; i++) {
      if (a.sortKey[i] !== b.sortKey[i]) return a.sortKey[i] - b.sortKey[i];
    }
    return 0;
  });
  return candidates;
}

// Resolve a single side's action at a single location. Default scope is "here" — Counterspell hits
// only the action at this location (the opposing side's action at this same location).
// Universal damage rule (per DECISIONS.md 2026-05-02): damage looks for a creature target at the
// resolving location; if no valid target, it falls through to the opposing summoner. One fall-
// through instance per location regardless of whether the source was single-target or multi-target.
// `actionName` and `actionLocLabel` are used only for log clarity.
// ---------- Tokens ----------
// A token is a permanent generated mid-encounter by another card's effect (e.g., a flip-up trigger).
// Tokens behave on the battlefield like any other permanent — they occupy slots, contribute stats,
// can be destroyed by combat or effects — but they have NO representation in any zone outside the
// battlefield. They aren't in any deck, hand, discard, graveyard, or exile. When destroyed they
// cease to exist. (Per DESIGN.md "Tokens" section.)
//
// In code: tokens are normal card objects with `isToken: true`. They use the existing slot grid
// and combat code unchanged. The differences are in lifecycle: tokens are NOT shuffled into the
// run deck, NOT placed in graveyard on death — they just disappear.
function createToken(defKey, owner) {
  const card = createCard(defKey, owner);
  card.isToken = true;
  card.revealed = true; // Tokens enter face-up (skip the play queue / face-down beat).
  return card;
}

// Try to spawn a token of `defKey` at the first empty slot matching the given filter, on the same
// side as `owner` at the given location. Returns the token if placed, null if no empty slot was
// found. Used by flip-up triggers and other generators.
function spawnTokenAt(owner, loc, defKey, slotFilter) {
  const lc = L(owner, loc);
  const def = CARD_DEFS[defKey];
  if (!def) return null;
  // Default slot search: empty creature slots in front-then-back, left-then-right order.
  const positions = slotFilter || ["fl", "fr", "bl", "br"];
  if (def.type === "creature") {
    for (const pos of positions) {
      if (!lc.creatures[pos]) {
        const tok = createToken(defKey, owner);
        lc.creatures[pos] = tok;
        return { card: tok, where: "creature", pos };
      }
    }
  } else if (def.type === "structure") {
    if (!lc.structure) {
      const tok = createToken(defKey, owner);
      lc.structure = tok;
      return { card: tok, where: "structure" };
    }
  }
  return null;
}

// ---------- Flip-up trigger dispatcher ----------
// Called from endOfPhaseRevealAndResolve when a face-down creature/structure flips face-up.
// The card may print an `onFlipUp` effect key — looked up by string and executed here. Flip-up
// triggers fire after the card transitions revealed=false → revealed=true, so the card itself is
// face-up and on the board for the trigger.
//
// Per the unified face-down rule, flip-up triggers fire EVERY time a card transitions face-down to
// face-up — not just the first time. Stealth-and-re-flip combos rely on this.
function fireFlipUpTrigger(side, loc, card) {
  // Location-text onFlipUp runs first — it sees the freshly-flipped card and can adjust state
  // (e.g., Ogre Hideaway puts ogres to sleep) before the card's own flip-up trigger fires.
  const locKey = LOC_TEXT_KEYS[loc];
  if (locKey && LOCATION_TEXTS[locKey] && typeof LOCATION_TEXTS[locKey].onFlipUp === "function") {
    LOCATION_TEXTS[locKey].onFlipUp(loc, side, card);
  }
  const effect = card.onFlipUp;
  if (!effect) return;
  if (effect === "spawnSandbag") {
    // Combat Engineer: create a Sandbag token at an empty front-row slot here.
    const result = spawnTokenAt(side, loc, "sandbag", ["fl", "fr"]);
    if (result) {
      logEntry(`  ${card.name} drops a Sandbag at ${LOC_NAMES[loc]} ${result.pos}.`, "combat-detail");
    } else {
      logEntry(`  ${card.name} can't drop a Sandbag — front row full.`, "combat-detail");
    }
  } else if (effect === "buffFriendlyForceHere") {
    // Herald (engine demo): a friendly creature here gains +1 Force until end of turn.
    // Per Pillar 10 (no resolve-time targeting), pick from the legal random pool. The pool is
    // friendly face-up creatures here, EXCLUDING self. If self is the only candidate, the buff
    // lands on self.
    const lc = L(side, loc);
    const candidates = ["fl","fr","bl","br"]
      .map(pos => ({ pos, c: lc.creatures[pos] }))
      .filter(x => x.c && x.c.revealed !== false && x.c !== card);
    if (candidates.length === 0) {
      // Self-only target.
      grantUntilEndOfTurn(card, "force", 1);
      logEntry(`  ${card.name} buffs itself +1 Force (no other friendly here).`, "combat-detail");
    } else {
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      grantUntilEndOfTurn(pick.c, "force", 1);
      logEntry(`  ${card.name} grants +1 Force to ${pick.c.name} (${side} ${LOC_NAMES[loc]} ${pick.pos}) until end of turn.`, "combat-detail");
    }
  } else if (effect === "damage1Here") {
    // Sapper (engine demo): deal 1 damage here. Per universal damage rule: hits a face-up creature
    // here at random (non-neutral preferred for player-cast effects? actually no — damage hits any
    // creature including neutral ones since they're targetable per design). Falls through to
    // opposing summoner if no valid target.
    dealDamageAtLoc(side, loc, 1, card.name, ` (flip-up)`);
  } else if (effect === "loneChampionBrawler") {
    // R1 Goblin Brawler: if this is the only creature on your side here, gain +1 Force.
    // Default-duration buff (lasts as long as this card is in play). One-time check at flip-up;
    // doesn't recheck if conditions change.
    const lc = L(side, loc);
    let othersHere = 0;
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.creatures[pos];
      if (c && c !== card) othersHere++;
    }
    if (othersHere === 0) {
      card.force = (card.force || 0) + 1;
      logEntry(`  ${card.name} is alone here — gains +1 Force.`, "combat-detail");
    } else {
      logEntry(`  ${card.name} not alone (${othersHere} other${othersHere === 1 ? "" : "s"} here) — no bonus.`, "combat-detail");
    }
  } else if (effect === "bruiserChargeBuff") {
    // R3 Orc Bruiser: gains +1 Force this turn (always fires; no conditional).
    grantUntilEndOfTurn(card, "force", 1);
    logEntry(`  ${card.name} charges in — +1 Force this turn.`, "combat-detail");
  } else if (effect === "recruiterAloneRecruit") {
    // R6 Goblin Recruiter: if this is the only creature on your side here, fire Recruit.
    const lc = L(side, loc);
    let othersHere = 0;
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.creatures[pos];
      if (c && c !== card) othersHere++;
    }
    if (othersHere === 0) {
      logEntry(`  ${card.name} is alone — attempting Recruit.`, "combat-detail");
      runRecruitConversion(side, loc, card.name);
    } else {
      logEntry(`  ${card.name} not alone (${othersHere} other${othersHere === 1 ? "" : "s"} here) — Recruit gated off.`, "combat-detail");
    }
  } else if (effect === "bullyPush") {
    // RR1 Goblin Bully: push the creature across from this Bully (same column, other side, front
    // row) from front to back. Push fizzles if Bully isn't in the front row (no across slot to
    // push from), if the across slot is empty, or if the back-row destination is occupied.
    // Find Bully's position on its side.
    const lc = L(side, loc);
    let bullyPos = null;
    for (const pos of ["fl","fr","bl","br"]) {
      if (lc.creatures[pos] === card) { bullyPos = pos; break; }
    }
    if (bullyPos !== "fl" && bullyPos !== "fr") {
      logEntry(`  ${card.name} not in front — push fizzles.`, "combat-detail");
    } else {
      const otherSide = other(side);
      const otherLoc = L(otherSide, loc);
      const target = otherLoc.creatures[bullyPos];      // creature across from Bully
      const destPos = bullyPos === "fl" ? "bl" : "br";  // same column, back row
      if (!target) {
        logEntry(`  ${card.name} — no creature across from ${bullyPos} on the other side. Push fizzles.`, "combat-detail");
      } else if (otherLoc.creatures[destPos]) {
        logEntry(`  ${card.name} — back-row ${destPos} on the other side is occupied. Push fizzles.`, "combat-detail");
      } else {
        otherLoc.creatures[bullyPos] = null;
        otherLoc.creatures[destPos] = target;
        logEntry(`  ${card.name} pushes ${target.name} (${otherSide}) from ${bullyPos} to ${destPos}.`, "combat-detail");
      }
    }
  } else if (effect === "stealthRowAdjacentFriendlies") {
    // g5 Rebel Outrider: re-stealth friendly creatures in the same row on this side. They go
    // face-down and will re-flip at end of current phase via the unified rule, firing flip-up
    // triggers a second time.
    const lc = L(side, loc);
    let selfPos = null;
    for (const pos of ["fl","fr","bl","br"]) {
      if (lc.creatures[pos] === card) { selfPos = pos; break; }
    }
    if (!selfPos) return;
    const sameRowAdjacent = { fl: ["fr"], fr: ["fl"], bl: ["br"], br: ["bl"] }[selfPos] || [];
    let stealthed = 0;
    for (const p of sameRowAdjacent) {
      const target = lc.creatures[p];
      if (!target) continue;
      if (target.revealed === false) continue;  // already face-down — no effect
      stealth(target);
      logEntry(`  ${card.name} stealths ${target.name} (${side} ${p}).`, "combat-detail");
      stealthed++;
    }
    if (stealthed === 0) logEntry(`  ${card.name}: no same-row friendlies to stealth.`, "combat-detail");
  } else if (effect === "sendFriendlyAway") {
    // g7 Rebel Runner: move a friendly creature here to another location. Pillar 10 random pick
    // from candidates (friendlies at this location, excluding self) and from destinations.
    const lc = L(side, loc);
    const candidates = [];
    for (const p of ["fl","fr","bl","br"]) {
      const c = lc.creatures[p];
      if (!c || c === card) continue;
      if (c.revealed === false) continue;
      candidates.push({ pos: p, c });
    }
    if (candidates.length === 0) {
      logEntry(`  ${card.name}: no other friendly creature here to send.`, "combat-detail");
      return;
    }
    const dests = [];
    for (let l2 = 0; l2 < LOCATION_COUNT; l2++) {
      if (l2 === loc) continue;
      const lc2 = L(side, l2);
      for (const p of ["fl","fr","bl","br"]) {
        if (!lc2.creatures[p]) dests.push({ loc: l2, pos: p });
      }
    }
    if (dests.length === 0) {
      logEntry(`  ${card.name}: no empty destination slot at other locations — fizzles.`, "combat-detail");
      return;
    }
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    const dest = dests[Math.floor(Math.random() * dests.length)];
    lc.creatures[pick.pos] = null;
    L(side, dest.loc).creatures[dest.pos] = pick.c;
    logEntry(`  ${card.name} sends ${pick.c.name} from ${LOC_NAMES[loc]} ${pick.pos} → ${LOC_NAMES[dest.loc]} ${dest.pos}.`, "combat-detail");
  } else if (effect === "dropTrapOpposingFront") {
    // g8 Rebel Saboteur: plant an Explosive Trap on the opposing side's front row at this location.
    dropExplosiveTrap(other(side), loc);
  }
}

// Stealth: flip a face-up card face-down. Per the unified face-down rule, the card becomes
// inert (no stats, no combat, not targetable, triggers dormant) until it flips up again at the
// next end-of-phase reveal. Clears flippedThisTurn so the re-flip will set it again. Does NOT
// detach equipment or wake sleepers — only changes revealed state.
function stealth(card) {
  if (!card || card.revealed === false) return;
  card.revealed = false;
  card.flippedThisTurn = false;
}

// Grant a temporary "until end of turn" stat buff to a card. The buff is applied to the in-play
// instance only and does not persist into the run deck (unlike Forge's permanent +1 Force).
// Tracked via state.endOfTurnReverts so cleanup can revert.
//
// Inert keyword (per DESIGN.md): cards with `inert: true` cannot gain Force/Tempo/Insight/Resolve
// from any source. Buffs to those stats no-op. Durability is not on the no-grow list — Inert cards
// can be healed/repaired.
function grantUntilEndOfTurn(card, stat, amount) {
  if (card.inert && ["force","tempo","insight","resolve"].includes(stat)) {
    // Inert blocks the buff entirely. Don't track for revert.
    return;
  }
  card[stat] = (card[stat] || 0) + amount;
  if (!state.endOfTurnReverts) state.endOfTurnReverts = [];
  state.endOfTurnReverts.push({ card, stat, amount });
}

// ---------- Marks system ----------
// A mark is per-instance permanent state. Each mark = { kind, side }. Marks persist through
// pile cycling and across encounters. Same-kind double mark on a card destroys it (exile).
//
// Mark kinds:
//   - "reroute" (Green): on leave-play, destination redirects to the marker's same-zone pile.
//   - "convert" (White): switches sides when overhealed by Force value+. Not implemented.
//   - "damage"  (Red):   +1 damage from any damage source on this card. Not implemented.
//
// applyMark: place a mark on a card from a side. If a same-kind mark already exists, the card
// is destroyed (exiled). Returns true if the mark applied normally, false if double-mark exile.
function applyMark(card, kind, side) {
  if (!card.marks) card.marks = [];
  const existing = card.marks.find(m => m.kind === kind);
  if (existing) {
    // Same-kind double mark — card tears in half. Exile from the run entirely.
    logEntry(`  ${card.name} torn in half — same-kind double mark (${kind}). Exiled.`, "combat-detail");
    exileFromPlay(card);
    // Same-kind exile is permanent: remove the entry from the run-deck so it can't return.
    if (card.runDeckEntry) {
      const idx = state.runDeck.indexOf(card.runDeckEntry);
      if (idx !== -1) state.runDeck.splice(idx, 1);
    }
    return false;
  }
  card.marks.push({ kind, side });
  // Mirror the mark into the run-deck entry's mods so it persists across encounters.
  if (card.runDeckEntry) {
    if (!card.runDeckEntry.mods) card.runDeckEntry.mods = {};
    if (!card.runDeckEntry.mods.marks) card.runDeckEntry.mods.marks = [];
    card.runDeckEntry.mods.marks.push({ kind, side });
  }
  logEntry(`  ${card.name}: marked for ${kind} (by ${side}).`, "combat-detail");
  return true;
}

// Exile a card from play immediately, regardless of zone. Used by same-kind double-mark.
// Removes the card from whatever slot it's in, detaches equipment, places in exile under its
// current side.
function exileFromPlay(card) {
  for (const side of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(side, loc);
      for (const pos of ["fl","fr","bl","br"]) {
        if (lc.creatures[pos] === card) {
          detachAllEquipmentFromHost(card, side, loc);
          lc.creatures[pos] = null;
          state.sides[side].exile.push(card);
          return;
        }
      }
      if (lc.structure === card) {
        detachAllEquipmentFromHost(card, side, loc);
        lc.structure = null;
        state.sides[side].exile.push(card);
        return;
      }
      if (lc.action === card) {
        lc.action = null;
        state.sides[side].exile.push(card);
        return;
      }
    }
  }
}

// Central leave-play pile routing. Tokens always exile (regardless of marks). Otherwise check
// the card's marks for "reroute" — if present, the destination side becomes the marker's side.
// Rerouted-to-player marks the card `acquired = true` so it joins runDeck at encounter end.
// Triggers fire BEFORE this is called (per design: leave-play triggers from original side, then
// destination modifies).
function sendToPile(card, intendedSide, zone) {
  if (card.isToken) { state.sides[intendedSide].exile.push(card); return; }
  const reroute = card.marks ? card.marks.find(m => m.kind === "reroute") : null;
  let destSide = intendedSide;
  if (reroute && reroute.side !== intendedSide) {
    destSide = reroute.side;
    if (destSide === "player") card.acquired = true;
    logEntry(`  ${card.name}: rerouted to ${destSide}'s ${zone}.`, "combat-detail");
  }
  state.sides[destSide][zone].push(card);
}

// Generic leave-play trigger dispatch. Fires Deathwish and any future leave-play effects.
// Called BEFORE sendToPile so triggers see the original side/position and fire from there
// (per design: triggers fire first, destination modifies after).
// pos is optional — if provided, recorded on the card as lastPos for position-dependent effects.
function fireLeavePlayTriggers(card, side, loc, pos) {
  if (pos !== undefined) card.lastPos = pos;
  if (card.deathwish) fireDeathwish(card, side, loc);
}

// Dispatcher for Deathwish effect tags. Each tag is a behavior key. New effects add cases here.
function fireDeathwish(card, side, loc) {
  const effect = card.deathwish;
  if (!effect) return;
  logEntry(`  ${card.name} (${side} ${LOC_NAMES[loc] || ""}) — Deathwish: ${effect}.`, "combat-detail");
  if (effect === "dropQuest_badIntel") {
    // Drop a Bad Intel quest token into this side's action slot at this location. If the slot
    // is occupied, the new quest fizzles (no slot to occupy → ripped up immediately).
    const lc = L(side, loc);
    if (lc.action) {
      logEntry(`    Action slot occupied at ${LOC_NAMES[loc]} — Bad Intel quest fizzles.`, "combat-detail");
      return;
    }
    const token = createQuestToken("badIntel", side);
    token.revealed = true;  // Tokens enter face-up per the token rule.
    lc.action = token;
    logEntry(`    Bad Intel quest token enters at ${side} @${LOC_NAMES[loc]}.`, "combat-detail");
  } else if (effect === "moveFriendlyHere") {
    // g1 Rebel Scout: move one of your creatures from another location to this slot. By the time
    // deathwish fires, the dying card has been removed from its slot, so the slot at (side, loc)
    // is empty. Random pick from legal candidates (creatures on the same side at a different loc).
    const lc = L(side, loc);
    const candidates = [];
    for (let l2 = 0; l2 < LOCATION_COUNT; l2++) {
      if (l2 === loc) continue;
      const otherLoc = L(side, l2);
      for (const p of ["fl","fr","bl","br"]) {
        const c = otherLoc.creatures[p];
        if (c && c.revealed !== false) candidates.push({ loc: l2, pos: p, c });
      }
    }
    if (candidates.length === 0) {
      logEntry(`    No friendly creature at another location — fizzles.`, "combat-detail");
      return;
    }
    // Find an empty slot at this location to land in. Pillar 10 random pick among empties.
    const empties = ["fl","fr","bl","br"].filter(p => !lc.creatures[p]);
    if (empties.length === 0) {
      logEntry(`    No empty slot at ${LOC_NAMES[loc]} — fizzles.`, "combat-detail");
      return;
    }
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    const destPos = empties[Math.floor(Math.random() * empties.length)];
    L(side, pick.loc).creatures[pick.pos] = null;
    lc.creatures[destPos] = pick.c;
    logEntry(`    ${pick.c.name} moves from ${LOC_NAMES[pick.loc]} ${pick.pos} → ${LOC_NAMES[loc]} ${destPos}.`, "combat-detail");
  } else if (effect === "dropTrapFront") {
    // g3 Rebel Skirmisher: drop an Explosive Trap token in your front row at this location.
    dropExplosiveTrap(side, loc);
  } else if (effect === "explosiveTrap") {
    // The Trap's own deathwish: damage same-side adjacent creatures + creatures that hit this
    // with melee damage this turn. "Adjacent" = same-side only (same row other column + same
    // column back row).
    explosiveTrapDeathwish(card, side, loc);
  }
}

// Drop an Explosive Trap token into a side's front row at a location. Pillar 10 random empty
// slot pick; fizzles if both front slots are occupied. Returns the placed token or null.
function dropExplosiveTrap(side, loc) {
  const lc = L(side, loc);
  const empties = ["fl","fr"].filter(p => !lc.creatures[p]);
  if (empties.length === 0) {
    logEntry(`    Explosive Trap: front row full on ${side} ${LOC_NAMES[loc]} — fizzles.`, "combat-detail");
    return null;
  }
  const destPos = empties[Math.floor(Math.random() * empties.length)];
  const trap = createCard("g_trap", side);
  trap.isToken = true;
  trap.revealed = true;  // Tokens enter face-up.
  lc.creatures[destPos] = trap;
  logEntry(`    Explosive Trap drops at ${side} ${LOC_NAMES[loc]} ${destPos}.`, "combat-detail");
  return trap;
}

// Trap's deathwish resolution: damage same-side adjacents + any creature that dealt melee damage
// to this trap on this turn (tracked via card.meleeAttackersThisTurn).
function explosiveTrapDeathwish(trap, side, loc) {
  // Adjacency map: same-side, geographic neighbors. The trap's position when it dies is unknown
  // here (already removed from slot), so check meleeAttackersThisTurn and scan same-side slots
  // adjacent to where it WAS. We need the position to compute adjacency — store it on the trap
  // when placed and at every position change.
  // For now: damage every same-side creature touching its last-known position.
  const lc = L(side, loc);
  const ADJACENT = { fl: ["fr","bl"], fr: ["fl","br"], bl: ["fl","br"], br: ["fr","bl"] };
  const adjacents = ADJACENT[trap.lastPos || "fl"] || [];
  const hits = [];
  for (const p of adjacents) {
    const target = lc.creatures[p];
    if (target) hits.push({ target, where: { side, loc, pos: p } });
  }
  // Add melee attackers from this turn (other side of board, by definition — melee comes from
  // enemy creatures). They may still be alive or already destroyed/moved.
  const attackerIds = trap.meleeAttackersThisTurn || [];
  for (const id of attackerIds) {
    // Find this attacker on the board by instId.
    for (const s2 of ["player","ai"]) {
      for (let l2 = 0; l2 < LOCATION_COUNT; l2++) {
        const lc2 = L(s2, l2);
        for (const p of ["fl","fr","bl","br"]) {
          const c = lc2.creatures[p];
          if (c && c.instId === id) {
            // Avoid double-hit if the attacker was also a same-side adjacent (won't happen across
            // sides, but defensive).
            if (!hits.some(h => h.target === c)) hits.push({ target: c, where: { side: s2, loc: l2, pos: p } });
          }
        }
      }
    }
  }
  if (hits.length === 0) {
    logEntry(`    Explosive Trap: no targets in range.`, "combat-detail");
    return;
  }
  for (const h of hits) {
    applyCombatDamage(h.where.side, h.where.loc, h.where.pos, 2, `Explosive Trap`);
  }
}

// Attach an equipment card to a host (creature or structure). Equipment's granted attack
// patterns are appended to the host's. Equipment is stored in host.equipment for tracking.
// When the host leaves play, equipment goes to the host-side's junkyard via detachAllEquipment.
// Hard rule: one equipment per host. Returns true on success, false if the cap blocks the attach.
const EQUIPMENT_CAP_PER_HOST = 1;
function attachEquipmentToHost(equipment, host, hostSide) {
  if (!host.equipment) host.equipment = [];
  if (host.equipment.length >= EQUIPMENT_CAP_PER_HOST) return false;
  host.equipment.push(equipment);
  equipment.attachedTo = host.instId;
  equipment.attachedSide = hostSide;
  // Equipment landing on a player-side host is acquired — joins the run-deck at encounter end.
  // Caught here so any path that attaches (pre-place, location-text rewire, future play-from-hand)
  // marks acquisition consistently.
  if (hostSide === "player") equipment.acquired = true;
  if (equipment.grantsAttackPatterns) {
    for (const p of equipment.grantsAttackPatterns) {
      host.attackPatterns.push({ ...p });
    }
  }
  return true;
}

// Detach all equipment from a host that's leaving play. Each equipment goes to the side's
// junkyard. (Magnetic override: returns to your-side's junkyard regardless. Not implemented for
// slice — equipment in slice is single-side only.)
//
// Fires the location-text `onEquipmentLeavesPlay(loc, equipment, hostSide)` hook for each piece of
// equipment, BEFORE pushing to the junkyard. Location text can intercept (e.g., Goblin Armaments
// attaches the equipment to a goblin instead of letting it go to the junkyard).
function detachAllEquipmentFromHost(host, hostSide, loc) {
  if (!host.equipment || host.equipment.length === 0) return;
  const equipment = host.equipment;
  host.equipment = [];
  for (const eq of equipment) {
    // Fire location-text hook for this equipment leaving play at this location. Hook may
    // re-attach the equipment to a different host instead of going to junkyard. If the hook
    // returns truthy ("handled"), skip the default junkyard push.
    let handled = false;
    if (loc != null) {
      const key = LOC_TEXT_KEYS[loc];
      if (key && LOCATION_TEXTS[key] && typeof LOCATION_TEXTS[key].onEquipmentLeavesPlay === "function") {
        handled = LOCATION_TEXTS[key].onEquipmentLeavesPlay(loc, eq, hostSide);
      }
    }
    if (!handled) {
      logEntry(`    ${eq.name} (equipment on ${host.name}) → ${hostSide} junkyard.`, "combat-detail");
      sendToPile(eq, hostSide, "junkyard");
    }
  }
}

// Called when a creature takes damage from any source (combat, action, Battle Driver, etc.).
// Fires per-damage-instance triggers like Enraged. `amount` is the damage instance size.
function onCreatureTookDamage(card, side, loc, amount) {
  if (!card || amount <= 0) return;
  // Damage wakes a sleeper. The wake-in-phase flag gates awake-actions (attack, move) for the
  // remainder of the current phase. Self-clears by phase comparison — no explicit reset needed.
  if (card.sleepCounter > 0) {
    card.sleepCounter = 0;
    card.wokeInPhase = state.phase;
    logEntry(`  ${card.name} wakes up from damage (groggy this ${state.phase} phase).`, "combat-detail");
  }
  if (card.enraged) {
    grantUntilEndOfTurn(card, "force", 1);
    logEntry(`  ${card.name} is Enraged — gains +1 Force this turn.`, "combat-detail");
  }
}

// Sacrifice a creature on a side at a location. Sends the creature directly to the graveyard
// (death event — leave-play triggers fire normally). Returns the sacrificed card, or null if no
// creature matched the filter. `filterFn(card)` is optional — returns true for legal sacrifice
// targets. If multiple candidates, picks one at random (Pillar 10).
function sacrificeCreatureOnSide(side, loc, filterFn, sourceName) {
  const lc = L(side, loc);
  const candidates = [];
  for (const pos of ["fl","fr","bl","br"]) {
    const c = lc.creatures[pos];
    if (!c) continue;
    if (c.revealed === false) continue;  // face-down cards are not legal targets
    if (filterFn && !filterFn(c)) continue;
    candidates.push({ pos, c });
  }
  if (candidates.length === 0) return null;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  const reason = candidates.length === 1 ? "[only legal target]" : `[random pick from ${candidates.length}]`;
  logEntry(`  ${sourceName} sacrifices ${pick.c.name} (${side} ${pick.pos}). ${reason}`, "combat-detail");
  // Remove from slot; fire leave-play triggers (deathwish etc.) from original side/loc; detach
  // equipment; route to pile (tokens exile, marks may redirect).
  const pos = pick.pos;
  lc.creatures[pos] = null;
  fireLeavePlayTriggers(pick.c, side, loc, pos);
  detachAllEquipmentFromHost(pick.c, side, loc);
  sendToPile(pick.c, side, "graveyard");
  return pick.c;
}

// Run the Recruit conversion verb at a location for a side. Used by the Recruit action card and
// by Goblin Recruiter's alone-conditional flip-up. Force-superiority check: front-row Force on
// caster's side > front-row Force on the other side. If yes, pick a creature in the front row on
// the other side at random (Pillar 10) and move it to the caster's same-column front slot.
// Fizzles if Force not superior, no front-row creatures opposite, or destination slot occupied.
// On success, the taken creature is marked `acquired` and joins the caster's piles at encounter end.
function runRecruitConversion(side, loc, sourceName) {
  const otherSide = other(side);
  const casterLoc = L(side, loc);
  const otherLoc = L(otherSide, loc);
  // Force at a location = front-row creatures' effective Force (per design).
  const casterFrontForce = committedStatTotal(side, loc, "force");
  const otherFrontForce = committedStatTotal(otherSide, loc, "force");
  if (casterFrontForce <= otherFrontForce) {
    logEntry(`  ${sourceName} (${side} @${LOC_NAMES[loc]}) — Force ${casterFrontForce} not greater than ${otherFrontForce}. Fizzles.`, "combat-detail");
    return false;
  }
  const candidates = [];
  for (const pos of ["fl", "fr"]) {
    const c = otherLoc.creatures[pos];
    if (!c) continue;
    if (c.revealed === false) continue;  // face-down cards are not legal targets (unified rule)
    candidates.push({ pos, c });
  }
  if (candidates.length === 0) {
    logEntry(`  ${sourceName} (${side} @${LOC_NAMES[loc]}) — no legal creatures in front on the other side. Fizzles.`, "combat-detail");
    return false;
  }
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  // Destination: any open front-row slot on the caster's side at this location. Per Pillar 10,
  // pick randomly among open front slots. Fizzles only if BOTH front slots are occupied.
  const openDests = ["fl", "fr"].filter(p => !casterLoc.creatures[p]);
  if (openDests.length === 0) {
    logEntry(`  ${sourceName} (${side} @${LOC_NAMES[loc]}) — both front slots occupied. Fizzles.`, "combat-detail");
    return false;
  }
  const destPos = openDests[Math.floor(Math.random() * openDests.length)];
  otherLoc.creatures[pick.pos] = null;
  pick.c.owner = side;
  pick.c.acquired = true;
  casterLoc.creatures[destPos] = pick.c;
  const sourceReason = candidates.length === 1 ? "[only legal target]" : `[random pick from ${candidates.length}]`;
  const destReason = openDests.length === 1 ? "" : ` [random open front slot from ${openDests.length}]`;
  logEntry(`  ${sourceName} (${side} @${LOC_NAMES[loc]}) → ${pick.c.name} moves to ${side} ${destPos}. Joins your piles at encounter end. ${sourceReason}${destReason}`, "combat-detail");
  return true;
}

// Called at end of cleanup to revert any "until end of turn" buffs.
function revertEndOfTurnBuffs() {
  if (!state.endOfTurnReverts) return;
  for (const r of state.endOfTurnReverts) {
    r.card[r.stat] = (r.card[r.stat] || 0) - r.amount;
  }
  state.endOfTurnReverts = [];
}

function dealDamageAtLoc(sourceSide, loc, dmg, actionName, actionLocLabel) {
  const enemySide = other(sourceSide);
  const enemyLoc = L(enemySide, loc);
  // Build candidate pool with reveal status logged. Face-down cards are inert per the unified
  // face-down rule and excluded from damage targets.
  const allSlots = ["fl", "fr", "bl", "br"]
    .map(pos => ({ pos, c: enemyLoc.creatures[pos] }))
    .filter(x => x.c);
  const targets = allSlots.filter(x => x.c.revealed !== false);
  const excluded = allSlots.filter(x => x.c.revealed === false);
  // Log the candidate pool so the random pick is auditable.
  if (allSlots.length === 0) {
    logEntry(`  ${actionName} (${sourceSide}${actionLocLabel}) targets at ${LOC_NAMES[loc]}: none (board empty).`, "combat-detail");
  } else {
    const inLabel = targets.map(x => `${x.c.name}(${x.pos})`).join(", ") || "—";
    const exLabel = excluded.length ? ` | excluded face-down: ${excluded.map(x => `${x.c.name}(${x.pos})`).join(", ")}` : "";
    logEntry(`  ${actionName} (${sourceSide}${actionLocLabel}) targets at ${LOC_NAMES[loc]}: [${inLabel}]${exLabel}`, "combat-detail");
  }
  if (targets.length === 0) {
    // Fall-through: no face-up creatures here, damage hits the opposing summoner.
    state.sides[enemySide].durability -= dmg;
    logEntry(`  ${actionName} (${sourceSide}${actionLocLabel}) → ${enemySide} summoner for ${dmg}. (${enemySide} Durability: ${state.sides[enemySide].durability}) [fall-through]`, "combat-detail");
    return;
  }
  const pick = targets[Math.floor(Math.random() * targets.length)];
  pick.c.durability -= dmg;
  const pickReason = targets.length === 1 ? "[only legal target]" : `[random pick from ${targets.length}]`;
  logEntry(`  ${actionName} (${sourceSide}${actionLocLabel}) → ${pick.c.name} (${enemySide} ${LOC_NAMES[loc]} ${pick.pos}) for ${dmg}. ${pickReason}`, "combat-detail");
  // Fire damage-taken triggers (Enraged etc.).
  onCreatureTookDamage(pick.c, enemySide, loc, dmg);
  if (pick.c.durability <= 0) {
    logEntry(`    ${pick.c.name} is destroyed.`, "combat-detail");
    const dPos = pick.pos;
    enemyLoc.creatures[dPos] = null;
    fireLeavePlayTriggers(pick.c, enemySide, loc, dPos);
    detachAllEquipmentFromHost(pick.c, enemySide, loc);
    sendToPile(pick.c, enemySide, "graveyard");
  }
}

function resolveAction(side, loc) {
  const lc = L(side, loc);
  const s = state.sides[side];
  if (!lc.action) return;
  const action = lc.action;
  let exitZone = "discard";

  if (action.effect === "deal2") {
    // Deal 2 damage to a random enemy creature *here* (or fall through to summoner).
    dealDamageAtLoc(side, loc, 2, action.name, ` @${LOC_NAMES[loc]}`);
  } else if (action.effect === "counterspell") {
    // Counterspell: clear the opposing action at *this* location (default scope "here").
    const oppLoc = L(other(side), loc);
    if (oppLoc.action) {
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) counters ${oppLoc.action.name} (${other(side)}) — to graveyard.`, "combat-detail");
      const c = oppLoc.action;
      oppLoc.action = null;
      sendToPile(c, other(side), "graveyard");
    } else {
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) finds no opposing action here — fizzles, exits to graveyard.`, "combat-detail");
    }
    exitZone = "graveyard";
  } else if (action.effect === "permPlus1ForceHere") {
    // Permanent stat-buff action: pick a random creature here (per Pillar 10), give +1 Force
    // permanently. Self-exiles per the exile-as-physical-destruction rule for permanent stat
    // buffs — the card is physically destroyed and cannot be recovered.
    const candidates = [];
    for (const sideName of ["player", "ai"]) {
      const lc2 = L(sideName, loc);
      for (const pos of ["fl","fr","bl","br"]) {
        const c = lc2.creatures[pos];
        if (c && c.revealed !== false) candidates.push({ side: sideName, pos, c });
      }
    }
    if (candidates.length === 0) {
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) finds no creatures here — fizzles.`, "combat-detail");
    } else {
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      pick.c.force = (pick.c.force || 0) + 1;
      // Permanent buff: also bump the run-deck entry so the change persists if this is a player creature.
      if (pick.c.runDeckEntry) {
        pick.c.runDeckEntry.mods = pick.c.runDeckEntry.mods || {};
        pick.c.runDeckEntry.mods.force = (pick.c.runDeckEntry.mods.force || 0) + 1;
      }
      const reason = candidates.length === 1 ? "[only legal target]" : `[random pick from ${candidates.length}]`;
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) → ${pick.c.name} (${pick.side} ${pick.pos}) gains +1 Force permanently. ${reason}`, "combat-detail");
    }
    exitZone = "exile";
  } else if (action.effect === "deal1all") {
    // SCOPE EXAMPLE: deal 1 damage to a random enemy creature at EACH location.
    // Per the universal fall-through rule, an empty location → 1 damage to the opposing summoner
    // (one fall-through instance per empty location). A scope-effect on an empty board hits the
    // summoner once *per empty location*.
    for (let l2 = 0; l2 < LOCATION_COUNT; l2++) {
      dealDamageAtLoc(side, l2, 1, action.name, ``);
    }
  } else if (action.effect === "recruitConversion") {
    runRecruitConversion(side, loc, action.name);
  } else if (action.effect === "goblinBombardment") {
    // Sacrifice a goblin on your side here (random pick if multiple). Then deal damage equal to
    // front-row Force on your side here (post-sacrifice — the sacrificed goblin's Force is gone).
    const sacrificed = sacrificeCreatureOnSide(side, loc, c => c.tribe === "goblin", action.name);
    if (!sacrificed) {
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) — no goblin on your side here. Fizzles.`, "combat-detail");
    } else {
      // Force at the location = front-row creatures' effective Force (post-sacrifice).
      const force = committedStatTotal(side, loc, "force");
      if (force <= 0) {
        logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) — 0 Force here after sacrifice. No damage dealt.`, "combat-detail");
      } else {
        dealDamageAtLoc(side, loc, force, action.name, ` @${LOC_NAMES[loc]}`);
      }
    }
  } else if (action.effect === "battleDriver") {
    // Pick a random creature on your side here. Deal 1 damage to it. That creature gains +1
    // Force this turn. Combos with Berserker — the 1 damage triggers Enraged for an additional +1F.
    const lc2 = L(side, loc);
    const candidates = [];
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc2.creatures[pos];
      if (c && c.revealed !== false) candidates.push({ pos, c });
    }
    if (candidates.length === 0) {
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) — no creatures on your side here. Fizzles.`, "combat-detail");
    } else {
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      const reason = candidates.length === 1 ? "[only legal target]" : `[random pick from ${candidates.length}]`;
      pick.c.durability -= 1;
      logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) → ${pick.c.name} (${side} ${pick.pos}) takes 1 damage. ${reason}`, "combat-detail");
      // Fire damage-taken triggers (Enraged etc.).
      onCreatureTookDamage(pick.c, side, loc, 1);
      // Buff +1 Force this turn (if creature is still alive).
      if (pick.c.durability > 0) {
        grantUntilEndOfTurn(pick.c, "force", 1);
        logEntry(`  ${pick.c.name} gains +1 Force this turn.`, "combat-detail");
      } else {
        logEntry(`  ${pick.c.name} is destroyed before buff applies.`, "combat-detail");
        const bdPos = pick.pos;
        lc2.creatures[bdPos] = null;
        fireLeavePlayTriggers(pick.c, side, loc, bdPos);
        detachAllEquipmentFromHost(pick.c, side, loc);
        sendToPile(pick.c, side, "graveyard");
      }
    }
  } else if (action.effect === "forageAddAmmo") {
    // Forage: add 1 ammo to this side's stockpile at this location. Per-instance escalating cost
    // tracks here too — bump the cast counter so the next play of THIS card-instance costs more.
    const lc2 = L(side, loc);
    lc2.ammo = (lc2.ammo || 0) + 1;
    action.forageCasts = (action.forageCasts || 0) + 1;
    logEntry(`  ${action.name} (${side} @${LOC_NAMES[loc]}) — +1 ammo (stockpile now ${lc2.ammo}). Next cast of this card needs ≥${action.forageCasts} Tempo extra.`, "combat-detail");
  }
  lc.action = null;
  sendToPile(action, side, exitZone);
}

// Resolve all queued actions across all locations in Tempo order. Higher Tempo resolves first;
// ties broken by side priority. Each (side, loc) action is its own candidate.
function resolveAllActions() {
  const candidates = [];
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const action = L(sideName, loc).action;
      if (action) candidates.push({ side: sideName, loc, action, tempo: action.tempo || 0 });
    }
  }
  if (candidates.length === 0) return;
  candidates.sort((a, b) => {
    if (a.tempo !== b.tempo) return b.tempo - a.tempo;
    // Side-priority tiebreak — globally, by state.firstSide. (Per-location tiebreak via local
    // Tempo totals would be more correct but adds complexity for little gain at v2 scale.)
    if (a.side === state.firstSide && b.side !== state.firstSide) return -1;
    if (b.side === state.firstSide && a.side !== state.firstSide) return 1;
    // Same side, same Tempo — left-to-right by location.
    return a.loc - b.loc;
  });
  logEntry(`Actions resolve:`, "combat-header");
  for (const cand of candidates) {
    if (state.gameOver) return;
    // Re-check that the action is still in the slot — Counterspell at this location may have removed it.
    if (L(cand.side, cand.loc).action !== cand.action) {
      logEntry(`  ${cand.action.name} (${cand.side} @${LOC_NAMES[cand.loc]}) was countered before resolving.`, "combat-detail");
      continue;
    }
    resolveAction(cand.side, cand.loc);
  }
}

// Unified end-of-phase reveal-and-resolve. Per the design's Tempo-ordered reveal rule, face-down
// cards flip up in Tempo order — and crucially, a higher-Tempo action that flips up resolves
// BEFORE lower-Tempo cards have flipped up. This means a Spark (Tempo 1) flipping up first sees a
// still-face-down Mage (Tempo 0) at the same location and cannot target it (face-down = inert).
//
// Each event is sorted by Tempo desc, then side priority, then location/position. Events are:
//   - "flip" — a face-down creature/structure becomes face-up (no other effect in v3)
//   - "action" — an action resolves (flipping it up if face-down, then executing its effect)
function endOfPhaseRevealAndResolve() {
  const events = [];
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(sideName, loc);
      // Face-down creatures: flip events.
      for (const pos of ["fl","fr","bl","br"]) {
        const c = lc.creatures[pos];
        if (c && c.revealed === false) {
          events.push({ kind: "flip", side: sideName, loc, where: "creature", pos, card: c, tempo: c.tempo || 0 });
        }
      }
      // Face-down structures: flip events.
      if (lc.structure && lc.structure.revealed === false) {
        events.push({ kind: "flip", side: sideName, loc, where: "structure", card: lc.structure, tempo: lc.structure.tempo || 0 });
      }
      // Actions in slots: action-resolve events (they flip up as part of resolving).
      // Locations whose printed text suppresses action flip-up skip this — actions sit in the slot
      // until the location's text force-flips them via another trigger (e.g., end-of-cleanup).
      const locTextKey = LOC_TEXT_KEYS[loc];
      const suppressed = locTextKey && LOCATION_TEXTS[locTextKey] && LOCATION_TEXTS[locTextKey].suppressActionFlipUp;
      if (lc.action && !suppressed) {
        // Quests that have already flipped sit in the slot watching for completion — don't
        // re-queue them. Only face-down actions need to flip here. Face-up non-quest actions
        // shouldn't normally be in the slot at end-of-phase (resolveAction clears them).
        const isQuest = lc.action.subtype === "quest";
        if (!isQuest || lc.action.revealed === false) {
          events.push({ kind: "action", side: sideName, loc, card: lc.action, tempo: lc.action.tempo || 0 });
        }
      }
      // Pending equipment: flip events. Attaches to host on flip; fizzles to junkyard if host gone.
      for (const pos of ["fl","fr","bl","br"]) {
        const arr = lc.pending.equipment[pos];
        if (!arr) continue;
        for (const eq of arr) {
          if (eq.revealed === false) {
            events.push({ kind: "equipment", side: sideName, loc, where: "equipment", pos, card: eq, tempo: eq.tempo || 0 });
          }
        }
      }
    }
  }
  if (events.length === 0) return;

  // Sort by Tempo desc, then side priority on Tempo ties, then location, then position-in-grid.
  const POS_RANK = { fl: 0, fr: 1, bl: 2, br: 3, structure: 4, action: 5 };
  events.sort((a, b) => {
    if (a.tempo !== b.tempo) return b.tempo - a.tempo;
    if (a.side !== b.side) {
      if (a.side === state.firstSide) return -1;
      return 1;
    }
    if (a.loc !== b.loc) return a.loc - b.loc;
    const ar = POS_RANK[a.pos || a.where] ?? 99;
    const br = POS_RANK[b.pos || b.where] ?? 99;
    return ar - br;
  });

  logEntry(`Reveal & resolve queue (priority: ${state.firstSide}, sorted Tempo desc → priority → location → position):`, "combat-header");
  for (const ev of events) {
    const where = ev.where === "creature" ? ev.pos : ev.where;
    logEntry(`  · ${ev.side}/${LOC_NAMES[ev.loc]}/${where} — ${ev.card.name} (T${ev.tempo}) [${ev.kind}]`, "combat-detail");
  }
  for (const ev of events) {
    if (state.gameOver) return;
    if (ev.kind === "flip") {
      // Re-check the slot — earlier action at this Tempo may have destroyed it.
      const lc = L(ev.side, ev.loc);
      const stillThere = ev.where === "creature" ? lc.creatures[ev.pos] === ev.card : lc.structure === ev.card;
      if (!stillThere) {
        logEntry(`  → ${ev.card.name} (${ev.side} ${LOC_NAMES[ev.loc]} ${ev.pos || ev.where}) skipped: removed before flipping.`, "combat-detail");
        continue;
      }
      ev.card.revealed = true;
      // Creatures that flip this turn can't move this turn. flippedThisTurn clears at end of cleanup.
      if (ev.where === "creature") ev.card.flippedThisTurn = true;
      _initResolved.add(`flip-${ev.card.instId}`);
      if (ev.side === "ai") {
        const where = ev.where === "creature" ? `${LOC_NAMES[ev.loc]} ${ev.pos}` : `${LOC_NAMES[ev.loc]} (structure)`;
        logEntry(`  → Revealed: ${ev.card.name} at ${where}.`, "combat-detail");
      } else {
        const where = ev.where === "creature" ? `${LOC_NAMES[ev.loc]} ${ev.pos}` : `${LOC_NAMES[ev.loc]} (structure)`;
        logEntry(`  → Your ${ev.card.name} flips up at ${where}.`, "combat-detail");
      }
      // Fire the card's flip-up trigger if it has one. Triggers fire AFTER the card is face-up
      // (so the card itself is on the board for any "this gains X" effects).
      fireFlipUpTrigger(ev.side, ev.loc, ev.card);
      // Notify active quests of this flip-up event.
      checkQuestsForEvent({ kind: "flipUp", card: ev.card, side: ev.side, loc: ev.loc });
    } else if (ev.kind === "action") {
      // Action might have been countered / removed already.
      const lc = L(ev.side, ev.loc);
      if (lc.action !== ev.card) {
        logEntry(`  → ${ev.card.name} (${ev.side} @${LOC_NAMES[ev.loc]}) was countered before resolving.`, "combat-detail");
        continue;
      }
      // Quests flip up but DON'T resolve immediately. They sit in the slot until their completion
      // condition fires. Skip resolveAction for quests; just reveal and continue.
      const isQuest = ev.card.subtype === "quest";
      if (ev.card.revealed === false) {
        ev.card.revealed = true;
        if (ev.side === "ai") logEntry(`  → Revealed: ${ev.card.name} (AI action at ${LOC_NAMES[ev.loc]}).`, "combat-detail");
        if (isQuest) logEntry(`  → ${ev.card.name} (Quest) sits in slot, watching for completion.`, "combat-detail");
      }
      if (!isQuest) resolveAction(ev.side, ev.loc);
      _initResolved.add(`action-${ev.card.instId}`);
    } else if (ev.kind === "equipment") {
      // Equipment flips up and attaches to the host at its slot. If the host is gone (died/moved
      // before flip), the equipment fizzles to the owner-side junkyard.
      const lc = L(ev.side, ev.loc);
      const arr = lc.pending.equipment[ev.pos];
      const idx = arr ? arr.indexOf(ev.card) : -1;
      if (idx === -1) continue;  // already removed somehow
      arr.splice(idx, 1);
      ev.card.revealed = true;
      const host = lc.creatures[ev.pos];
      if (!host) {
        logEntry(`  → ${ev.card.name} (${ev.side} ${LOC_NAMES[ev.loc]} ${ev.pos}) has no host — fizzles to junkyard.`, "combat-detail");
        sendToPile(ev.card, ev.side, "junkyard");
        continue;
      }
      const ok = attachEquipmentToHost(ev.card, host, ev.side);
      if (!ok) {
        logEntry(`  → ${ev.card.name} can't attach to ${host.name} — already at equipment cap. Fizzles to junkyard.`, "combat-detail");
        sendToPile(ev.card, ev.side, "junkyard");
        continue;
      }
      logEntry(`  → ${ev.card.name} attaches to ${host.name} (${ev.side} ${LOC_NAMES[ev.loc]} ${ev.pos}).`, "combat-detail");
      fireFlipUpTrigger(ev.side, ev.loc, ev.card);
      _initResolved.add(`equip-${ev.card.instId}`);
    }
  }
}

function other(side) { return side === "player" ? "ai" : "player"; }

// Apply combat damage to a creature at a specific (side, loc, pos). Handles death-resolution and
// fires onCreatureTookDamage. Used by resolveAttack's main hit + extra-target attack patterns
// (cleave hits adjacent same-row slots; pierce hits the back-row slot behind the front-row target).
function applyCombatDamage(targetSide, loc, pos, dmg, attackerLabel, attacker) {
  if (dmg <= 0) return;
  const lc = L(targetSide, loc);
  const target = lc.creatures[pos];
  if (!target) {
    // No creature at this slot — damage falls through to the summoner.
    state.sides[targetSide].durability -= dmg;
    logEntry(`    ${attackerLabel} → ${targetSide} summoner for ${dmg} (empty ${pos}). (${targetSide} Durability: ${state.sides[targetSide].durability})`, "combat-detail");
    return;
  }
  // Record this melee attacker on the target for the Explosive Trap deathwish (only non-ranged
  // attackers count as melee — ranged shots don't trigger the trap).
  if (attacker && !attacker.ranged) {
    if (!target.meleeAttackersThisTurn) target.meleeAttackersThisTurn = [];
    if (!target.meleeAttackersThisTurn.includes(attacker.instId)) target.meleeAttackersThisTurn.push(attacker.instId);
  }
  target.durability -= dmg;
  logEntry(`    ${attackerLabel} → ${target.name} (${targetSide} ${pos}) for ${dmg}.`, "combat-detail");
  onCreatureTookDamage(target, targetSide, loc, dmg);
  if (target.durability <= 0) {
    logEntry(`      ${target.name} is destroyed.`, "combat-detail");
    lc.creatures[pos] = null;
    fireLeavePlayTriggers(target, targetSide, loc, pos);
    detachAllEquipmentFromHost(target, targetSide, loc);
    sendToPile(target, targetSide, "graveyard");
  }
}

function resolveAttack(side, loc, pos, attacker) {
  // Front-row attackers always allowed. Back-row attackers must be ranged.
  const isBack = pos === "bl" || pos === "br";
  if (isBack && !attacker.ranged) return;

  const enemySide = other(side);
  const enemyLoc = L(enemySide, loc);
  // Map attacker column to enemy front/back the way front-row attacks already do.
  // fl/bl on player's side aligns with enemy's fl front-row column; fr/br with enemy's fr.
  const column = (pos === "fl" || pos === "bl") ? "fl" : "fr";
  const enemyFront = column;
  const enemyBack = column === "fl" ? "bl" : "br";

  // Main target: front first, falling through to back if front is empty.
  const targetPos = enemyLoc.creatures[enemyFront] ? enemyFront : (enemyLoc.creatures[enemyBack] ? enemyBack : null);
  const dmg = effectiveStat(attacker, side, loc, "force");
  const label = `${attacker.name} (${pos})`;

  if (targetPos) {
    applyCombatDamage(enemySide, loc, targetPos, dmg, label, attacker);
  } else {
    state.sides[enemySide].durability -= dmg;
    logEntry(`    ${label} → ${enemySide} summoner for ${dmg}. (${enemySide} Durability: ${state.sides[enemySide].durability})`, "combat-detail");
  }

  // Attack-pattern extras (cleave, pierce). attackPatterns is an array of { type, value? }.
  const patterns = attacker.attackPatterns || [];
  for (const p of patterns) {
    if (p.type === "cleave") {
      // Cleave hits the *adjacent same-row slots* of the main target's location on the same
      // side as the main target. On a 2-column grid, that's the *other* front-row slot
      // (cleave fires from a front-row attacker → hits across-front; the cleave adjacency is
      // the same-row other column on the enemy side, i.e., the slot next to the main target).
      if (!targetPos) continue;  // no target hit, cleave has nothing adjacent
      const adjacent = targetPos === "fl" ? "fr" : (targetPos === "fr" ? "fl" : (targetPos === "bl" ? "br" : "bl"));
      if (enemyLoc.creatures[adjacent]) {
        applyCombatDamage(enemySide, loc, adjacent, dmg, `${label} (cleave)`, attacker);
      }
    } else if (p.type === "pierce") {
      // Pierce X: deal X damage to the slot directly behind the main target's column on the
      // enemy side. If the main target was already in the back row (front was empty), pierce
      // has nothing further to pierce — fizzle the pierce portion.
      const pierceVal = p.value || 1;
      if (!targetPos) {
        // Front + back both empty → main damage already hit summoner. Pierce also hits summoner.
        state.sides[enemySide].durability -= pierceVal;
        logEntry(`    ${label} (pierce ${pierceVal}) → ${enemySide} summoner for ${pierceVal}. (${enemySide} Durability: ${state.sides[enemySide].durability})`, "combat-detail");
      } else if (targetPos === "fl" || targetPos === "fr") {
        const backPos = targetPos === "fl" ? "bl" : "br";
        if (enemyLoc.creatures[backPos]) {
          applyCombatDamage(enemySide, loc, backPos, pierceVal, `${label} (pierce ${pierceVal})`, attacker);
        } else {
          // No back-row creature → pierce falls through to summoner.
          state.sides[enemySide].durability -= pierceVal;
          logEntry(`    ${label} (pierce ${pierceVal}) → ${enemySide} summoner for ${pierceVal}. (${enemySide} Durability: ${state.sides[enemySide].durability})`, "combat-detail");
        }
      }
      // If main target was a back-row creature (front was empty), pierce doesn't go further.
    }
  }
}

// End-of-cleanup work. Called from advancePhase when player ends the cleanup phase, after any
// pending cleanup-phase commits have been committed and flipped. Discards hands, reverts
// end-of-turn buffs, fires onCleanupEnd hooks, runs neutral end-of-cleanup, advances priority/turn.
function runCleanupEnd() {
  for (const sideName of ["player", "ai"]) {
    const s = state.sides[sideName];
    if (s.hand.length > 0) {
      logEntry(`${sideName === "player" ? "You" : "AI"} discards hand (${s.hand.length} card${s.hand.length === 1 ? "" : "s"}).`, "cleanup");
      s.discard.push(...s.hand);
      s.hand = [];
    }
  }
  revertEndOfTurnBuffs();
  // Clear per-turn "flipped this turn" markers so movement is allowed next turn.
  for (const sideName of ["player", "ai"]) {
    for (let loc = 0; loc < LOCATION_COUNT; loc++) {
      const lc = L(sideName, loc);
      for (const pos of ["fl","fr","bl","br"]) {
        const c = lc.creatures[pos];
        if (c && c.flippedThisTurn) c.flippedThisTurn = false;
      }
    }
  }
  firePhaseHook("onCleanupEnd");
  if (state.gameOver) return;
  resolveNeutralCleanup();
  checkGameOver();
  if (state.view === "encounter") checkAiRetreat();
  if (state.encounterEndPending) {
    const result = state.encounterEndPending;
    state.encounterEndPending = null;
    endEncounter(result);
    return;
  }
  const oldPriority = state.firstSide;
  state.firstSide = other(state.firstSide);
  logEntry(`Priority flips: ${oldPriority} → ${state.firstSide} (alternation tiebreak).`, "cleanup");
  state.turn += 1;
}

// Fire neutral cards' end-of-cleanup effects across all locations.
function resolveNeutralCleanup() {
  if (!state.sides) return;
  for (let loc = 0; loc < LOCATION_COUNT; loc++) {
    const lc = L("ai", loc);
    // Iterate over a snapshot of slots so card removals during the loop don't break iteration.
    const candidates = [];
    if (lc.structure && lc.structure.owner === "neutral") candidates.push({ card: lc.structure, where: "structure" });
    for (const pos of ["fl","fr","bl","br"]) {
      const c = lc.creatures[pos];
      if (c && c.owner === "neutral") candidates.push({ card: c, where: "creature", pos });
    }
    for (const cand of candidates) {
      if (!cand.card.revealed) continue;
      if (cand.card.effect === "siren") {
        // Find a non-neutral creature here at random — pool is BOTH player and AI creatures.
        // Per design, "another non-neutral creature here" excludes neutrals (so the siren never
        // accidentally consumes a sister-siren).
        const pool = [];
        for (const ownerSide of ["player", "ai"]) {
          for (const pos of ["fl","fr","bl","br"]) {
            const c = L(ownerSide, loc).creatures[pos];
            if (c && c.owner !== "neutral") pool.push({ side: ownerSide, pos, card: c });
          }
        }
        if (pool.length === 0) {
