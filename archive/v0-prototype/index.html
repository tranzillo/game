<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Game v2</title>
<link rel="stylesheet" href="src/styles.css" />
</head>
<body>

<div id="header">
  <h1>Game v2 — multi-location prototype</h1>
  <div>
    <span class="phase-info" id="phase-info">Phase: -</span>
    &nbsp;|&nbsp;
    <span class="turn-info" id="turn-info">Turn 1</span>
  </div>
</div>

<div id="ai-hand-info"></div>

<!-- AI summoner bar (above the play area). Only visible at boss encounters. -->
<div class="summoner ai outside-play" id="ai-summoner">
  <span class="name">AI</span>
  <span class="durability" id="ai-durability">20</span>
  <span class="incoming-dmg" id="ai-incoming"></span>
  <span class="priority-badge" id="ai-priority-badge"></span>
  <span class="deck-info" id="ai-deck-info"></span>
</div>

<!-- Unified play area: timeline (future top + past left) wraps the battlefield as one structure.
     Narrative history sits directly beneath. The whole thing is one visual unit. -->
<div id="play-area">
  <div id="timeline-top">
    <div id="timeline-present">
      <div class="timeline-present-label">NOW</div>
      <div id="timeline-present-chips"></div>
    </div>
    <div id="timeline-future"></div>
  </div>
  <div id="board-wrap">
    <div id="timeline-past-column">
      <div class="timeline-past-label">PAST</div>
      <div id="timeline-past"></div>
    </div>
    <div id="board">
      <!-- Locations row: render() fills this container with one .location column per LOCATION_COUNT. -->
      <div id="locations-row"></div>
    </div>
  </div>
  <div id="log"></div>
</div>

<!-- Player summoner bar (below the play area). Always visible during encounters. -->
<div class="summoner player outside-play" id="player-summoner">
  <span class="name">Player</span>
  <span class="durability" id="player-durability">20</span>
  <span class="incoming-dmg" id="player-incoming"></span>
  <span class="priority-badge" id="player-priority-badge"></span>
  <span class="deck-info" id="player-deck-info"></span>
</div>

<!-- Player piles + hand. Layout: Draw | Hand | Discard | GY | JY | Exile. Each pile renders as
     a stacked card representation showing count + top card (face-down for deck, face-up for the
     resolved piles). Hand expands as the center column. -->
<div id="player-bottom">
  <div class="pile-stack" id="pile-deck"><div class="pile-label">DRAW</div><div class="pile-cards" id="pile-deck-cards"></div></div>
  <div id="hand-area">
    <div class="hand-label">Your hand — click to play, drag to reorder. White-bar cards survive cleanup (Resolve).</div>
    <div id="hand"></div>
  </div>
  <div class="pile-stack" id="pile-discard"><div class="pile-label">DISCARD</div><div class="pile-cards" id="pile-discard-cards"></div></div>
  <div class="pile-stack" id="pile-graveyard"><div class="pile-label">GRAVEYARD</div><div class="pile-cards" id="pile-graveyard-cards"></div></div>
  <div class="pile-stack" id="pile-junkyard"><div class="pile-label">JUNKYARD</div><div class="pile-cards" id="pile-junkyard-cards"></div></div>
  <div class="pile-stack" id="pile-exile"><div class="pile-label">TRASH</div><div class="pile-cards" id="pile-exile-cards"></div></div>
</div>

<div id="controls">
  <button id="btn-advance">End Main Phase</button>
  <button id="btn-leave-encounter" class="secondary" title="Leave the neutral encounter and return to the overworld.">Leave Encounter</button>
  <button id="btn-export" class="secondary" title="Click: copy state to clipboard. Shift-click: download as a .txt file.">Export State</button>
  <button id="btn-restart" class="secondary">Restart Run</button>
  <select id="speed-select" class="secondary" title="Animation playback speed" style="background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-weight: 600;">
    <option value="1.5">0.7× slow</option>
    <option value="1" selected>1× normal</option>
    <option value="0.6">1.5× fast</option>
    <option value="0.3">3× turbo</option>
    <option value="0.05">instant</option>
  </select>
</div>

<div id="event-debug" style="display:none; padding:6px 12px; font-family:monospace; font-size:10px; color:#888; max-height:180px; overflow:hidden;">
  <details>
    <summary style="cursor:pointer; color:#aaa;">Event debug (Phase 1 streams)</summary>
    <div style="display:flex; gap:12px; padding-top:6px;">
      <div style="flex:1; max-height:160px; overflow-y:auto; border:1px solid #333; padding:4px;">
        <div style="color:#aaa; font-weight:600;">TIMELINE</div>
        <div id="event-debug-timeline"></div>
      </div>
      <div style="flex:1; max-height:160px; overflow-y:auto; border:1px solid #333; padding:4px;">
        <div style="color:#aaa; font-weight:600;">OUTCOMES</div>
        <div id="event-debug-outcomes"></div>
      </div>
    </div>
  </details>
</div>

<div id="game-over">
  <div class="panel">
    <h2 id="game-over-title">Game Over</h2>
    <p id="game-over-text"></p>
    <button id="btn-go-restart">Play again</button>
  </div>
</div>

<script type="module" src="src/main.js"></script>

</body>
</html>
